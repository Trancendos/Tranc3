# deploy/forgejo/caddy-the-workshop.conf
# Caddy snippet for The Workshop at trancendos.com/the-workshop
# Use this instead of the nginx config if your server runs Caddy.
#
# Add this inside your existing trancendos.com Caddyfile site block:
#
#   trancendos.com {
#       ...existing routes...
#       import /etc/caddy/the-workshop.conf
#   }

handle_path /the-workshop/* {
    reverse_proxy 127.0.0.1:3456
}

redir /the-workshop /the-workshop/ permanent
