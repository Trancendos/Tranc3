# deploy/forgejo/nginx-the-workshop.conf
# Nginx location block for The Workshop (Forgejo) at trancendos.com/the-workshop
#
# Add this inside your existing server { } block for trancendos.com.
# Forgejo runs on 127.0.0.1:3456 (see docker-compose.yml).
#
# IMPORTANT: Forgejo must be configured with:
#   ROOT_URL = https://trancendos.com/the-workshop
# This is set via the FORGEJO__server__ROOT_URL env var in docker-compose.yml.

location /the-workshop/ {
    proxy_pass         http://127.0.0.1:3456/the-workshop/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Required for Forgejo's web editor and large file uploads
    client_max_body_size 1024m;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;

    # WebSocket support (used by Forgejo's live updates)
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
}

# Redirect bare /the-workshop to trailing slash so Forgejo routing works
location = /the-workshop {
    return 301 /the-workshop/;
}
