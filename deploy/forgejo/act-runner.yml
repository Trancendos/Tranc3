# deploy/forgejo/act-runner.yml
# Configuration for the Forgejo act-runner (The Workshop's default CI/CD
# executor — handles everything except the two privileged deploy jobs, see
# act-runner-deploy.yml).
#
# Mounted at /data/act-runner.yml by docker-compose.yml; only actually read
# because that same file overrides the container's command to
# `daemon --config /data/act-runner.yml` — without that override the
# runner's entrypoint ignores this file entirely and falls back to its own
# generated default config.
#
# Reference: https://forgejo.org/docs/latest/admin/runner-installation/

log:
  level: info

runner:
  # Runner labels exposed to Forgejo — jobs use `runs-on: self-hosted` or
  # these. Every label needs an executor suffix (Forgejo requires either
  # `:host` or `:docker://<image>`) — a bare label is not valid and leaves
  # `runs-on: self-hosted` jobs unable to run at all.
  #
  # `:docker://<image>` (used here), not `:host`: most .forgejo/workflows/
  # files carrying these labels trigger on `pull_request`, and this repo is
  # a Forgejo mirror where a PR's own workflow content runs as-is (there is
  # no separate "approve to run" gate) — so a job on these labels must be
  # treated as running attacker-controlled code. `:docker://` spawns each
  # job in its own ephemeral sibling container with no Docker socket of its
  # own (container.docker_host and container.valid_volumes below are both
  # left empty/unset), so a PR can't reach the host's Docker daemon, host
  # filesystem, or any other job's state through it. The two workflows that
  # do need real Docker access (deploy-self-hosted.yml, and
  # security-scan.yml's owasp-zap-dast job) are both restricted to
  # push/schedule/workflow_dispatch — never pull_request — and run on the
  # separate `deploy-host:host` runner instead (act-runner-deploy.yml),
  # which does have the socket. Don't add `:host` labels here; that would
  # hand every PR-triggered workflow above host Docker access again.
  labels:
    - "self-hosted:docker://trancendos/act-runner:latest"
    - "linux:docker://trancendos/act-runner:latest"
    - "x64:docker://trancendos/act-runner:latest"
    - "python3.11:docker://trancendos/act-runner:latest"
    - "node20:docker://trancendos/act-runner:latest"

  # Fetch interval for new jobs
  fetch_interval: 2s
  # Parallel jobs — set to number of CPU cores
  capacity: 4
  # Timeout per job
  timeout: 3h

cache:
  enabled: true
  # Internal cache server address (shared between jobs on same runner)
  host: ""
  port: 0
  # External cache — leave empty to use internal
  external_server: ""

container:
  # Network for the ephemeral job containers this runner spawns via its
  # docker.sock mount. Must be tranc3-net (external network defined in
  # docker-compose.production.yml, created ahead of time — see
  # bootstrap.sh's "Ensuring tranc3-net exists" step) so jobs that need to
  # reach the production fleet by service name can do so (e.g.
  # http://workflow-engine-service:8034). Attaching only the long-running
  # act-runner *service* to tranc3-net (in docker-compose.yml) does not
  # cover this — each job runs in its own separate sibling container, not
  # inside act-runner's own namespace.
  network: tranc3-net
  privileged: false
  # Deliberately empty: this is what keeps the host's /var/run/docker.sock
  # (bind-mounted into the act-runner *daemon* container so it can spawn job
  # containers via the Docker API) from also being reachable inside those
  # ephemeral job containers themselves. Do not add the socket path here —
  # see the runner.labels comment above for why.
  valid_volumes: []
  docker_host: ""
  force_pull: false
