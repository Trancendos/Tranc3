# deploy/forgejo/act-runner.yml
# Configuration for the Forgejo act-runner (The Workshop CI/CD executor).
#
# Mounted at /data/act-runner.yml by docker-compose.yml; only actually read
# because that same file overrides the container's command to
# `daemon --config /data/act-runner.yml` — without that override the
# runner's entrypoint ignores this file entirely and falls back to its own
# generated default config.
#
# Reference: https://forgejo.org/docs/latest/admin/runner-installation/

log:
  level: info

runner:
  # Runner labels exposed to Forgejo — jobs use `runs-on: self-hosted` or
  # these. Every label needs an executor suffix (Forgejo requires either
  # `:host` or `:docker://<image>`) — a bare label is not valid and leaves
  # `runs-on: self-hosted` jobs unable to run at all.
  #
  # `:host` (used here), not `:docker://<image>`: several real workflows in
  # .forgejo/workflows/ (deploy-self-hosted.yml, frontend-build.yml) run
  # `docker build`/`docker run` as job steps. `:host` executes jobs
  # in-process inside this runner container, which already has
  # /var/run/docker.sock bind-mounted (see docker-compose.yml's act-runner
  # service) — so those steps can reach the host's Docker daemon directly.
  # `:docker://<image>` would instead spawn each job in its own ephemeral
  # sibling container with no socket of its own (container.docker_host and
  # container.valid_volumes below are both left empty/unset), so any
  # Docker-based step would fail to reach a daemon at all. It would also
  # make job availability depend on trancendos/act-runner:latest existing —
  # bootstrap.sh falls back to the upstream runner image without rebuilding
  # or relabeling anything if that custom image fails to build, silently
  # leaving these labels pointing at an image that was never produced.
  # `:host` avoids both problems: it needs no per-job image at all, and the
  # runner container's own network attachments (`default` + `tranc3-net` in
  # docker-compose.yml) already cover in-process jobs, so `container.network`
  # below is inert here — it only takes effect for `:docker://` labels.
  labels:
    - "self-hosted:host"
    - "linux:host"
    - "x64:host"
    - "python3.11:host"
    - "node20:host"

  # Fetch interval for new jobs
  fetch_interval: 2s
  # Parallel jobs — set to number of CPU cores
  capacity: 4
  # Timeout per job
  timeout: 3h

cache:
  enabled: true
  # Internal cache server address (shared between jobs on same runner)
  host: ""
  port: 0
  # External cache — leave empty to use internal
  external_server: ""

container:
  # Only takes effect for `:docker://<image>` labels, which spawn each job in
  # its own ephemeral sibling container. All labels above use `:host` (see
  # the comment on runner.labels), so jobs run in-process inside the
  # act-runner container itself, which docker-compose.yml already attaches
  # to both `default` and `tranc3-net` — that attachment is what actually
  # gives host-mode jobs their tranc3-net reachability (e.g.
  # deploy-self-hosted.yml's verify/register steps reaching
  # http://workflow-engine-service:8034), not this setting. Left set to
  # tranc3-net anyway so it's correct by default if a label is ever switched
  # to `:docker://` in the future.
  network: tranc3-net
  privileged: false
  valid_volumes: []
  docker_host: ""
  force_pull: false
