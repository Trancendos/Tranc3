# deploy/forgejo/act-runner.yml
# Configuration for the Forgejo act-runner (The Workshop CI/CD executor).
#
# Mounted at /data/act-runner.yml by docker-compose.yml; only actually read
# because that same file sets FORGEJO_RUNNER_CONFIG=/data/act-runner.yml —
# without that env var the runner's entrypoint ignores this file entirely
# and falls back to its own generated default config.
#
# Reference: https://forgejo.org/docs/latest/admin/runner-installation/

log:
  level: info

runner:
  # Runner labels exposed to Forgejo — jobs use `runs-on: self-hosted` or these
  labels:
    - "self-hosted:host"
    - "linux:host"
    - "x64:host"
    - "python3.11:host"
    - "node20:host"

  # Fetch interval for new jobs
  fetch_interval: 2s
  # Parallel jobs — set to number of CPU cores
  capacity: 4
  # Timeout per job
  timeout: 3h

cache:
  enabled: true
  # Internal cache server address (shared between jobs on same runner)
  host: ""
  port: 0
  # External cache — leave empty to use internal
  external_server: ""

container:
  # Network for the ephemeral job containers this runner spawns via its
  # docker.sock mount. Must be tranc3-net (external network defined in
  # docker-compose.production.yml, created ahead of time — see
  # bootstrap.sh's "Ensuring tranc3-net exists" step) so jobs like
  # deploy-self-hosted.yml's verify/register steps can reach the production
  # fleet by service name (e.g. http://workflow-engine-service:8034).
  # Attaching only the long-running act-runner *service* to tranc3-net (in
  # docker-compose.yml) does not cover this — each job runs in its own
  # separate sibling container, not inside act-runner's own namespace.
  network: tranc3-net
  privileged: false
  valid_volumes: []
  docker_host: ""
  force_pull: false
