# deploy/forgejo/docker-compose.yml
# The Workshop — Forgejo + act runner (self-hosted CI/CD).
#
# First-time deploy:
#   bash deploy/forgejo/bootstrap.sh
#
# Subsequent starts:
#   docker compose -f deploy/forgejo/docker-compose.yml up -d
#
# Available at: https://trancendos.com/the-workshop
#
# Runner image: deploy/forgejo/runner.Dockerfile (includes flyctl, wrangler, Python, Node)
# Build:  docker build -f deploy/forgejo/runner.Dockerfile -t trancendos/act-runner:latest .
# Or use the pre-built upstream image (no flyctl/wrangler) by commenting out image: below.

version: "3.9"

services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:7
    container_name: the-workshop
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__server__ROOT_URL=https://trancendos.com/the-workshop
      - FORGEJO__server__APP_NAME=The Workshop — Trancendos CI/CD
      - FORGEJO__server__HTTP_PORT=3000
      - FORGEJO__server__DOMAIN=trancendos.com
      - FORGEJO__server__SSH_DOMAIN=trancendos.com
      - FORGEJO__server__SSH_PORT=2222
      - FORGEJO__server__DISABLE_SSH=false
      - FORGEJO__server__LFS_START_SERVER=true
      - FORGEJO__database__DB_TYPE=sqlite3
      - FORGEJO__database__PATH=/data/forgejo/forgejo.db
      - FORGEJO__repository__DEFAULT_BRANCH=main
      - FORGEJO__service__DISABLE_REGISTRATION=false
      - FORGEJO__service__REQUIRE_SIGNIN_VIEW=false
      - FORGEJO__service__DEFAULT_KEEP_EMAIL_PRIVATE=true
      - FORGEJO__log__LEVEL=Info
      - FORGEJO__security__INSTALL_LOCK=${INSTALL_LOCK:-false}
      # Enable Forgejo Actions
      - FORGEJO__actions__ENABLED=true
      - FORGEJO__actions__DEFAULT_ACTIONS_URL=https://code.forgejo.org
      # Mailer — disabled by default; enable when SMTP is configured
      - FORGEJO__mailer__ENABLED=false
    ports:
      - "127.0.0.1:3456:3000"
      - "2222:22"
    volumes:
      - forgejo-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      # Internal healthcheck — uses container-internal port (3000) without subpath
      test: ["CMD", "curl", "-f", "http://localhost:3000/-/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  act-runner:
    # Use custom image (flyctl + wrangler + python + security tools)
    # Build first: docker build -f deploy/forgejo/runner.Dockerfile -t trancendos/act-runner:latest .
    # If custom image not yet built, swap to: image: code.forgejo.org/forgejo/runner:3
    image: ${RUNNER_IMAGE:-code.forgejo.org/forgejo/runner:3}
    container_name: the-workshop-runner
    restart: unless-stopped
    depends_on:
      forgejo:
        condition: service_healthy
    # The base image's entrypoint handles registration (using the
    # FORGEJO_RUNNER_* env vars below) then execs its CMD — overriding CMD
    # here to explicitly pass --config still runs through that same
    # entrypoint, it doesn't bypass registration. This is what actually
    # makes the runner read act-runner.yml; an env var alone does not
    # select it, and without it the runner falls back to its own generated
    # default config, silently ignoring container.network below.
    command: ["daemon", "--config", "/data/act-runner.yml"]
    environment:
      # Internal URL — runner talks directly to Forgejo container, not through nginx
      - FORGEJO_INSTANCE_URL=http://forgejo:3000/the-workshop
      - FORGEJO_RUNNER_REGISTRATION_TOKEN=${RUNNER_REGISTRATION_TOKEN:-}
      - FORGEJO_RUNNER_NAME=trancendos-runner-1
      - FORGEJO_RUNNER_LABELS=self-hosted,linux,x64
      # Pass deploy tokens to runner environment
      - FLY_API_TOKEN=${FLY_API_TOKEN:-}
      - CLOUDFLARE_API_TOKEN=${CF_API_TOKEN:-}
      - CLOUDFLARE_ACCOUNT_ID=e0214028cb64d31232f5662548a55e4e
    volumes:
      - act-runner-data:/data
      # Docker socket for container-in-container builds
      - /var/run/docker.sock:/var/run/docker.sock
      # Runner config
      - ./act-runner.yml:/data/act-runner.yml:ro
    networks:
      # `default` keeps `forgejo:3000` resolvable (same compose project).
      # `tranc3-net` here covers the long-running act-runner daemon itself —
      # the actual per-job CI containers it spawns via docker.sock get
      # tranc3-net through act-runner.yml's container.network setting
      # instead (this attachment alone would not cover them).
      - default
      - tranc3-net

networks:
  default: {}
  # Same explicit name as docker-compose.production.yml's declaration, not
  # `external: true` — two Compose projects each declaring a network by the
  # same literal `name:` share it correctly (whichever comes up first
  # creates it; the other attaches). `external: true` requires the network
  # to already exist with Compose's own management labels, which a bare
  # `docker network create` (the previous bootstrap.sh approach) does not
  # produce — that combination fails a subsequent `docker compose up` from
  # the *other* project. This way neither compose file needs the other to
  # have run first.
  tranc3-net:
    name: tranc3-net
    driver: bridge

volumes:
  forgejo-data:
    name: forgejo-data
  act-runner-data:
    name: act-runner-data
