# docker-stack.yml — Trancendos Docker Swarm production stack
#
# Deploy:
#   docker swarm init                         # on manager node
#   docker stack deploy -c deploy/swarm/docker-stack.yml tranc3
#
# Scale a service:
#   docker service scale tranc3_infinity-auth=3
#
# Rolling update:
#   docker service update --image <new-image> tranc3_tranc3-backend
#
# This file mirrors docker-compose.production.yml but uses Swarm-native
# constructs (deploy.replicas, deploy.resources, update_config, placement).
# Secrets are sourced from Docker Swarm secret store — see swarm-secrets.sh.

version: "3.9"

networks:
  tranc3_net:
    driver: overlay
    attachable: true

volumes:
  traefik_certs:
  prometheus_data:
  grafana_data:
  loki_data:

# ── Infrastructure ─────────────────────────────────────────────────────────────

services:
  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.network=tranc3_net"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:-admin@trancendos.com}"
      - "--certificatesresolvers.le.acme.storage=/certs/acme.json"
      - "--api.dashboard=true"
      - "--metrics.prometheus=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
    networks:
      - tranc3_net
    deploy:
      mode: global          # one Traefik per manager node
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    configs:
      - source: alertmanager_config
        target: /etc/alertmanager/alertmanager.yml
    networks:
      - tranc3_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  prometheus:
    image: prom/prometheus:v2.52.0
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus_data:/prometheus
    networks:
      - tranc3_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_SERVER_ROOT_URL: "https://trancendos.com/grafana"
    secrets:
      - grafana_admin_password
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - tranc3_net
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`trancendos.com`) && PathPrefix(`/grafana`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.routers.grafana.tls.certresolver=le"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/loki.yml
    configs:
      - source: loki_config
        target: /etc/loki/loki.yml
    volumes:
      - loki_data:/loki
    networks:
      - tranc3_net
    deploy:
      replicas: 1

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    command: ["--config=/etc/otelcol/config.yaml"]
    configs:
      - source: otel_collector_config
        target: /etc/otelcol/config.yaml
    networks:
      - tranc3_net
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M

# ── P0 Services (3 replicas for HA) ──────────────────────────────────────────

  tranc3-backend:
    image: ${REGISTRY:-ghcr.io/trancendos}/tranc3-backend:${TAG:-latest}
    environment:
      SECRET_KEY__FILE: /run/secrets/secret_key
      JWT_SECRET__FILE: /run/secrets/jwt_secret
      DATABASE_URL__FILE: /run/secrets/database_url
      REDIS_URL__FILE: /run/secrets/redis_url
      ENVIRONMENT: production
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    secrets:
      - secret_key
      - jwt_secret
      - database_url
      - redis_url
    networks:
      - tranc3_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.backend.rule=Host(`api.trancendos.com`)"
        - "traefik.http.routers.backend.entrypoints=websecure"
        - "traefik.http.routers.backend.tls.certresolver=le"
        - "traefik.http.services.backend.loadbalancer.server.port=8000"

  infinity-auth:
    image: ${REGISTRY:-ghcr.io/trancendos}/infinity-auth:${TAG:-latest}
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    networks:
      - tranc3_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure

  infinity-ws:
    image: ${REGISTRY:-ghcr.io/trancendos}/infinity-ws:${TAG:-latest}
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    networks:
      - tranc3_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ws.rule=Host(`trancendos.com`) && PathPrefix(`/ws`)"
        - "traefik.http.routers.ws.entrypoints=websecure"
        - "traefik.http.services.ws.loadbalancer.server.port=8004"

# ── P1 Services (1 replica, rolling update) ──────────────────────────────────

  monitoring:
    image: ${REGISTRY:-ghcr.io/trancendos}/monitoring:${TAG:-latest}
    networks:
      - tranc3_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  health-aggregator:
    image: ${REGISTRY:-ghcr.io/trancendos}/health-aggregator:${TAG:-latest}
    networks:
      - tranc3_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  audit-service:
    image: ${REGISTRY:-ghcr.io/trancendos}/audit-service:${TAG:-latest}
    networks:
      - tranc3_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  users-service:
    image: ${REGISTRY:-ghcr.io/trancendos}/users-service:${TAG:-latest}
    networks:
      - tranc3_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  notifications:
    image: ${REGISTRY:-ghcr.io/trancendos}/notifications:${TAG:-latest}
    networks:
      - tranc3_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  infinity-ai:
    image: ${REGISTRY:-ghcr.io/trancendos}/infinity-ai:${TAG:-latest}
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    networks:
      - tranc3_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

# ── Swarm secrets (created via: docker secret create <name> <file>) ───────────

secrets:
  secret_key:
    external: true
  jwt_secret:
    external: true
  database_url:
    external: true
  redis_url:
    external: true
  grafana_admin_password:
    external: true

# ── Swarm configs (created via: docker config create <name> <file>) ──────────
# Pre-create on the manager node before deploying the stack:
#   docker config create prometheus_config   deploy/prometheus.yml
#   docker config create alertmanager_config monitoring/alertmanager.yml
#   docker config create loki_config         monitoring/loki.yml
#   docker config create otel_collector_config monitoring/otel-collector.yml

configs:
  prometheus_config:
    external: true
  alertmanager_config:
    external: true
  loki_config:
    external: true
  otel_collector_config:
    external: true
