    environment:
      PORT: "8057"
      NAVIDROME_URL: "${NAVIDROME_URL:-http://navidrome:4533}"
      MUSIC_DIR: "/music"
    volumes:
      - "${MUSIC_DIR:-/tmp/music}:/music:ro"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8057/health')"]
