    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.studio.rule=PathPrefix(`/studio`)"
      - "traefik.http.routers.studio.entrypoints=web"
      - "traefik.http.services.studio.loadbalancer.server.port=8050"

  # ── Sashas Photo Studio — Madam Krystal — Port 8051 ──────────
  sashas-photo-studio:
