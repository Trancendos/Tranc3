version: "3.9"
# Trancendos Planned Entities — 18 services advancing from 0% → live
#
# Start with profiles:
#   docker compose -f docker-compose.planned-entities.yml --profile academy up -d
#   docker compose -f docker-compose.planned-entities.yml --profile all up -d
#
# Or: bash scripts/optional-services.sh start <profile>

x-worker: &worker-defaults
  restart: unless-stopped
  networks:
    - tranc3-network

x-hc: &default-hc
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 20s

services:

  # ── The Academy — Shimshi — Port 8040 ─────────────────────────
  the-academy:
    build:
      context: ./workers/the-academy
      dockerfile: Dockerfile
    container_name: the-academy
    <<: *worker-defaults
    profiles: ["academy", "all"]
    ports: ["8040:8040"]
    environment:
      PORT: "8040"
      DB_PATH: "/data/academy.db"
    volumes:
      - academy-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8040/health')"]
      <<: *default-hc
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.academy.rule=PathPrefix(`/academy`)"
      - "traefik.http.routers.academy.entrypoints=web"
      - "traefik.http.services.academy.loadbalancer.server.port=8040"

  # ── The Basement — Gary Glowman — Port 8041 ──────────────────
  the-basement:
    build:
      context: ./workers/basement
      dockerfile: Dockerfile
    container_name: the-basement
    <<: *worker-defaults
    profiles: ["basement", "all"]
    ports: ["8041:8041"]
    environment:
      PORT: "8041"
      BASEMENT_DIR: "/data/archive"
    volumes:
      - basement-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8041/health')"]
      <<: *default-hc
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.basement.rule=PathPrefix(`/basement`)"
      - "traefik.http.routers.basement.entrypoints=web"
      - "traefik.http.services.basement.loadbalancer.server.port=8041"

  # ── The Studio — Voxx — Port 8050 ────────────────────────────
  the-studio:
    build:
      context: ./workers/the-studio
      dockerfile: Dockerfile
    container_name: the-studio
    <<: *worker-defaults
    profiles: ["studio", "all"]
    ports: ["8050:8050"]
    environment:
      PORT: "8050"
      PENPOT_URL: "${PENPOT_URL:-http://fabulousa-frontend}"
      SD_URL: "${SD_URL:-http://stable-diffusion:7860}"
      TATEKING_URL: "http://tateking:8053"
      TRANCEFLOW_URL: "http://tranceflow:8059"
    healthcheck:
