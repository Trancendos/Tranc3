# TRANC3 Enhanced Configuration — v3.0.0
# All systems: MCP + Workflow + DeepMind + TF Hybrid + Self-Healing + Skills

system:
  name: "TRANC3 Enhanced"
  version: "3.0.0"
  environment: "production"
  log_level: "INFO"

# ── MCP Server ─────────────────────────────────────────────────────
mcp:
  enabled: true
  host: "0.0.0.0"
  port: 8001
  auth:
    enabled: true
    api_key_env: "MCP_API_KEY"
  sse:
    heartbeat_interval_sec: 15
    max_subscribers: 100
  tools:
    execute_code:
      timeout_sec: 10
      allowed_builtins: ["len", "range", "enumerate", "zip", "map", "filter", "sorted", "sum", "min", "max", "abs", "round", "int", "float", "str", "bool", "list", "dict", "set", "tuple"]

# ── Workflow Engine ────────────────────────────────────────────────
workflow:
  max_concurrent_executions: 20
  default_node_timeout_sec: 30
  default_workflow_timeout_sec: 300
  retry:
    max_attempts: 3
    backoff_base_sec: 1.0
    backoff_multiplier: 2.0
  node_types:
    llm:
      model: "claude-sonnet-4-6"
      max_tokens: 4096
      temperature: 0.7
    vector_search:
      collection: "tranc3-skills"
      top_k: 10
    code_exec:
      timeout_sec: 10
      sandbox: true

# ── DeepMind Systems ───────────────────────────────────────────────
deepmind:
  mcts:
    num_simulations: 800
    c_puct: 1.414
    temperature: 1.0
    dirichlet_alpha: 0.3
    dirichlet_epsilon: 0.25
  world_model:
    state_dim: 256
    hidden_dim: 512
    action_dim: 64
    num_layers: 4
  planning:
    horizon: 10
    beam_width: 5
    use_world_model: true
    temperature: 0.8
  chain_of_thought:
    max_steps: 10
    confidence_threshold: 0.7

# ── TensorFlow Hybrid ──────────────────────────────────────────────
tensorflow:
  enabled: false  # Set true when tensorflow package installed
  prefer_torch: true
  tf_fallback: true
  device: "cpu"  # "cuda" when GPU available
  batch_size: 32
  ensemble_weights:
    torch: 0.6
    tensorflow: 0.4

# ── Self-Healing ───────────────────────────────────────────────────
healing:
  enabled: true
  check_interval_sec: 3600   # 1 hour sweeps (6h on prod)
  auto_repair: true
  thresholds:
    healthy: 0.8
    review: 0.6
    rollback: 0.4
    quarantine: 0.2
    emergency: 0.0
  prediction:
    window_minutes: 30
    confidence_min: 0.6
  nanocode_bots:
    compliance_metadata:
      success_rate_target: 0.97
    stale_embedding:
      success_rate_target: 0.94
    free_tier:
      warning_threshold: 0.80
    rate_limit:
      token_rotation: true
  adaptive_config:
    tune_interval_sec: 300
    apply_threshold: 0.8

# ── Skill Registry ─────────────────────────────────────────────────
skills:
  semantic_search: true
  embedding_model: "all-MiniLM-L6-v2"  # sentence-transformers model
  search_weights:
    lexical: 0.4
    semantic: 0.6
  bundles:
    spark_ignition:
      trigger_keywords: ["build", "create", "implement", "make", "generate", "develop"]
      preload: true
    self_healing:
      trigger_keywords: ["fix", "repair", "heal", "broken", "error", "failing"]
    compliance:
      trigger_keywords: ["gdpr", "compliance", "legal", "privacy", "regulation"]
    security:
      trigger_keywords: ["security", "auth", "encrypt", "vulnerability", "owasp"]

# ── Code Generation ────────────────────────────────────────────────
code_generator:
  default_language: "python"
  quality_threshold: 0.85
  self_improve: true
  generate_tests: true
  llm:
    model: "claude-sonnet-4-6"
    max_tokens: 4096
    temperature: 0.3  # lower temp for code

# ── Core 2060 Systems ──────────────────────────────────────────────
quantum:
  num_qubits: 16
  backend: "aer_simulator"

consciousness:
  consciousness_threshold: 3.0
  state_dimensions: 768
  phi_integration_steps: 1000

ai_capabilities:
  population_size: 20
  mutation_rate: 0.01
  genome_dim: 768
  elite_ratio: 0.2

distributed:
  swarm_size: 10
  communication_rounds: 5

memory:
  dimensions: 768
  max_experiences: 10000
