# .woodpecker.yml — Woodpecker CI pipeline for Trancendos
# Runs on Woodpecker CI (Apache 2.0) alongside Forgejo (The Workshop)
# Mirrors the security gates defined in .forgejo/workflows/
#
# Woodpecker docs: https://woodpecker-ci.org/docs
# Service: Woodpecker server (docker-compose.production.yml → woodpecker-server)
#
# Zero-cost: all images are free/open-source; no paid CI minutes

when:
  - event: [push, pull_request]

steps:
  # ── Ruff lint + format check (matches GitHub Actions CI gate) ───────────────
  ruff-lint:
    image: python:3.11-slim@sha256:e031123e3d85762b141ad1cbc56452ba69c6e722ebf2f042cc0dc86c47c0d8b3
    commands:
      - pip install --quiet ruff
      - ruff check --select E,F,W,B --ignore E501,B008,B904 .
      - ruff format --check .

  # ── Full pytest suite ────────────────────────────────────────────────────────
  pytest:
    image: python:3.11-slim@sha256:e031123e3d85762b141ad1cbc56452ba69c6e722ebf2f042cc0dc86c47c0d8b3
    environment:
      SECRET_KEY: woodpecker-ci-test-key-not-real
      DATABASE_URL: sqlite:///./test.db
      REDIS_URL: ""
      ENVIRONMENT: test
    commands:
      - pip install --quiet -r requirements.txt
      - python -m pytest tests/ -q --tb=short
        --ignore=tests/test_chaos.py
        --ignore=tests/test_penetration.py
    depends_on: [ruff-lint]

  # ── Security: Python dependencies + SAST ────────────────────────────────────
  python-security:
    image: python:3.11-slim@sha256:e031123e3d85762b141ad1cbc56452ba69c6e722ebf2f042cc0dc86c47c0d8b3
    commands:
      - pip install --quiet pip-audit bandit
      - pip-audit --requirement requirements.txt --vulnerability-service osv || true
      - bandit -r src/ workers/ --severity-level medium --exit-zero
    depends_on: [ruff-lint]
    when:
      - event: push
        branch: [main, "claude/*"]

  # ── Docker Compose lint (Checkov IaC scanner) ────────────────────────────────
  docker-lint:
    image: python:3.11-slim@sha256:e031123e3d85762b141ad1cbc56452ba69c6e722ebf2f042cc0dc86c47c0d8b3
    commands:
      - pip install --quiet checkov
      - checkov -f docker-compose.production.yml --quiet || true
    when:
      - event: push

  # ── Node.js audit (web frontend) ─────────────────────────────────────────────
  npm-audit:
    image: node:24-slim@sha256:6f7b03f7c2c8e2e784dcf9295400527b9b1270fd37b7e9a7285cf83b6951452d
    directory: web
    commands:
      - npm ci --silent
      - npm audit --audit-level=high || true
    when:
      - event: [push, pull_request]

  # ── Mattermost notification (main branch only) ────────────────────────────────
  notify-mattermost:
    image: plugins/webhook@sha256:2d54c2299f55e00846626924cfdfba81c41fd4130faa381d418c1d64eaa1917b
    settings:
      urls:
        from_secret: MATTERMOST_WEBHOOK_URL
      content_type: application/json
      template: |
        {
          "text": "### Woodpecker CI **${CI_PIPELINE_STATUS}** — ${CI_REPO_NAME}\n**Branch:** `${CI_COMMIT_BRANCH}` | **Commit:** `${CI_COMMIT_SHA}`\n**Author:** ${CI_COMMIT_AUTHOR}"
        }
    depends_on: [pytest]
    when:
      - event: push
        branch: main
        status: [success, failure]
