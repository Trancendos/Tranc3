# .gitleaks.toml — Custom gitleaks configuration for Tranc3
# Extends default rules with Trancendos-specific patterns and allowlists

[allowlist]
  description = "Global allowlist for false positives"
  paths = [
    '''docs/.*\.md$''',
    '''tests/.*\.py$''',
    '''\.secrets\.baseline$''',
    '''CLAUDE\.md$''',
  ]

  regexes = [
    '''TRANC3-AUTH-\d{3}''',
    '''<(pad|unk|bos|eos|sys|usr|ast)>''',
  ]
