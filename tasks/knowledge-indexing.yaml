name: knowledge-indexing
description: Reindex The Library knowledge base into FAISS vector store for RAG-MCP
version: "1.0"
enabled: true
tags:
  - knowledge
  - rag
  - faiss

schedule:
  type: cron
  cron_expression: "30 2 * * *"
  timezone: UTC

notify_on_failure: true
notify_on_success: false

steps:
  - name: crawl-documents
    bot: search
    action: crawl_docs
    params:
      sources:
        - type: filesystem
          path: "docs/"
          extensions: [".md", ".txt", ".rst"]
        - type: filesystem
          path: "CLAUDE.md"
      recursive: true
    timeout_seconds: 120
    retry:
      max_attempts: 2
      backoff_seconds: 10

  - name: generate-embeddings
    bot: embed
    action: batch_embed
    params:
      model: all-MiniLM-L6-v2
      chunk_size: 512
      chunk_overlap: 64
      batch_size: 32
    timeout_seconds: 300
    retry:
      max_attempts: 2
      backoff_seconds: 30
      backoff_multiplier: 2.0
      max_backoff_seconds: 120

  - name: update-vector-store
    bot: memory
    action: update_faiss_index
    params:
      persist_path: "data/faiss_index"
      overwrite: false
      merge_strategy: upsert
    timeout_seconds: 60
    retry:
      max_attempts: 3
      backoff_seconds: 5
