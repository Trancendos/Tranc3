# Zero-cost provider registry — 6–8 providers per capability with rotation chains.
# Paid providers are listed for documentation only; runtime must reject them unless explicitly enabled.
version: "2.0"
policy:
  max_paid_providers: 0
  require_self_hosted_first: true
  rotation_min_providers: 6
  rotation_max_providers: 8
  quota_hard_stop: true
  daily_request_limit_per_provider: 5000
  cooldown_seconds_on_exhaust: 3600

capabilities:
  inference:
    description: "Text/chat completion — local-first, then free cloud tiers"
    providers:
      - id: ollama
        cost: zero
        self_hosted: true
        priority: 1
      - id: huggingface
        cost: zero
        self_hosted: false
        priority: 2
      - id: openrouter_free
        cost: zero
        self_hosted: false
        priority: 3
      - id: groq
        cost: zero
        self_hosted: false
        priority: 4
      - id: together
        cost: zero
        self_hosted: false
        priority: 5
      - id: fireworks
        cost: zero
        self_hosted: false
        priority: 6
      - id: deepinfra
        cost: zero
        self_hosted: false
        priority: 7
      - id: offline
        cost: zero
        self_hosted: true
        priority: 99
    rotation_chains:
      - name: zero_cost_full
        providers: [ollama, huggingface, openrouter_free, groq, together, fireworks, deepinfra, offline]
      - name: zero_cost_cloud
        providers: [huggingface, openrouter_free, groq, together, fireworks, deepinfra, offline]
      - name: zero_cost_local
        providers: [ollama, offline]

  embeddings:
    description: "Embedding vectors — local sentence-transformers first"
    providers:
      - id: local_embeddings
        cost: zero
        self_hosted: true
        priority: 1
      - id: ollama
        cost: zero
        self_hosted: true
        priority: 2
      - id: huggingface
        cost: zero
        self_hosted: false
        priority: 3
      - id: openrouter_free
        cost: zero
        self_hosted: false
        priority: 4
      - id: cohere_free
        cost: zero
        self_hosted: false
        priority: 5
      - id: voyage_free
        cost: zero
        self_hosted: false
        priority: 6
      - id: offline_embeddings
        cost: zero
        self_hosted: true
        priority: 99
    rotation_chains:
      - name: embeddings_default
        providers: [local_embeddings, ollama, huggingface, openrouter_free, cohere_free, voyage_free, offline_embeddings]

  speech_to_text:
    description: "STT — Whisper local, then free API tiers"
    providers:
      - id: whisper_local
        cost: zero
        self_hosted: true
        priority: 1
      - id: faster_whisper
        cost: zero
        self_hosted: true
        priority: 2
      - id: groq_whisper
        cost: zero
        self_hosted: false
        priority: 3
      - id: assemblyai_free
        cost: zero
        self_hosted: false
        priority: 4
      - id: deepgram_free
        cost: zero
        self_hosted: false
        priority: 5
      - id: openai_whisper_free
        cost: zero
        self_hosted: false
        priority: 6
      - id: offline_stt
        cost: zero
        self_hosted: true
        priority: 99
    rotation_chains:
      - name: stt_default
        providers: [whisper_local, faster_whisper, groq_whisper, assemblyai_free, deepgram_free, openai_whisper_free, offline_stt]

  image_generation:
    description: "Image gen — local SD/ComfyUI stubs, then free tiers"
    providers:
      - id: comfyui_local
        cost: zero
        self_hosted: true
        priority: 1
      - id: stable_diffusion_local
        cost: zero
        self_hosted: true
        priority: 2
      - id: huggingface_inference
        cost: zero
        self_hosted: false
        priority: 3
      - id: replicate_free
        cost: zero
        self_hosted: false
        priority: 4
      - id: pollinations
        cost: zero
        self_hosted: false
        priority: 5
      - id: leonardo_free
        cost: zero
        self_hosted: false
        priority: 6
      - id: offline_image
        cost: zero
        self_hosted: true
        priority: 99
    rotation_chains:
      - name: image_default
        providers: [comfyui_local, stable_diffusion_local, huggingface_inference, replicate_free, pollinations, leonardo_free, offline_image]

# Legacy flat list (backward compatible with is_approved())
approved_self_hosted:
  - ollama
  - local_embeddings
  - whisper_local
  - faster_whisper
  - comfyui_local
  - stable_diffusion_local
  - offline
  - offline_embeddings
  - offline_stt
  - offline_image

approved_free_tier:
  - huggingface
  - openrouter_free
  - groq
  - together
  - fireworks
  - deepinfra
  - cohere_free
  - voyage_free
  - groq_whisper
  - assemblyai_free
  - deepgram_free
  - openai_whisper_free
  - huggingface_inference
  - replicate_free
  - pollinations
  - leonardo_free

blocked_paid:
  - openai
  - anthropic
  - google_gemini_paid
  - azure_openai
  - aws_bedrock_paid
  - cohere_paid
  - mistral_paid
