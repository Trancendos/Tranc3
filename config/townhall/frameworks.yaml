meta:
  version: "1.0.0"
  last_updated: "2026-06-12"
  owner: "Trancendos Platform Engineering"

active_frameworks:
  - id: "magna-carta"
    name: "Magna Carta v1"
    status: "active"
    config_path: "compliance/magna-carta/config/magna_carta_config.json"
    register_path: "compliance/magna-carta/compliance/magna_carta_register.yaml"
    enforcement_mode: "advisory"
    cab_required: true

  - id: "defstan"
    name: "DEF STAN 00-700 / 00-055 / 05-086"
    status: "active"
    register_path: "compliance/register.yaml"
    cab_required: false

domains:
  governance:
    - id: "foundation-framework"
      name: "Foundation Framework Charter"
      standard: "Trancendos Foundation"
      status: "active"
    - id: "universe-framework"
      name: "Trancendos Universe Framework"
      standard: "Trancendos Universe"
      status: "active"
    - id: "app-per-app-framework"
      name: "App per App Framework"
      standard: "Trancendos App-per-App"
      status: "active"
    - id: "design-system-framework"
      name: "Design System Template"
      standard: "Trancendos Design System"
      status: "draft"
  agile:
    - id: "kanban"
      name: "Kanban Board Charter"
      standard: "Kanban"
      status: "active"
    - id: "agile-delivery"
      name: "Agile Delivery Framework"
      standard: "Agile"
      status: "active"
  itsm:
    - id: "itil-incident-mgmt"
      name: "ITIL Incident Management"
      standard: "ITIL 4"
      status: "active"
    - id: "itil-change-mgmt"
      name: "ITIL Change Management"
      standard: "ITIL 4"
      status: "active"
  project_management:
    - id: "prince2-stage-gate"
      name: "PRINCE2 Stage Gate"
      standard: "PRINCE2 7"
      status: "active"
  legal_ip_finance:
    - id: "legal-compliance"
      name: "Legal Compliance Checklist"
      standard: "UK Companies Act"
      status: "active"
    - id: "financial-oversight"
      name: "Financial Oversight Review"
      standard: "Zero-Cost Financial Controls"
      status: "active"
    - id: "intellectual-property"
      name: "Intellectual Property Register"
      standard: "IP Register"
      status: "active"

rooms:
  - id: "board-room"
    name: "Board Room"
    purpose: "Executive governance and strategic decisions"
  - id: "war-room"
    name: "War Room"
    purpose: "Incident response and crisis coordination"
  - id: "meeting-room"
    name: "Meeting Room"
    purpose: "General team meetings and standups"

cab:
  enabled: true
  require_approval_for:
    - "infrastructure_change"
    - "security_config_change"
    - "production_deployment"
    - "database_migration"
    - "dependency_upgrade"
    - "access_control_change"
  auto_approve:
    - "documentation_update"
    - "test_addition"
    - "minor_bugfix"
  approval_timeout_hours: 72
  min_approvers: 1
  emergency_bypass_roles:
    - "platform_owner"
    - "security_lead"
