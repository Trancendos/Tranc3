# config/litellm/config.yaml
# LiteLLM unified proxy — OpenAI-compatible API over all free providers.
# Resolves the AI gateway duplication (workers/infinity-ai vs src/ai_gateway).
#
# Priority chain (x8 free providers + self-hosted):
#   ollama → groq → cerebras → sambanova → gemini → openrouter → mistral
#   → cohere → github_models → huggingface → cloudflare_ai → offline
#
# Run: litellm --config config/litellm/config.yaml --port 4000
# Or:  docker compose -f docker-compose.production.yml up litellm

model_list:
  # ── Tier 0: Self-hosted (unlimited, zero-cost) ──────────────────────
  - model_name: "ollama/llama3.2"
    litellm_params:
      model: "ollama/llama3.2"
      api_base: "${OLLAMA_URL:-http://ollama:11434}"
    model_info:
      id: ollama-llama32
      mode: chat
      tier: self_hosted
      cost_per_token: 0

  - model_name: "ollama/qwen2.5"
    litellm_params:
      model: "ollama/qwen2.5"
      api_base: "${OLLAMA_URL:-http://ollama:11434}"
    model_info:
      id: ollama-qwen25
      mode: chat
      tier: self_hosted
      cost_per_token: 0

  - model_name: "ollama/mistral"
    litellm_params:
      model: "ollama/mistral"
      api_base: "${OLLAMA_URL:-http://ollama:11434}"
    model_info:
      id: ollama-mistral
      mode: chat
      tier: self_hosted
      cost_per_token: 0

  # ── Tier 1: Fast inference free tiers ──────────────────────────────
  - model_name: "groq/llama-3.3-70b-versatile"
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "${GROQ_API_KEY}"
    model_info:
      id: groq-llama33-70b
      mode: chat
      tier: free
      rpm: 30
      tpm: 6000
      cost_per_token: 0

  - model_name: "groq/llama-3.1-8b-instant"
