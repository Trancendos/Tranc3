# LiteLLM Proxy Config — Trancendos AI Gateway Aggregator
# Zero-cost x10 provider chain with adaptive rotation
# All providers have genuine free tiers (no credit card for base use)

model_list:
  # Tier 0: Local Ollama (zero ongoing cost, unlimited)
  - model_name: ollama/llama3
    litellm_params:
      model: ollama/llama3
      api_base: "${OLLAMA_API_BASE:-http://host.docker.internal:11434}"
  - model_name: ollama/mistral
    litellm_params:
      model: ollama/mistral
      api_base: "${OLLAMA_API_BASE:-http://host.docker.internal:11434}"

  # Tier 1: Groq (14,400 req/day, 300+ tok/s)
  - model_name: groq/llama3-70b
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: "${GROQ_API_KEY}"
  - model_name: groq/llama3-8b
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: "${GROQ_API_KEY}"

  # Tier 2: Google Gemini (1,500 req/day, 1M tok/min)
  - model_name: gemini/flash
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: "${GOOGLE_GEMINI_API_KEY}"
  - model_name: gemini/flash-002
    litellm_params:
      model: gemini/gemini-2.0-flash-exp
      api_key: "${GOOGLE_GEMINI_API_KEY}"

  # Tier 3: Cerebras (30 RPM, wafer-scale inference)
  - model_name: cerebras/llama3
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: "${CEREBRAS_API_KEY}"
      api_base: "https://api.cerebras.ai/v1"

  # Tier 4: SambaNova (50K tokens/req)
  - model_name: sambanova/llama3
    litellm_params:
      model: openai/Meta-Llama-3.1-8B-Instruct
      api_key: "${SAMBANOVA_API_KEY}"
      api_base: "https://api.sambanova.ai/v1"
  - model_name: sambanova/llama3-70b
    litellm_params:
      model: openai/Meta-Llama-3.1-70B-Instruct
      api_key: "${SAMBANOVA_API_KEY}"
      api_base: "https://api.sambanova.ai/v1"

  # Tier 5: GitHub Models (GPT-4o-mini, Llama 70B — GitHub PAT only)
  - model_name: github/gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: "${GITHUB_TOKEN}"
      api_base: "https://models.inference.ai.azure.com"
  - model_name: github/llama3-70b
    litellm_params:
      model: openai/meta-llama-3.1-70b-instruct
      api_key: "${GITHUB_TOKEN}"
      api_base: "https://models.inference.ai.azure.com"
  - model_name: github/deepseek-r1
    litellm_params:
      model: openai/deepseek-r1
      api_key: "${GITHUB_TOKEN}"
      api_base: "https://models.inference.ai.azure.com"

  # Tier 6: Mistral La Plateforme (500K tokens/month, EU-hosted, GDPR)
  - model_name: mistral/mistral-7b
    litellm_params:
      model: mistral/open-mistral-7b
      api_key: "${MISTRAL_API_KEY}"
  - model_name: mistral/mixtral
    litellm_params:
      model: mistral/open-mixtral-8x7b
      api_key: "${MISTRAL_API_KEY}"

  # Tier 7: OpenRouter (200 req/day, 50+ free models)
  - model_name: openrouter/llama3
    litellm_params:
      model: openrouter/meta-llama/llama-3.2-3b-instruct:free
      api_key: "${OPENROUTER_API_KEY}"
  - model_name: openrouter/mistral
    litellm_params:
      model: openrouter/mistralai/mistral-7b-instruct:free
      api_key: "${OPENROUTER_API_KEY}"
  - model_name: openrouter/gemma
    litellm_params:
      model: openrouter/google/gemma-2-9b-it:free
      api_key: "${OPENROUTER_API_KEY}"

  # Tier 8: DeepSeek (free tier)
  - model_name: deepseek/chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: "${DEEPSEEK_API_KEY}"

  # Tier 9: HuggingFace Serverless Inference
  - model_name: huggingface/mistral
    litellm_params:
      model: huggingface/mistralai/Mistral-7B-Instruct-v0.3
      api_key: "${HF_API_TOKEN}"

router_settings:
  routing_strategy: "least-busy"
  num_retries: 3
  allowed_fails: 2
  cooldown_time: 60
  retry_after: 30

general_settings:
  master_key: "${LITELLM_MASTER_KEY}"

litellm_settings:
  request_timeout: 30
  drop_params: true
  set_verbose: false
