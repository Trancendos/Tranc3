  # ── Virtual: Rotation aliases ────────────────────────────────────────
  # These aliases trigger automatic failover across all models in the group.
  - model_name: "auto"
    litellm_params:
      model: "ollama/llama3.2"
    model_info:
      id: auto-primary
      mode: chat

router_settings:
  routing_strategy: "latency-based-routing"
  model_group_alias:
    "gpt-4": "groq/llama-3.3-70b-versatile"
    "gpt-3.5-turbo": "groq/llama-3.1-8b-instant"
    "claude-3-haiku": "gemini/gemini-2.0-flash"
    "text-davinci-003": "ollama/llama3.2"

  # Fallback chain: if primary fails, try in order
  fallbacks:
    - "ollama/llama3.2":
        - "groq/llama-3.3-70b-versatile"
        - "groq/llama-3.1-8b-instant"
        - "cerebras/llama3.1-70b"
        - "sambanova/Meta-Llama-3.3-70B-Instruct"
        - "gemini/gemini-2.0-flash"
        - "openrouter/meta-llama/llama-3.3-70b-instruct:free"
        - "mistral/mistral-small-latest"
        - "huggingface/microsoft/Phi-3-mini-4k-instruct"
    - "groq/llama-3.3-70b-versatile":
        - "cerebras/llama3.1-70b"
        - "sambanova/Meta-Llama-3.3-70B-Instruct"
        - "gemini/gemini-2.0-flash"
        - "openrouter/deepseek/deepseek-r1:free"
        - "mistral/mistral-small-latest"
        - "huggingface/microsoft/Phi-3-mini-4k-instruct"

  num_retries: 3
  request_timeout: 30
  retry_after: 2

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: "redis"
    host: "${REDIS_HOST:-valkey}"
    port: 6379
    ttl: 3600

  # Cost tracking — enforce zero-cost mandate
  max_budget: 0.0
  budget_duration: "1d"

general_settings:
  master_key: "${LITELLM_MASTER_KEY:-sk-tranc3-local}"
  database_url: "${LITELLM_DB_URL:-sqlite:////data/litellm.db}"
  store_model_in_db: true

  # Rate limiting — aligned with provider free-tier limits
  rate_limit_per_user: true
  rpm_limit_per_model:
    "groq/llama-3.3-70b-versatile": 30
    "cerebras/llama3.1-70b": 30
    "gemini/gemini-2.0-flash": 15
    "github_models/gpt-4o-mini": 15
