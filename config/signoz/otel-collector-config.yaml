receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: tranc3-workers
          scrape_interval: 15s
          static_configs:
            - targets:
                - tranc3-ai:8001
                - api-gateway:8003
                - infinity-ws:8004
                - infinity-auth:8005

processors:
  batch:
    send_batch_size: 10000
    send_batch_max_size: 11000
    timeout: 10s
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 20

exporters:
  clickhousetraces:
    datasource: tcp://signoz:${SIGNOZ_CLICKHOUSE_PASSWORD:-signoz-dev-password}@signoz-clickhouse:9000/signoz_traces
  clickhousemetrics:
    datasource: tcp://signoz:${SIGNOZ_CLICKHOUSE_PASSWORD:-signoz-dev-password}@signoz-clickhouse:9000/signoz_traces
  clickhouselogs:
    datasource: tcp://signoz:${SIGNOZ_CLICKHOUSE_PASSWORD:-signoz-dev-password}@signoz-clickhouse:9000/signoz_logs

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhousetraces]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [clickhousemetrics]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouselogs]
