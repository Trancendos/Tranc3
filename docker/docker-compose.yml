# TRANC3 — Docker Compose Configuration
# Security-hardened: resource limits, non-root, no privileged access
# Updated: 2025-07 — CVE Remediation

version: "3.9"

services:
  tranc3:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tranc3-core
    volumes:
      - ../models:/tranc3/models:ro
      - ../data:/tranc3/data:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONHASHSEED=random
    stdin_open: true
    tty: true
    command: python scripts/chat.py
    # Security: Resource limits
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M
    # Security: No privilege escalation
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=256M

  tranc3-train:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tranc3-trainer
    volumes:
      - ../models:/tranc3/models
      - ../data:/tranc3/data:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONHASHSEED=random
    # GPU support — remove the deploy block if no NVIDIA GPU available
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 16G
    security_opt:
      - no-new-privileges:true
    command: python scripts/train.py --size medium
    profiles:
      - training  # only starts when: docker compose --profile training up
