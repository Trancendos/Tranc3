      context: workers/users-service
      dockerfile: Dockerfile
    container_name: tranc3-users-service
    environment:
      WORKER_PORT: "8006"
    ports:
      - "8006:8006"
    volumes:
      - users_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 5s
      retries: 3

