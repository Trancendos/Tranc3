# .forgejo/workflows/proactive-security.yml
# Proactive Security Scanner — AST-based CodeQL pattern prevention.
#
# This workflow runs the custom security_automation framework that was built
# from the lessons learned during the ~297 CodeQL alert remediation. It
# enforces secure coding patterns at the CI level, catching the same
# CWE/PY categories that CodeQL flagged before they can regress.
#
# Rule categories enforced:
#   CWE-022  Path traversal — user input in open()/os.path operations
#   CWE-117  Log injection — f-string in logger calls
#   CWE-209  Info exposure — str(exc) in HTTP error responses
#   CWE-327  Weak hashing — md5/sha1 used for security purposes
#   CWE-605  Bind all interfaces — 0.0.0.0 host bindings
#   PY-001   Bare except: blocks
#   PY-002   __exc__/__exc__ variable references (not in Python 3.11)
#   PY-003   type(__exc).__name__ patterns
#   PY-004   Uncontext-managed open() calls
#   PY-005–009  Import/variable quality issues
#
# Runs: on every push/PR to main, and daily at 06:00 UTC.
# Quality gate: FAILS the build on any critical or high violations.

name: Proactive Security Scanner

on:
  push:
    branches: [main, "security/*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # Daily 06:00 UTC
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Proactive Security Scan — AST-based pattern detection
  # ──────────────────────────────────────────────────────────────────────
  proactive-scan:
    name: Proactive Security Scan (AST)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt 2>/dev/null || true

      - name: Run proactive security scanner (quality gate)
        run: |
          mkdir -p logs
          python -m Dimensional.security_automation gate \
            --max-critical 0 \
            --max-high 0 \
            --max-medium 20 \
            --max-low 100 \
            --max-total 150 \
            --save \
            --telemetry-dir .security_telemetry \
            src/ Dimensional/ workers/

      - name: Generate security report
        if: always()
        run: |
          python -m Dimensional.security_automation report \
            --format markdown \
            --output logs/proactive-security-report.md \
            --save \
            --telemetry-dir .security_telemetry \
            src/ Dimensional/ workers/ || true

      - name: Generate JSON scan results
        if: always()
        run: |
          python -m Dimensional.security_automation scan \
            --format json \
            --output logs/proactive-scan-results.json \
            src/ Dimensional/ workers/ || true

      - name: Auto-fix dry-run report
        if: always()
        run: |
          echo "=== Auto-fix Dry Run ===" > logs/autofix-dryrun.txt
          python -m Dimensional.security_automation fix \
            --dry-run \
            src/ Dimensional/ workers/ >> logs/autofix-dryrun.txt 2>&1 || true

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proactive-security-${{ github.run_number }}
          path: |
            logs/proactive-security-report.md
            logs/proactive-scan-results.json
            logs/autofix-dryrun.txt
            .security_telemetry/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────
  # Trend Analysis — compare with previous scan results
  # ──────────────────────────────────────────────────────────────────────
  trend-analysis:
    name: Security Trend Analysis
    runs-on: self-hosted
    needs: [proactive-scan]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt 2>/dev/null || true

      - name: Download previous telemetry
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: proactive-security-*
          path: .security_telemetry

      - name: Generate trend report
        if: always()
        run: |
          python -c "
          from Dimensional.security_automation.telemetry import SecurityTelemetry
          telemetry = SecurityTelemetry(storage_dir='.security_telemetry')
          trends = telemetry.trend(limit=10)
          if trends:
              print('=== Security Compliance Trend (last 10 scans) ===')
              print(f'{\"Date\":<28} {\"Total\":>6} {\"Crit\":>5} {\"High\":>5} {\"Med\":>5} {\"Low\":>5}')
              for t in trends:
                  print(f'{t.timestamp:<28} {t.total:>6} {t.critical:>5} {t.high:>5} {t.medium:>5} {t.low:>5}')

              # Diff latest two scans
              diff = telemetry.diff()
              if diff and (diff.new_count or diff.fixed_count):
                  print()
                  print(f'=== Diff (vs previous scan) ===')
                  print(f'New violations:      {diff.new_count}')
                  print(f'Fixed violations:    {diff.fixed_count}')
                  print(f'Persistent:          {diff.persistent_count}')
                  print(f'Delta:               {diff.delta_total:+d}')
                  if diff.improved:
                      print('✅ Trend: IMPROVING (more fixed than new)')
                  else:
                      print('⚠️  Trend: REGRESSING (more new than fixed)')
          else:
              print('No historical scan data available yet.')
          " || true

      - name: Cleanup old telemetry
        if: always()
        run: |
          python -c "
          from Dimensional.security_automation.telemetry import SecurityTelemetry
          telemetry = SecurityTelemetry(storage_dir='.security_telemetry')
          removed = telemetry.cleanup(keep=30)
          if removed:
              print(f'Cleaned up {removed} old scan results')
          " || true
