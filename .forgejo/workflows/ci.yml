name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Fast gate — smoke tests + linting (~30s)
  # ─────────────────────────────────────────────────────────────────────────
  smoke:
    name: Smoke tests + lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install uv (fast Python package manager)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv --version

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv pip install --system -r requirements.txt

      - name: Lint (ruff)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv pip install --system ruff --quiet
          ruff check src/ api.py --select E,F,W --ignore E501 || true

      - name: Validate EA workbook CSVs
        run: python scripts/validate_ea_workbook.py

      - name: Create logs dir
        run: mkdir -p logs

      - name: Smoke tests
        run: python -m pytest tests/test_smoke.py -v --tb=short -q
        env:
          SECRET_KEY: ci-test-secret-not-for-prod
          JWT_SECRET: ci-test-jwt-secret-not-for-prod
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test

      - name: MCP / Spark import check
        run: |
          python -c "
          from src.mcp.tools import registry
          tools = registry.list_tools()
          print(f'Spark tools registered: {len(tools)}')
          assert len(tools) >= 17, f'Expected ≥17 tools, got {len(tools)}'
          "
        env:
          SECRET_KEY: ci-test-secret-not-for-prod
          JWT_SECRET: ci-test-jwt-secret-not-for-prod
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0

      - name: Router import check
        run: |
          python -c "
          import importlib, sys
          sys.path.insert(0, '.')
          mods = [
            'src.mcp.server', 'src.workflow.routes', 'src.observability.routes',
          ]
          ok = []
          skip = []
          for m in mods:
            try:
              importlib.import_module(m)
              ok.append(m)
            except Exception as e:
              skip.append((m, str(e)))
          for m in ok:
            print(f'  ✓ {m}')
          for m, e in skip:
            print(f'  ⚠ {m}: {e}')
          if skip:
            print(f'Note: {len(skip)} modules skipped (optional deps)')
          print(f'{len(ok)} router modules import cleanly')
          "
        env:
          SECRET_KEY: ci-test-secret-not-for-prod
          JWT_SECRET: ci-test-jwt-secret-not-for-prod
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0

  # ─────────────────────────────────────────────────────────────────────────
  # Full suite — all test categories
  # ─────────────────────────────────────────────────────────────────────────
  full-suite:
    name: Full test suite
    runs-on: self-hosted
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install uv (fast Python package manager)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv --version

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv pip install --system -r requirements.txt

      - name: Create logs dir
        run: mkdir -p logs

      - name: Run full test suite
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_tranc3_ml.py \
            -q --tb=short \
            --junitxml=logs/junit.xml
        env:
          SECRET_KEY: ci-test-secret-not-for-prod
          JWT_SECRET: ci-test-jwt-secret-not-for-prod
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            logs/test_results.jsonl
            logs/junit.xml
          retention-days: 30

      - name: Notify The Citadel on failure
        if: failure()
        run: |
          echo "CI failed on branch ${{ github.ref_name }} — check logs"
          # When Citadel webhook is live this will auto-create an incident

  # ─────────────────────────────────────────────────────────────────────────
  # Worker validation — import-check all 29 self-hosted workers
  # ─────────────────────────────────────────────────────────────────────────
  worker-validation:
    name: Worker import validation
    runs-on: self-hosted
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install uv (fast Python package manager)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv --version

      - name: Install base worker deps
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv pip install --system fastapi>=0.110.0 uvicorn>=0.29.0 pydantic>=2.0.0 httpx>=0.27.0 python-multipart>=0.0.9

      - name: Validate all worker modules parse cleanly
        run: |
          python - <<'EOF'
          import ast, sys, os, pathlib

          workers_dir = pathlib.Path("workers")
          failed = []
          passed = []

          for worker_py in sorted(workers_dir.glob("*/worker.py")):
              try:
                  src = worker_py.read_text()
                  ast.parse(src)
                  passed.append(str(worker_py))
              except SyntaxError as e:
                  failed.append((str(worker_py), str(e)))

          for p in passed:
              print(f"  ✓ {p}")
          for p, e in failed:
              print(f"  ✗ {p}: {e}", file=sys.stderr)

          print(f"\n{len(passed)} workers OK, {len(failed)} failed")
          if failed:
              sys.exit(1)
          EOF

      - name: Validate worker requirements files
        run: |
          python - <<'EOF'
          import pathlib, sys

          workers_dir = pathlib.Path("workers")
          missing = []
          for svc in sorted(workers_dir.iterdir()):
              if not svc.is_dir():
                  continue
              if not (svc / "worker.py").exists():
                  continue
              req = svc / "requirements-worker.txt"
              if not req.exists():
                  missing.append(str(svc))

          if missing:
              print("Missing requirements-worker.txt:")
              for m in missing:
                  print(f"  ✗ {m}")
              sys.exit(1)
          else:
              print("All workers have requirements-worker.txt ✓")
          EOF

      - name: Check worker health endpoint definitions
        run: |
          python - <<'EOF'
          import pathlib, sys, re

          workers_dir = pathlib.Path("workers")
          missing_health = []

          for worker_py in sorted(workers_dir.glob("*/worker.py")):
              src = worker_py.read_text()
              if '@app.get("/health")' not in src and "@app.get('/health')" not in src:
                  missing_health.append(str(worker_py))

          if missing_health:
              print("Workers missing /health endpoint:")
              for m in missing_health:
                  print(f"  ✗ {m}")
              sys.exit(1)
          else:
              print("All workers expose /health endpoint ✓")
          EOF
