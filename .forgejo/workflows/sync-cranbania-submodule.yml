# .forgejo/workflows/sync-cranbania-submodule.yml
# The Workshop — Automatically advances the CranBania git submodule pointer
# in the main Tranc3 repo when a new commit lands on CranBania/main.
#
# Triggered two ways:
#   1. Webhook/dispatch from CranBania's Woodpecker CI after a successful push
#   2. Manual workflow_dispatch (for recovery or initial setup)
#
# Secrets required:
#   FORGEJO_TOKEN  — Forgejo personal access token with repo:write scope
#   GH_PAT         — GitHub PAT with repo scope (push to github.com/Trancendos/CranBania)
#
# Result: opens a PR on Tranc3 main branch titled
#         "chore(submodule): advance CranBania to <sha>"

name: Sync CranBania Submodule

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "CranBania commit SHA to pin (leave blank for HEAD of main)"
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tranc3
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "The Workshop (CI)"
          git config user.email "ci@trancendos.com"

      - name: Advance CranBania submodule
        run: |
          cd workers/cranbania
          git fetch origin main
          TARGET_SHA="${{ github.event.inputs.sha }}"
          if [ -z "$TARGET_SHA" ]; then
            TARGET_SHA=$(git rev-parse origin/main)
          fi
          git checkout "$TARGET_SHA"
          cd ../..
          git add workers/cranbania
          CURRENT=$(git -C workers/cranbania rev-parse --short HEAD)
          git commit -m "chore(submodule): advance CranBania to ${CURRENT}

Auto-synced by sync-cranbania-submodule Forgejo workflow.
Full SHA: ${TARGET_SHA}

https://claude.ai/code" || echo "Nothing to advance"

      - name: Push branch and open PR
        run: |
          BRANCH="auto/cranbania-$(git -C workers/cranbania rev-parse --short HEAD)"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

          # Open PR via Forgejo API
          curl -sf -X POST "${FORGEJO_API}/repos/${REPO}/pulls" \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "chore(submodule): advance CranBania to '"$(git -C workers/cranbania rev-parse --short HEAD)"'",
              "body": "Auto-generated by sync-cranbania-submodule workflow.\n\nAdvances `workers/cranbania` submodule pointer to the latest CranBania/main commit.",
              "head": "'"$BRANCH"'",
              "base": "main"
            }' || echo "PR creation failed (may already exist)"
        env:
          FORGEJO_API: ${{ secrets.FORGEJO_URL }}/api/v1
          REPO: trancendos/tranc3
