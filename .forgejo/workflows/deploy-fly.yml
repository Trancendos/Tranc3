name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "Dockerfile"
      - "fly.toml"
      - "requirements.txt"
      - "tranc3-bots/**"
      - ".forgejo/workflows/deploy-fly.yml"
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Tranc3 backend
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-bots:
    name: Deploy tranc3-bots
    runs-on: self-hosted
    needs: deploy-backend
    defaults:
      run:
        working-directory: tranc3-bots
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
