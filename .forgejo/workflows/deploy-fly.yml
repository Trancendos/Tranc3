name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "Dockerfile"
      - "fly.toml"
      - "requirements.txt"
      - "web/**"
      - "tranc3-bots/**"
      - ".forgejo/workflows/deploy-fly.yml"
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Tranc3 backend
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node (frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: web
        run: npm install && npm run build

      - name: Install flyctl
        run: |
          if ! command -v flyctl &>/dev/null; then
            curl -L https://fly.io/install.sh | sh
            echo "$HOME/.fly/bin" >> "$GITHUB_PATH"
          fi

      - name: Deploy backend
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-bots:
    name: Deploy tranc3-bots
    runs-on: self-hosted
    needs: deploy-backend
    defaults:
      run:
        working-directory: tranc3-bots
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          if ! command -v flyctl &>/dev/null; then
            curl -L https://fly.io/install.sh | sh
            echo "$HOME/.fly/bin" >> "$GITHUB_PATH"
          fi

      - name: Deploy bots
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wire bots URL into backend secrets
        run: |
          flyctl secrets set \
            TRANC3_BOTS_URL=https://tranc3-bots.fly.dev \
            TRANC3_NANO_URL=https://tranc3-backend.fly.dev \
            --app tranc3-backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
