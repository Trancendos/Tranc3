# .forgejo/workflows/adaptive-ci.yml
# Adaptive CI/CD Pipeline — intelligent quality gates with trend analysis,
# auto-issue creation on regression, and security telemetry integration.
#
# This workflow augments the existing CI pipeline with:
#   1. Adaptive quality gates — thresholds adjust based on codebase maturity
#   2. Trend-based pass/fail — regression detection via historical comparison
#   3. Auto-issue creation — Forgejo issues on security regression
#   4. Security telemetry — integrated metrics collection and reporting
#   5. Configuration drift check — detect config drift in CI
#
# Zero-Cost Mandate: All tools are free/open-source. No paid cloud services.
# Forgejo CI only — NO GitHub Actions.

name: Adaptive CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────────────
  # Adaptive Quality Gate — runs the proactive scanner with adaptive thresholds
  # ────────────────────────────────────────────────────────────────
  adaptive-quality-gate:
    name: Adaptive Quality Gate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt 2>/dev/null || true

      - name: Run adaptive security scan
        run: |
          mkdir -p logs .security_telemetry .security_learning
          python -c "
          import json, os, sys
          from Dimensional.security_automation.adaptive_scanner import AdaptiveScanner

          scanner = AdaptiveScanner()
          violations = scanner.scan_path('src/')
          violations += scanner.scan_path('Dimensional/')
          scanner.save()

          # Categorize by severity and confidence
          by_severity = {'critical': [], 'high': [], 'medium': [], 'low': []}
          by_confidence = {'high': [], 'medium': [], 'low': []}

          for v in violations:
              by_severity.get(v.severity, by_severity['low']).append(v)
              by_confidence.get(v.confidence.value, by_confidence['low']).append(v)

          # Output summary
          summary = {
              'total': len(violations),
              'by_severity': {k: len(v) for k, v in by_severity.items()},
              'by_confidence': {k: len(v) for k, v in by_confidence.items()},
              'stats': scanner.get_stats(),
          }

          with open('logs/adaptive-scan-results.json', 'w') as f:
              json.dump(summary, f, indent=2, default=str)

          print(f'Total violations: {summary[\"total\"]}')
          print(f'By severity: {summary[\"by_severity\"]}')
          print(f'By confidence: {summary[\"by_confidence\"]}')
          print(f'Learning stats: {summary[\"stats\"]}')

          # Adaptive gate: use confidence-weighted counts
          # High-confidence violations count fully; medium count 0.5; low count 0.1
          effective_critical = len(by_confidence.get('high', []))
          effective_total = (
              len(by_confidence.get('high', [])) * 1.0 +
              len(by_confidence.get('medium', [])) * 0.5 +
              len(by_confidence.get('low', [])) * 0.1
          )

          # Write gate results
          gate = {
              'passed': effective_critical == 0 and effective_total <= 50,
              'effective_critical': effective_critical,
              'effective_total': round(effective_total, 1),
              'threshold_critical': 0,
              'threshold_effective': 50,
          }
          with open('logs/adaptive-gate.json', 'w') as f:
              json.dump(gate, f, indent=2)

          print(f'Gate: {\"PASSED\" if gate[\"passed\"] else \"FAILED\"} (effective_critical={gate[\"effective_critical\"]}, effective_total={gate[\"effective_total\"]})')
          sys.exit(1 if not gate['passed'] else 0)
          "
        env:
          SECRET_KEY: ci-adaptive-gate-not-for-prod
          ENVIRONMENT: test
        continue-on-error: true

      - name: Run violation prediction
        if: always()
        run: |
          python -c "
          import json
          from Dimensional.security_automation.predictor import ViolationPredictor

          predictor = ViolationPredictor()
          predictions = predictor.predict_path('src/')
          predictions += predictor.predict_path('Dimensional/')

          # Top 10 highest risk areas
          predictions.sort(key=lambda p: p.risk_score, reverse=True)
          top = predictions[:10]

          summary = {
              'total_predictions': len(predictions),
              'high_risk_areas': [
                  {'path': p.file_path, 'risk_score': round(p.risk_score, 3), 'signals': [s.signal_type for s in p.signals[:3]]}
                  for p in top
              ],
          }

          with open('logs/prediction-results.json', 'w') as f:
              json.dump(summary, f, indent=2)

          print(f'Prediction: {len(predictions)} areas analyzed, top {len(top)} high-risk:')
          for p in top:
              print(f'  {p.file_path}: risk={p.risk_score:.3f} ({len(p.signals)} signals)')
          " || true

      - name: Run auto-fix dry-run with remediator v2
        if: always()
        run: |
          python -c "
          from Dimensional.security_automation.remediator_v2 import AutoRemediatorV2

          remediator = AutoRemediatorV2(dry_run=True)
          results = remediator.fix_path('src/')
          results += remediator.fix_path('Dimensional/')

          print(f'Dry-run: {len(results)} fixes available')
          for r in results[:10]:
              print(f'  {r.file_path}: {r.rule_id} → {\"would fix\" if r.success else \"skipped\"}')
          " > logs/autofix-v2-dryrun.txt 2>&1 || true

      - name: Upload adaptive scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: adaptive-quality-gate-${{ github.run_number }}
          path: |
            logs/adaptive-scan-results.json
            logs/adaptive-gate.json
            logs/prediction-results.json
            logs/autofix-v2-dryrun.txt
            .security_learning/
          retention-days: 30

  # ────────────────────────────────────────────────────────────────
  # Trend-Based Pass/Fail — compare with historical scan data
  # ────────────────────────────────────────────────────────────────
  trend-analysis:
    name: Trend-Based Regression Detection
    runs-on: self-hosted
    needs: [adaptive-quality-gate]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt 2>/dev/null || true

      - name: Download previous telemetry
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: adaptive-quality-gate-*
          path: .security_telemetry

      - name: Download previous proactive scan
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: proactive-security-*
          path: .security_telemetry

      - name: Run trend-based regression detection
        run: |
          mkdir -p logs
          python -c "
          import json, os, sys
          from Dimensional.security_automation.telemetry import SecurityTelemetry

          telemetry = SecurityTelemetry(storage_dir='.security_telemetry')

          # Get trend data
          trends = telemetry.trend(limit=10)
          diff = telemetry.diff()

          regression_detected = False
          report = {
              'has_historical_data': len(trends) > 1,
              'scan_count': len(trends),
              'diff': None,
              'regression': False,
              'regression_details': [],
          }

          if diff:
              report['diff'] = {
                  'new_count': diff.new_count,
                  'fixed_count': diff.fixed_count,
                  'persistent_count': diff.persistent_count,
                  'delta_total': diff.delta_total,
                  'improved': diff.improved,
              }

              # Regression detection: more new violations than fixed
              if not diff.improved and diff.new_count > diff.fixed_count:
                  regression_detected = True
                  report['regression'] = True
                  report['regression_details'].append(
                      f'New violations ({diff.new_count}) exceed fixed ({diff.fixed_count})'
                  )

              # Critical regression: any new critical violations
              if hasattr(diff, 'new_critical') and getattr(diff, 'new_critical', 0) > 0:
                  regression_detected = True
                  report['regression'] = True
                  report['regression_details'].append('New CRITICAL violations detected')

          with open('logs/trend-regression.json', 'w') as f:
              json.dump(report, f, indent=2)

          if trends:
              print('=== Security Trend (last 10 scans) ===')
              for t in trends:
                  print(f'  {t.timestamp}: total={t.total} crit={t.critical} high={t.high} med={t.medium} low={t.low}')

          if diff:
              print(f'Diff: +{diff.new_count} new, -{diff.fixed_count} fixed, delta={diff.delta_total:+d}')
              print(f'Trend: {\"IMPROVING\" if diff.improved else \"REGRESSING\"}')

          if regression_detected:
              print(f'REGRESSION DETECTED: {report[\"regression_details\"]}')
              # Write a flag file for the auto-issue step
              with open('logs/regression-flag.txt', 'w') as f:
                  f.write('\\n'.join(report['regression_details']))
              sys.exit(1)
          else:
              print('No regression detected — trend is stable or improving.')
          " || true

      - name: Upload trend analysis
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trend-analysis-${{ github.run_number }}
          path: |
            logs/trend-regression.json
            logs/regression-flag.txt
          retention-days: 30

  # ────────────────────────────────────────────────────────────────
  # Auto-Issue Creation — create Forgejo issue on security regression
  # ────────────────────────────────────────────────────────────────
  auto-issue:
    name: Auto-Issue on Regression
    runs-on: self-hosted
    needs: [trend-analysis]
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Create Forgejo issue for regression
        run: |
          # Check if regression flag exists
          if [ ! -f logs/regression-flag.txt ]; then
            echo "No regression flag — skipping issue creation"
            exit 0
          fi

          REGRESSION_DETAILS=$(cat logs/regression-flag.txt)
          BRANCH="${{ github.ref_name }}"
          RUN_NUMBER="${{ github.run_number }}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Create issue via Forgejo API (self-hosted, zero-cost)
          # FORGEJO_TOKEN should be set as a CI secret
          if [ -n "$FORGEJO_TOKEN" ]; then
            curl -sf -X POST "https://forgejo.trancendos.ai/api/v1/repos/${{ github.repository }}/issues" \
              -H "Authorization: token $FORGEJO_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"title\": \"🚨 Security Regression Detected (run #${RUN_NUMBER})\",
                \"body\": \"## Security Regression Report\\n\\n**Branch:** ${BRANCH}\\n**Run:** #${RUN_NUMBER}\\n**Detected:** ${TIMESTAMP}\\n\\n### Details\\n\`\`\`\\n${REGRESSION_DETAILS}\\n\`\`\`\\n\\n### Actions\\n1. Review the trend analysis artifact\\n2. Identify new violations\\n3. Fix or suppress with justification\\n4. Re-run CI to verify\\n\\n---\\n*Auto-generated by Adaptive CI pipeline*\",
                \"labels\": [\"security\", \"regression\", \"automated\"]
              }" || echo "Issue creation skipped (Forgejo API unavailable)"
          else
            echo "FORGEJO_TOKEN not set — skipping issue creation"
            echo "Regression details: ${REGRESSION_DETAILS}"
          fi
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  # Config Drift Detection — check for configuration drift
  # ────────────────────────────────────────────────────────────────
  config-drift:
    name: Configuration Drift Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt 2>/dev/null || true

      - name: Run config drift detection
        run: |
          mkdir -p logs
          python -c "
          import json
          from Dimensional.orchestration.config_drift import ConfigDriftDetector

          detector = ConfigDriftDetector(
              root_dir='.',
              config_files=[
                  'docker-compose.yml',
                  '.env',
                  'pyproject.toml',
                  'requirements.txt',
              ],
              env_vars=[
                  'SYSTEM_MODE',
                  'ENVIRONMENT',
                  'API_PORT',
                  'LOG_LEVEL',
              ],
          )

          # Capture baseline if not exists, then detect drift
          import os
          if not os.path.exists('.config_baseline/baseline.json'):
              detector.capture_baseline()
              print('Initial baseline captured — no drift to detect')
          else:
              report = detector.detect_drift()
              with open('logs/drift-report.json', 'w') as f:
                  json.dump(report.to_dict(), f, indent=2)

              print(f'Drift: {report.drift_count} items detected')
              if report.has_critical:
                  print('CRITICAL drift detected!')
              if report.has_warnings:
                  print('WARNING-level drift detected')
              for item in report.items:
                  print(f'  [{item.severity.value}] {item.category}/{item.key}: {item.description}')
          " || true

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: config-drift-${{ github.run_number }}
          path: |
            logs/drift-report.json
          retention-days: 30

  # ────────────────────────────────────────────────────────────────
  # Security Telemetry Integration — aggregate all metrics
  # ────────────────────────────────────────────────────────────────
  security-telemetry:
    name: Security Telemetry Aggregation
    runs-on: self-hosted
    needs: [adaptive-quality-gate, trend-analysis, config-drift]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt 2>/dev/null || true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: "{adaptive-quality-gate-*,trend-analysis-*,config-drift-*}"
          path: ci-artifacts

      - name: Generate security telemetry report
        if: always()
        run: |
          mkdir -p logs
          python -c "
          import json, os, glob, sys
          from datetime import datetime

          telemetry = {
              'timestamp': datetime.utcnow().isoformat() + 'Z',
              'branch': '${{ github.ref_name }}',
              'run_number': '${{ github.run_number }}',
              'commit': '${{ github.sha }}',
              'adaptive_gate': None,
              'trend': None,
              'drift': None,
              'predictions': None,
          }

          # Parse adaptive gate results
          gate_files = glob.glob('ci-artifacts/**/adaptive-gate.json', recursive=True)
          if gate_files:
              with open(gate_files[0]) as f:
                  telemetry['adaptive_gate'] = json.load(f)

          # Parse trend results
          trend_files = glob.glob('ci-artifacts/**/trend-regression.json', recursive=True)
          if trend_files:
              with open(trend_files[0]) as f:
                  telemetry['trend'] = json.load(f)

          # Parse drift results
          drift_files = glob.glob('ci-artifacts/**/drift-report.json', recursive=True)
          if drift_files:
              with open(drift_files[0]) as f:
                  telemetry['drift'] = json.load(f)

          # Parse prediction results
          pred_files = glob.glob('ci-artifacts/**/prediction-results.json', recursive=True)
          if pred_files:
              with open(pred_files[0]) as f:
                  telemetry['predictions'] = json.load(f)

          # Write aggregated telemetry
          with open('logs/security-telemetry.json', 'w') as f:
              json.dump(telemetry, f, indent=2)

          # Generate human-readable summary
          print('=== Security Telemetry Summary ===')
          print(f'Branch: {telemetry[\"branch\"]}')
          print(f'Run: #{telemetry[\"run_number\"]}')
          print()

          if telemetry['adaptive_gate']:
              g = telemetry['adaptive_gate']
              print(f'Quality Gate: {\"PASSED\" if g.get(\"passed\") else \"FAILED\"}')
              print(f'  Effective critical: {g.get(\"effective_critical\", \"?\")}')
              print(f'  Effective total: {g.get(\"effective_total\", \"?\")}')

          if telemetry['trend']:
              t = telemetry['trend']
              print(f'Trend: {\"REGRESSING\" if t.get(\"regression\") else \"STABLE/IMPROVING\"}')
              if t.get('diff'):
                  d = t['diff']
                  print(f'  +{d.get(\"new_count\", 0)} new, -{d.get(\"fixed_count\", 0)} fixed')

          if telemetry['drift']:
              d = telemetry['drift']
              print(f'Config Drift: {d.get(\"drift_count\", 0)} items')
              if d.get('has_critical'):
                  print('  ⚠️  CRITICAL drift detected')

          if telemetry['predictions']:
              p = telemetry['predictions']
              print(f'Predictions: {p.get(\"total_predictions\", 0)} areas analyzed')

          # Overall health score (0-100)
          score = 100
          if telemetry['adaptive_gate'] and not telemetry['adaptive_gate'].get('passed'):
              score -= 30
          if telemetry['trend'] and telemetry['trend'].get('regression'):
              score -= 25
          if telemetry['drift'] and telemetry['drift'].get('has_critical'):
              score -= 20
          score = max(0, score)

          print(f'\\nOverall Security Health Score: {score}/100')

          with open('logs/health-score.txt', 'w') as f:
              f.write(str(score))
          " || true

      - name: Upload security telemetry
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-telemetry-${{ github.run_number }}
          path: |
            logs/security-telemetry.json
            logs/health-score.txt
          retention-days: 90

      - name: Notify on low health score
        if: always()
        run: |
          if [ -f logs/health-score.txt ]; then
            SCORE=$(cat logs/health-score.txt)
            if [ "$SCORE" -lt 70 ] 2>/dev/null; then
              echo "::warning::Security health score is ${SCORE}/100 — review required"
            fi
          fi
