# .forgejo/workflows/nightly.yml
# Nightly full test sweep — runs at 03:00 UTC every day.
# Covers all test categories: smoke, uat, chaos, compliance, compatibility,
# validation, nanoservices, penetration, and spark/grid integration.
# Results stored as artifacts and posted to The Citadel on failure.

name: Nightly Tests

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch:       # Also triggerable manually

jobs:
  nightly-full:
    name: Full nightly suite
    runs-on: self-hosted
    timeout-minutes: 60
    env:
      SECRET_KEY: nightly-ci-key-not-for-prod
      ENVIRONMENT: test
      REDIS_URL: ""
      DATABASE_URL: ""

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create logs dir
        run: mkdir -p logs

      - name: Smoke tests
        run: python -m pytest tests/test_smoke.py -v --tb=short -q --junitxml=logs/smoke.xml

      - name: UAT tests
        run: python -m pytest tests/test_uat.py -v --tb=short -q --junitxml=logs/uat.xml
        continue-on-error: true

      - name: Chaos tests (fault injection)
        run: python -m pytest tests/test_chaos.py -v --tb=short -q --junitxml=logs/chaos.xml
        continue-on-error: true

      - name: Compliance tests (MCP / GDPR / error catalog)
        run: python -m pytest tests/test_compliance.py -v --tb=short -q --junitxml=logs/compliance.xml
        continue-on-error: true

      - name: Compatibility tests (JSON-RPC 2.0 / Pydantic v2)
        run: python -m pytest tests/test_compatibility.py -v --tb=short -q --junitxml=logs/compatibility.xml
        continue-on-error: true

      - name: Validation tests
        run: python -m pytest tests/test_validation.py -v --tb=short -q --junitxml=logs/validation.xml
        continue-on-error: true

      - name: Nanoservice tests
        run: python -m pytest tests/test_nanoservices.py -v --tb=short -q --junitxml=logs/nanoservices.xml
        continue-on-error: true

      - name: Penetration tests (OWASP injection)
        run: python -m pytest tests/test_penetration.py -v --tb=short -q --junitxml=logs/penetration.xml
        continue-on-error: true

      - name: Spark + Digital Grid integration
        run: python -m pytest tests/test_spark_grid_integration.py -v --tb=short -q --junitxml=logs/spark_grid.xml
        continue-on-error: true

      - name: Aggregate results
        if: always()
        run: |
          echo "=== Nightly test summary ===" | tee logs/nightly-summary.txt
          for f in logs/*.xml; do
            name=$(basename "$f" .xml)
            passed=$(grep -o 'tests="[0-9]*"' "$f" | grep -o '[0-9]*' | head -1 || echo "?")
            failed=$(grep -o 'failures="[0-9]*"' "$f" | grep -o '[0-9]*' | head -1 || echo "?")
            errors=$(grep -o 'errors="[0-9]*"' "$f" | grep -o '[0-9]*' | head -1 || echo "?")
            echo "  $name: tests=$passed failures=$failed errors=$errors" | tee -a logs/nightly-summary.txt
          done

      - name: Upload all test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: nightly-results-${{ github.run_number }}
          path: logs/
          retention-days: 90

      - name: Notify The Citadel on failure
        if: failure()
        run: |
          curl -sf -X POST "https://trancendos-backend.fly.dev/citadel/webhooks/forgejo" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"nightly_failure\",
              \"run_id\": \"${{ github.run_id }}\",
              \"repo\": \"${{ github.repository }}\",
              \"message\": \"Nightly test suite failed — run #${{ github.run_number }}\"
            }" || echo "Citadel notification skipped"

  nightly-lint:
    name: Nightly lint + type check
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install lint tools
        run: python3 -m pip install ruff mypy --quiet

      - name: ruff (full check)
        run: ruff check src/ api.py --select E,F,W,C,B --ignore E501 || true

      - name: mypy (type check core modules)
        run: |
          mypy src/core/ src/mcp/ src/workflow/ \
            --ignore-missing-imports \
            --no-error-summary \
            --show-error-codes || true
