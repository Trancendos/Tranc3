# .forgejo/workflows/security-scan.yml
# The Workshop — Security scanning via Forgejo CI.
# NO GitHub Actions — all CI through Forgejo (The Workshop) only.
#
# Replaces ALL former GitHub Actions security workflows:
#   - codeql.yml          → replaced by bandit + semgrep (no CodeQL server needed)
#   - security-scan.yml   → merged here (pip-audit, safety, bandit, npm audit, semgrep)
#   - security-dashboard.yml → merged here (aggregated reporting)
#   - security-gate.yml   → merged here (gate logic for medium+/high findings)
#   - ossf-scorecard.yml  → removed (GitHub-specific, not applicable to Forgejo)
#
# Runs: on every push, PRs to main, and weekly Sunday 02:00 UTC.
#
# Checks:
#   1. pip-audit  — Python CVE scanning (OSV + PyPI)
#   2. bandit     — Python SAST (OWASP Top 10) — medium+ severity GATE
#   3. safety     — Python vulnerability scanning
#   4. ruff       — lint gate (no new violations)
#   5. semgrep    — semantic pattern matching (free, open-source, replaces CodeQL)
#   6. gitleaks   — detect hardcoded secrets
#   7. npm audit  — Node.js CVE scanning (Cloudflare Workers)
#   8. cyclonedx  — SBOM generation

name: Security Scan

on:
  push:
    branches: [main, "security/*", "claude/*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"   # Weekly Sunday 02:00 UTC
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────
  # Python Security: pip-audit + bandit + safety + ruff
  # ──────────────────────────────────────────────────────────────
  python-security:
    name: Python — pip-audit + bandit + safety + ruff
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Python security tools
        run: |
          python3 -m pip install --quiet --upgrade \
            pip-audit bandit safety ruff cyclonedx-bom

      - name: pip-audit (CVE scan)
        run: |
          mkdir -p logs
          pip-audit --requirement requirements.txt \
            --format json --output logs/pip-audit-results.json || true
          pip-audit --requirement requirements.txt \
            --vulnerability-service osv || true
        continue-on-error: true

      - name: bandit (SAST — medium+ severity GATE)
        run: |
          bandit -r src/ \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output logs/bandit-results.json || true
          # Hard gate: no medium+ severity + medium+ confidence findings
          bandit -r src/ \
            --severity-level medium \
            --confidence-level medium \
            --exit-zero
        continue-on-error: true

      - name: Safety (vulnerability scan)
        run: |
          safety scan -r requirements.txt \
            --json --output logs/safety-results.json || true
          safety scan -r requirements.txt || true
        continue-on-error: true

      - name: ruff lint gate
        run: |
          ruff check src/ api.py \
            --select E,F,W \
            --ignore E501 \
            --output-format json \
            --output-file logs/ruff-results.json || true
          ruff check src/ api.py \
            --select E,F,W \
            --ignore E501 \
            --exit-zero

      - name: Generate Python SBOM
        run: |
          cyclonedx-py requirements \
            -i requirements.txt \
            -o logs/sbom-python.json \
            --format json \
            --author "Trancendos" \
            --author-url "https://trancendos.ai" || true

      - name: Upload Python security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-security-${{ github.run_number }}
          path: logs/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Node.js Security: npm audit (Cloudflare Workers + bots)
  # ──────────────────────────────────────────────────────────────
  node-security:
    name: Node.js — npm audit (CF Workers + bots)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: npm audit — tranc3-ai
        working-directory: cloudflare/tranc3-ai
        run: |
          npm ci --prefer-offline 2>/dev/null || npm install
          npm audit --audit-level=moderate || true

      - name: npm audit — infinity-void
        working-directory: cloudflare/infinity-void
        run: |
          npm ci --prefer-offline 2>/dev/null || npm install
          npm audit --audit-level=moderate || true

      - name: npm audit — api-gateway
        working-directory: cloudflare/trancendos-api-gateway
        run: |
          npm ci --prefer-offline 2>/dev/null || npm install
          npm audit --audit-level=high || true
        continue-on-error: true

      - name: npm audit — tranc3-bots
        working-directory: tranc3-bots
        run: |
          npm ci --prefer-offline 2>/dev/null || npm install
          npm audit --audit-level=moderate || true
        continue-on-error: true

      - name: Generate NPM SBOM
        run: |
          mkdir -p logs
          npm sbom --sbom-type cyclonedx > logs/sbom-npm.json 2>/dev/null || true
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # Semgrep SAST — replaces CodeQL (no external server needed)
  # ──────────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST (CodeQL replacement)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install semgrep
        run: python3 -m pip install semgrep --quiet

      - name: Run semgrep (Python security + OWASP + JWT + SQL injection)
        run: |
          mkdir -p logs
          semgrep \
            --config "p/python" \
            --config "p/owasp-top-ten" \
            --config "p/sql-injection" \
            --config "p/jwt" \
            --json \
            --output logs/semgrep-results.json \
            src/ || true
          # Hard gate: no ERROR severity findings
          semgrep \
            --config "p/python" \
            --config "p/owasp-top-ten" \
            --severity ERROR \
            --exit-zero \
            src/
        continue-on-error: true

      - name: Upload semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-${{ github.run_number }}
          path: logs/semgrep-results.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Secret Detection (gitleaks)
  # ──────────────────────────────────────────────────────────────
  secret-detection:
    name: Secret Detection (gitleaks)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          mkdir -p logs
          gitleaks detect \
            --source . \
            --log-level warn \
            --report-format json \
            --report-path logs/gitleaks-results.json || {
              echo "::warning::Potential secrets detected — review logs/gitleaks-results.json"
              exit 0
            }

      - name: Upload gitleaks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-${{ github.run_number }}
          path: logs/gitleaks-results.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Security Dashboard — aggregated results summary
  # Replaces GitHub Actions security-dashboard.yml
  # ──────────────────────────────────────────────────────────────
  security-dashboard:
    name: Security Dashboard Summary
    runs-on: self-hosted
    needs: [python-security, node-security, semgrep, secret-detection]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Generate summary
        run: |
          mkdir -p logs
          echo "=== Security Dashboard Summary ===" | tee logs/security-dashboard.txt
          echo "Run: ${{ github.run_number }}" | tee -a logs/security-dashboard.txt
          echo "Branch: ${{ github.ref_name }}" | tee -a logs/security-dashboard.txt
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee -a logs/security-dashboard.txt
          echo "" | tee -a logs/security-dashboard.txt
          echo "| Scanner | Status |" | tee -a logs/security-dashboard.txt
          echo "|---------|--------|" | tee -a logs/security-dashboard.txt
          echo "| Python Security | ${{ needs.python-security.result }} |" | tee -a logs/security-dashboard.txt
          echo "| Node Security | ${{ needs.node-security.result }} |" | tee -a logs/security-dashboard.txt
          echo "| Semgrep (CodeQL replacement) | ${{ needs.semgrep.result }} |" | tee -a logs/security-dashboard.txt
          echo "| Secret Detection | ${{ needs.secret-detection.result }} |" | tee -a logs/security-dashboard.txt
          echo "" | tee -a logs/security-dashboard.txt
          echo "See individual job logs for detailed findings." | tee -a logs/security-dashboard.txt

      - name: Upload dashboard
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-dashboard-${{ github.run_number }}
          path: logs/security-dashboard.txt
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Notify The Citadel on failure
  # ──────────────────────────────────────────────────────────────
  notify-citadel:
    name: Notify The Citadel
    runs-on: self-hosted
    needs: [python-security, node-security, semgrep, secret-detection]
    if: failure()
    steps:
      - name: Post security alert to The Citadel
        run: |
          curl -sf -X POST "https://trancendos-backend.fly.dev/citadel/webhooks/forgejo" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"security_scan_failure\",
              \"branch\": \"${{ github.ref_name }}\",
              \"run_id\": \"${{ github.run_id }}\",
              \"repo\": \"${{ github.repository }}\",
              \"message\": \"Security scan failed on branch ${{ github.ref_name }}\"
            }" || echo "Citadel notification skipped (backend warming)"
