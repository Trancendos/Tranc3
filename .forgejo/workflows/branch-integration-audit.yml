name: Branch Integration Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  branch-audit:
    name: Remote branch benefit audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch all remotes
        run: git fetch origin --prune

      - name: Run branch benefit audit
        run: python3 scripts/branch_benefit_audit.py --base main

      - name: Upload audit report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: branch-benefit-audit
          path: |
            logs/branch_benefit_audit_latest.md
            logs/branch_benefit_audit_*.json
