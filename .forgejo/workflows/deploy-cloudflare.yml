name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/**'
      - '.forgejo/workflows/deploy-cloudflare.yml'
  workflow_dispatch:

jobs:
  deploy-api-gateway:
    name: Deploy API Gateway Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Set TRANC3_BACKEND_URL secret
        working-directory: cloudflare/trancendos-api-gateway
        run: |
          echo "https://trancendos-backend.fly.dev" | wrangler secret put TRANC3_BACKEND_URL --name trancendos-api-gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy API Gateway
        working-directory: cloudflare/trancendos-api-gateway
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-tranc3-ai:
    name: Deploy tranc3-ai Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: cloudflare/tranc3-ai
        run: npm ci

      - name: Deploy tranc3-ai
        working-directory: cloudflare/tranc3-ai
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
