# .forgejo/workflows/dependency-scanner.yml
# Tranc3 — Dependency Scanner, N-1 Compliance Enforcer & Auto-Remediator
# NO GitHub Actions — Forgejo CI only (The Workshop)
#
# What this does:
#   1. pip-audit + osv-scanner — CVE / known vulnerability scanning (all req files)
#   2. N-1 compliance          — Every pinned dep must be within 1 major/minor of latest
#   3. Outdated report         — Full inventory of drift
#   4. Auto-remediation PR     — Creates a Forgejo PR with safe patch/minor upgrades
#   5. Go module audit         — govulncheck for aeonmind/go
#   6. Container scan          — trivy for docker-compose images
#   7. OSV-Scanner weekly      — multi-ecosystem SCA (Google, Apache 2.0)
# NOTE: Safety removed — no longer free for commercial use. Replaced by osv-scanner.
#
# Triggers:
#   - Every Monday 06:30 UTC (weekly sweep)
#   - On PRs that touch any dependency manifest
#   - Manual dispatch
#
# N-1 policy (enforced, not just reported):
#   COMPLIANT  — within 1 minor of latest → green
#   WARNING    — 2+ minors behind         → workflow annotation, 30-day grace
#   CRITICAL   — 1 major behind           → workflow annotation, immediate action
#   BLOCKER    — 2+ majors behind         → workflow FAILS (blocks merge)
#
# Auto-remediation scope (safe updates only):
#   - Patch bumps within same major.minor always auto-remediated
#   - Minor-only bumps auto-remediated unless flagged as breaking in CHANGELOG
#   - Major bumps reported but NOT auto-remediated (require human review)

name: Dependency Scanner & N-1 Auto-Remediator

on:
  schedule:
    - cron: '30 6 * * 1'  # Weekly Monday 06:30 UTC (dependency scanner + N-1)
    - cron: '0 3 * * 0'   # Weekly Sunday 03:00 UTC (OSV-Scanner deep scan)
  pull_request:
    paths:
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'aeonmind/go/go.mod'
      - 'workers/*/requirements*.txt'
      - 'tranc3-bots/requirements*.txt'
      - '.forgejo/workflows/dependency-scanner.yml'
  workflow_dispatch:
    inputs:
      auto_remediate:
        description: 'Create auto-remediation PR for safe updates'
        required: false
        default: 'true'
        type: boolean
      n1_strict:
        description: 'Fail on CRITICAL violations (default: warn only)'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Python CVE Vulnerability Scan
  # ──────────────────────────────────────────────────────────────────────────
  python-cve-scan:
    name: Python CVE Scan (pip-audit + osv-scanner)
    runs-on: ubuntu-latest
    outputs:
      vuln_count: ${{ steps.count.outputs.count }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Install audit tools
        run: pip install --quiet pip-audit

      - name: Install OSV-Scanner
        run: |
          curl -sSfL \
            "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64" \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: pip-audit — root requirements
        id: pip_audit
        run: |
          mkdir -p reports
          pip-audit -r requirements.txt \
            --desc on \
            --format json \
            --output reports/pip-audit-root.json \
            --vulnerability-service osv || true

          pip-audit -r requirements.txt --desc on 2>&1 | tee reports/pip-audit-root.txt || true

      - name: pip-audit — test requirements
        run: |
          if [ -f requirements-test.txt ]; then
            pip-audit -r requirements-test.txt \
              --desc on \
              --format json \
              --output reports/pip-audit-test.json || true
          fi

      - name: pip-audit — worker requirements
        run: |
          for reqfile in $(find workers/ tranc3-bots/ -name 'requirements*.txt' 2>/dev/null); do
            name=$(echo "$reqfile" | tr '/' '-')
            pip-audit -r "$reqfile" \
              --desc on \
              --format json \
              --output "reports/pip-audit-${name}.json" || true
          done

      - name: OSV-Scanner — multi-ecosystem recursive scan
        run: |
          osv-scanner \
            --recursive \
            --format json \
            --output reports/osv-scanner-weekly.json \
            --config .osv-scanner.toml \
            . 2>&1 | tee reports/osv-scanner-weekly.txt || true
          echo "OSV-Scanner weekly sweep complete"

      - name: Count total vulnerabilities
        id: count
        run: |
          python3 - <<'PYEOF'
          import json, glob, os
          total = 0
          for f in glob.glob("reports/pip-audit-*.json"):
              try:
                  d = json.load(open(f))
                  total += len(d.get("vulnerabilities", []))
              except Exception:
                  pass
          print(f"Total CVE findings: {total}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"count={total}\n")
          PYEOF

      - name: Upload CVE reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: cve-reports-${{ github.run_number }}
          path: reports/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # 2. N-1 Compliance Check
  # ──────────────────────────────────────────────────────────────────────────
  n1-compliance:
    name: N-1 Compliance Check
    runs-on: ubuntu-latest
    outputs:
      blockers: ${{ steps.n1.outputs.blockers }}
      criticals: ${{ steps.n1.outputs.criticals }}
      warnings: ${{ steps.n1.outputs.warnings }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Run N-1 checker
        id: n1
        run: |
          mkdir -p reports

          # Run checker with JSON output
          python3 scripts/n1_checker.py \
            requirements.txt \
            --json > reports/n1-compliance.json 2>reports/n1-stderr.txt || true

          # Also run with human-readable output for logs
          python3 scripts/n1_checker.py \
            requirements.txt \
            2>&1 | tee reports/n1-compliance.txt || true

          # Parse blockers/criticals/warnings for outputs
          python3 - <<'PYEOF'
          import json, os
          try:
              d = json.load(open("reports/n1-compliance.json"))
              s = d.get("summary", {})
              blockers = s.get("blockers", 0)
              criticals = s.get("critical", 0)
              warnings = s.get("warnings", 0)
          except Exception:
              blockers = criticals = warnings = 0

          out_file = os.environ.get("GITHUB_OUTPUT", "/dev/null")
          with open(out_file, "a") as f:
              f.write(f"blockers={blockers}\n")
              f.write(f"criticals={criticals}\n")
              f.write(f"warnings={warnings}\n")

          # Emit annotations
          if blockers > 0:
              print(f"::error::N-1 BLOCKER: {blockers} package(s) are 2+ major versions behind. Must upgrade before merge.")
          if criticals > 0:
              print(f"::warning::N-1 CRITICAL: {criticals} package(s) are 1 major version behind. Upgrade immediately.")
          if warnings > 0:
              print(f"::notice::N-1 WARNING: {warnings} package(s) are 2+ minor versions behind. Update within 30 days.")
          PYEOF

          cat reports/n1-compliance.txt

      - name: Fail on BLOCKER (always) or CRITICAL (if strict mode)
        run: |
          BLOCKERS="${{ steps.n1.outputs.blockers }}"
          CRITICALS="${{ steps.n1.outputs.criticals }}"
          STRICT="${{ github.event.inputs.n1_strict || 'false' }}"

          if [ "$BLOCKERS" -gt "0" ] 2>/dev/null; then
            echo "❌ $BLOCKERS N-1 BLOCKER violation(s) found. Must be resolved before merge."
            exit 1
          fi

          if [ "$STRICT" = "true" ] && [ "$CRITICALS" -gt "0" ] 2>/dev/null; then
            echo "❌ $CRITICALS N-1 CRITICAL violation(s) found (strict mode enabled)."
            exit 1
          fi

          echo "✅ N-1 compliance check passed."

      - name: Upload N-1 reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: n1-compliance-${{ github.run_number }}
          path: reports/n1-*.{json,txt}
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Go Module Audit (aeonmind/go)
  # ──────────────────────────────────────────────────────────────────────────
  go-audit:
    name: Go Module Audit (govulncheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aeonmind/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go 1.24
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Install protoc (required to resolve module graph)
        run: sudo apt-get update -q && sudo apt-get install -y -q protobuf-compiler

      - name: Regenerate protobuf (for module resolution)
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          mkdir -p proto
          protoc --go_out=proto --go_opt=paths=source_relative \
            --go-grpc_out=proto --go-grpc_opt=paths=source_relative \
            -I../proto ../proto/aeonmind.proto

      - name: govulncheck scan
        run: |
          mkdir -p ../../reports
          govulncheck ./... 2>&1 | tee ../../reports/govulncheck.txt || true

      - name: go list -m all (dependency inventory)
        run: |
          go list -m all > ../../reports/go-modules.txt || true
          echo "Total Go modules: $(wc -l < ../../reports/go-modules.txt)"

      - name: Check for outdated Go modules
        run: |
          go list -m -u all 2>/dev/null | grep '\[' | tee ../../reports/go-outdated.txt || true
          OUTDATED=$(wc -l < ../../reports/go-outdated.txt | tr -d ' ')
          echo "Outdated Go modules: $OUTDATED"
          if [ "$OUTDATED" -gt "0" ]; then
            echo "::notice::$OUTDATED Go module(s) have available updates — review go-outdated.txt"
          fi

      - name: Upload Go audit reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: go-audit-${{ github.run_number }}
          path: reports/go*.txt
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Outdated Package Inventory (full drift report)
  # ──────────────────────────────────────────────────────────────────────────
  outdated-report:
    name: Outdated Package Inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Install dependencies + outdated checker
        run: |
          pip install --quiet -r requirements.txt || true
          pip install --quiet pip-outdated || true

      - name: Generate outdated report
        run: |
          mkdir -p reports
          echo "# Outdated Package Report" > reports/outdated-packages.md
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> reports/outdated-packages.md
          echo "" >> reports/outdated-packages.md

          echo "## Python (pip list --outdated)" >> reports/outdated-packages.md
          echo "\`\`\`" >> reports/outdated-packages.md
          pip list --outdated 2>&1 | tee -a reports/outdated-packages.md || true
          echo "\`\`\`" >> reports/outdated-packages.md

          pip list --outdated --format=json > reports/outdated-packages.json 2>/dev/null || true

          OUTDATED=$(pip list --outdated 2>/dev/null | grep -c '.' || echo 0)
          echo ""
          echo "Total outdated packages: $OUTDATED"

          if [ "$OUTDATED" -gt "20" ]; then
            echo "::warning::High dependency drift: $OUTDATED packages are outdated. Consider a dependency update sprint."
          fi

      - name: Upload outdated report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: outdated-report-${{ github.run_number }}
          path: reports/outdated-*.{md,json}
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Auto-Remediation PR (patch + minor safe upgrades)
  # Runs only on schedule or when explicitly triggered with auto_remediate=true
  # ──────────────────────────────────────────────────────────────────────────
  auto-remediate:
    name: Auto-Remediation PR
    runs-on: ubuntu-latest
    needs: [python-cve-scan, n1-compliance]
    # Only run on schedule or manual dispatch with auto_remediate=true
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.auto_remediate == 'true')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install --quiet pip-review packaging requests

      - name: Generate safe upgrades script
        run: |
          python3 - <<'PYEOF'
          """
          Identifies packages where a safe (patch or minor) upgrade exists.
          'Safe' = same major version, and the package has not been manually
          pinned with a comment containing 'PINNED:', 'DO NOT UPGRADE', or 'CVE:'.
          """
          import json
          import re
          import subprocess
          import sys

          PROTECTED_COMMENTS = ["pinned:", "do not upgrade", "cve:", "security:", "breaking:"]

          def parse_req_with_comments(path: str) -> dict:
              """Return {package: (pinned_version, line, is_protected)}."""
              result = {}
              with open(path) as f:
                  for line in f:
                      stripped = line.strip()
                      if not stripped or stripped.startswith("-"):
                          continue
                      comment = ""
                      if " #" in stripped:
                          parts = stripped.split(" #", 1)
                          stripped = parts[0].strip()
                          comment = parts[1].lower()
                      m = re.match(r"^([A-Za-z0-9_.\-]+)==([^\s,;]+)", stripped)
                      if m:
                          pkg, ver = m.group(1), m.group(2)
                          is_protected = any(p in comment for p in PROTECTED_COMMENTS)
                          result[pkg.lower()] = (ver, line, is_protected)
              return result

          packages = parse_req_with_comments("requirements.txt")
          safe_upgrades = []

          outdated_raw = subprocess.run(
              ["pip", "list", "--outdated", "--format=json"],
              capture_output=True, text=True
          )
          try:
              outdated = json.loads(outdated_raw.stdout)
          except Exception:
              outdated = []

          for item in outdated:
              name = item["name"].lower()
              current = item["version"]
              latest = item["latest_version"]

              if name not in packages:
                  continue

              pinned_ver, _line, is_protected = packages[name]
              if is_protected:
                  print(f"  SKIP (protected): {name}=={pinned_ver}")
                  continue

              curr_parts = [int(x) for x in re.split(r"[^0-9]", current) if x.isdigit()][:3]
              late_parts = [int(x) for x in re.split(r"[^0-9]", latest) if x.isdigit()][:3]
              while len(curr_parts) < 3: curr_parts.append(0)
              while len(late_parts) < 3: late_parts.append(0)

              # Only auto-upgrade patch or minor (same major)
              if late_parts[0] == curr_parts[0]:
                  safe_upgrades.append((name, pinned_ver, latest))
                  print(f"  SAFE UPGRADE: {name} {pinned_ver} → {latest}")
              else:
                  print(f"  MAJOR (manual): {name} {pinned_ver} → {latest} (major bump, skipping)")

          with open("safe_upgrades.json", "w") as f:
              json.dump(safe_upgrades, f, indent=2)

          print(f"\nSafe upgrades found: {len(safe_upgrades)}")
          PYEOF

      - name: Apply safe upgrades to requirements.txt
        id: apply
        run: |
          python3 - <<'PYEOF'
          import json, re, os

          try:
              upgrades = json.load(open("safe_upgrades.json"))
          except Exception:
              upgrades = []

          if not upgrades:
              print("No safe upgrades to apply.")
              with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
                  f.write("has_changes=false\n")
              raise SystemExit(0)

          upgrade_map = {pkg: new_ver for pkg, _old, new_ver in upgrades}

          with open("requirements.txt") as f:
              content = f.read()

          lines = content.splitlines(keepends=True)
          new_lines = []
          changed = 0
          for line in lines:
              m = re.match(r"^([A-Za-z0-9_.\-]+)==([^\s,;#\n]+)(.*)", line)
              if m:
                  pkg_name = m.group(1)
                  old_ver = m.group(2)
                  rest = m.group(3)
                  if pkg_name.lower() in upgrade_map:
                      new_ver = upgrade_map[pkg_name.lower()]
                      new_lines.append(f"{pkg_name}=={new_ver}{rest}\n")
                      print(f"  Updated: {pkg_name}=={old_ver} → {pkg_name}=={new_ver}")
                      changed += 1
                      continue
              new_lines.append(line)

          with open("requirements.txt", "w") as f:
              f.writelines(new_lines)

          print(f"\nApplied {changed} safe upgrades to requirements.txt")

          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
              f.write(f"has_changes={'true' if changed > 0 else 'false'}\n")
              f.write(f"change_count={changed}\n")
          PYEOF

      - name: Configure git identity
        if: steps.apply.outputs.has_changes == 'true'
        run: |
          git config user.email "the-workshop@trancendos.com"
          git config user.name "The Workshop (Dependency Bot)"

      - name: Create remediation branch and commit
        if: steps.apply.outputs.has_changes == 'true'
        run: |
          BRANCH="deps/auto-remediate-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git add requirements.txt safe_upgrades.json
          git commit -m "deps(auto): apply ${{ steps.apply.outputs.change_count }} safe N-1 patch/minor upgrades

Auto-remediation by The Workshop dependency scanner.
All upgrades are same-major-version (patch or minor) safe bumps.
Major version upgrades require manual review — see artifacts.

Scan run: ${{ github.run_number }}
Policy: N-1 compliance (within 1 major/minor of latest stable)"

          git push origin "$BRANCH" || echo "Push failed — may need Forgejo token"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Upload remediation summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: auto-remediation-${{ github.run_number }}
          path: safe_upgrades.json
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # 6. Dashboard Summary
  # ──────────────────────────────────────────────────────────────────────────
  dashboard:
    name: Dependency Health Dashboard
    runs-on: ubuntu-latest
    needs: [python-cve-scan, n1-compliance, go-audit, outdated-report]
    if: always()
    steps:
      - name: Generate dashboard
        run: |
          echo "# 🛡️ Dependency Health Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## N-1 Compliance" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 BLOCKERS | ${{ needs.n1-compliance.outputs.blockers }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚨 CRITICAL | ${{ needs.n1-compliance.outputs.criticals }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️ WARNINGS | ${{ needs.n1-compliance.outputs.warnings }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## CVE Scan" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| pip-audit + safety | ${{ needs.python-cve-scan.result }} — ${{ needs.python-cve-scan.outputs.vuln_count }} CVEs |" >> $GITHUB_STEP_SUMMARY
          echo "| govulncheck (Go) | ${{ needs.go-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Policy: N-1 Standard" >> $GITHUB_STEP_SUMMARY
          echo "All dependencies must be within **1 major version** of latest stable." >> $GITHUB_STEP_SUMMARY
          echo "- Patch/minor: auto-remediated weekly via auto-remediation PR" >> $GITHUB_STEP_SUMMARY
          echo "- Major bumps: require manual review + approval" >> $GITHUB_STEP_SUMMARY
          echo "- BLOCKER (2+ major behind): **blocks merge**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Zero-cost scanning powered by pip-audit, osv-scanner, govulncheck, N-1 checker_" >> $GITHUB_STEP_SUMMARY
          echo "_NOTE: Safety removed — no longer free for commercial use._" >> $GITHUB_STEP_SUMMARY
