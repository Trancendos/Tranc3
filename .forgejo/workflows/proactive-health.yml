name: Proactive Health

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  platform-health:
    name: Platform health sweep
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install probe dependencies
        run: pip install httpx -q

      - name: Run swarm manifest (health + N-1)
        run: python scripts/swarm_runner.py --manifest config/swarm/manifests/platform-health.yaml
        env:
          TRANC3_BASE_URL: ${{ vars.TRANC3_BASE_URL || 'http://localhost' }}
        continue-on-error: true

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: proactive-health-${{ github.run_number }}
          path: logs/proactive-health.json
          retention-days: 14
