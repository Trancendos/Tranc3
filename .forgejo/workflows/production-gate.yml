name: Production Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  production-gate:
    name: Production merge gate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -q

      - name: Merge gate tests
        run: |
          python -m pytest \
            tests/test_smoke.py \
            tests/test_knowledge_brain.py \
            tests/test_gbrain_worker.py \
            tests/test_canonical_routes.py \
            tests/test_compatibility.py \
            tests/test_entity_effective.py \
            tests/test_health_metadata.py \
            tests/test_orchestrator_effective.py \
            tests/test_zero_cost_registry.py \
            tests/test_adaptive_rotator.py \
            tests/test_api_startup_readiness.py \
            tests/test_production_readiness_stack.py \
            -q --tb=short
        env:
          SECRET_KEY: ci-production-gate-secret-key-32chars-minimum
          JWT_SECRET: ci-production-gate-jwt-secret-32chars-minimum
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test

      - name: API import gate
        run: python -c "import api; print('api OK')"
        env:
          SECRET_KEY: ci-production-gate-secret-key-32chars-minimum
          JWT_SECRET: ci-production-gate-jwt-secret-32chars-minimum
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test

      - name: Citadel preflight (compose contracts)
        run: python3 scripts/citadel_preflight.py
        env:
          SECRET_KEY: ci-production-gate-secret-key-32chars-minimum
          JWT_SECRET: ci-production-gate-jwt-secret-32chars-minimum
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test

      - name: Production readiness scorecard
        run: python3 scripts/production_readiness_score.py

      - name: Dependency audit (pip-audit if installed)
        run: |
          pip install pip-audit -q 2>/dev/null || true
          python3 scripts/dependency_audit.py || true

      - name: Entity registry import gate
        run: |
          python -c "
          from src.entities.health_metadata import health_entity_block
          e = health_entity_block(8004, 'infinity-ws')
          assert e['lead_ai'], e
          assert e['pid'] == 'PID-NXS', e
          print('health_entity_block OK:', e['lead_ai'])
          "

      - name: Zero-cost registry audit
        run: python scripts/zero_cost_audit.py
