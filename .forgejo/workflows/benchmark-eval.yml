name: Benchmark & Evaluation

# Runs on every PR to main and weekly on schedule.
# Produces JSON artefacts for trend tracking.
# Fails CI if P99 latency regression >20% vs. stored baseline.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "api.py"
      - "tests/test_benchmark.py"
      - "tests/test_evaluation.py"
  schedule:
    # Weekly — Wednesday 02:00 UTC
    - cron: "0 2 * * 3"
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Unit-level evaluation tests (no network required)
  # ─────────────────────────────────────────────────────────────────────────
  eval-unit:
    name: EvalSuite unit tests
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evaluation tests
        run: |
          python -m pytest tests/test_evaluation.py -v \
            --tb=short \
            --junitxml=reports/eval-results.xml \
            -q

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report-${{ github.run_number }}
          path: reports/eval-results.xml
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────
  # Benchmark suite — in-process load test (no live server needed)
  # ─────────────────────────────────────────────────────────────────────────
  benchmark-unit:
    name: BenchmarkSuite unit tests
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run benchmark tests
        run: |
          python -m pytest tests/test_benchmark.py -v \
            --tb=short \
            --junitxml=reports/benchmark-results.xml \
            -q

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-report-${{ github.run_number }}
          path: reports/benchmark-results.xml
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────
  # Integration benchmark — hits running API on self-hosted runner
  # Only runs on schedule or workflow_dispatch (not on every PR)
  # ─────────────────────────────────────────────────────────────────────────
  benchmark-integration:
    name: Integration load benchmark
    runs-on: self-hosted
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [eval-unit, benchmark-unit]

    env:
      SECRET_KEY: ci-benchmark-secret-not-for-production
      DATABASE_URL: sqlite:///./ci-bench.db
      ENVIRONMENT: ci
      BENCHMARK_RESULTS_DIR: /tmp/tranc3-bench

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start API server (background)
        run: |
          mkdir -p $BENCHMARK_RESULTS_DIR
          python -m uvicorn api:app --host 127.0.0.1 --port 8099 &
          echo $! > /tmp/api-server.pid
          # Wait for server to be ready
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8099/health > /dev/null 2>&1; then
              echo "API server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run integration load benchmark
        run: |
          python - <<'PYEOF'
          import asyncio
          import json
          import sys
          from pathlib import Path
          from src.benchmark.performance_suite import BenchmarkConfig, BenchmarkSuite

          RESULTS_DIR = Path("$BENCHMARK_RESULTS_DIR")
          BASELINE_FILE = RESULTS_DIR / "baseline.json"

          async def main():
              import httpx

              async def call_health(prompt: str) -> str:
                  async with httpx.AsyncClient(timeout=10.0) as c:
                      r = await c.get("http://127.0.0.1:8099/health")
                      return r.text

              config = BenchmarkConfig(
                  name="ci-integration",
                  concurrency=5,
                  num_requests=50,
                  regression_threshold_pct=20.0,
                  results_dir=str(RESULTS_DIR),
              )
              suite = BenchmarkSuite(config)
              prompts = ["health-check"] * 50
              result = await suite.run(call_health, prompts)

              print(f"RPS: {result.rps:.1f}")
              print(f"P50: {result.latency_stats.p50_ms:.1f}ms")
              print(f"P99: {result.latency_stats.p99_ms:.1f}ms")
              print(f"Errors: {result.error_count}")

              # Regression check against stored baseline
              if BASELINE_FILE.exists():
                  baseline = json.loads(BASELINE_FILE.read_text())
                  compare = suite.compare(result, BenchmarkConfig(name="baseline", concurrency=5, num_requests=50))
                  # compare returns deltas; check P99 regression
                  p99_delta = compare.get("p99_delta_pct", 0)
                  if compare.get("regression", False):
                      print(f"WARNING: P99 regression detected: {p99_delta:+.1f}%", file=sys.stderr)
                      sys.exit(1)
              else:
                  # Store as new baseline
                  BASELINE_FILE.write_text(json.dumps(result.to_dict(), default=str))
                  print("Baseline stored.")

          asyncio.run(main())
          PYEOF

      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/api-server.pid ]; then
            kill $(cat /tmp/api-server.pid) || true
          fi

      - name: Upload benchmark JSON results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-json-${{ github.run_number }}
          path: /tmp/tranc3-bench/
          retention-days: 90

      - name: Annotate PR with benchmark summary
        if: github.event_name == 'pull_request'
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/tranc3-bench/ci-integration_*.json ]; then
            python - <<'PYEOF'
          import json, glob, os
          files = sorted(glob.glob("/tmp/tranc3-bench/ci-integration_*.json"))
          if files:
              data = json.loads(open(files[-1]).read())
              stats = data.get("latency_stats", {})
              print(f"| RPS | {data.get('rps', 'N/A'):.1f} |")
              print(f"| P50 | {stats.get('p50_ms', 'N/A'):.1f}ms |")
              print(f"| P99 | {stats.get('p99_ms', 'N/A'):.1f}ms |")
              print(f"| Errors | {data.get('error_count', 'N/A')} |")
          PYEOF
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Prompt injection security gate
  # ─────────────────────────────────────────────────────────────────────────
  prompt-injection-gate:
    name: Prompt injection security tests
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prompt injection tests
        run: |
          python -m pytest tests/test_prompt_injection.py -v \
            --tb=short \
            --junitxml=reports/prompt-injection-results.xml \
            -q
          echo "## Prompt Injection Gate: PASS" >> $GITHUB_STEP_SUMMARY

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prompt-injection-report-${{ github.run_number }}
          path: reports/prompt-injection-results.xml
          retention-days: 90
