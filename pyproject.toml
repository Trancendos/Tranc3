[tool.bandit]
targets = ["src", "scripts"]
exclude_dirs = ["tests"]
severity = "medium"

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 88

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-markers -v"

[tool.pip-audit]
strict = true
desc = true
