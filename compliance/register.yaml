        description: "Circuit breaker (closed/open/half-open) prevents cascade failures"
      - type: test
        path: tests/test_chaos.py
        description: "Fault injection and resilience tests"
    verification_method: test
    last_reviewed: "2026-06-06"
    reviewer: "Trancendos"
    notes: ""

