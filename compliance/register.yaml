  - id: REQ-IA-001
    standard: "DEF STAN 00-700"
    title: "Authentication and Access Control"
    description: "All platform endpoints must enforce authentication. Unauthenticated requests must be rejected with a defined error response. Role-based access control must be enforced at the service boundary."
    status: COMPLIANT
    evidence:
      - type: code
        path: src/auth/zero_trust.py
        description: "Zero Trust IAM: device posture, MFA, geographic policies, risk scoring"
      - type: code
        path: src/auth/dependencies.py
        description: "FastAPI auth dependency injected on all protected routes"
      - type: test
        path: tests/test_zero_trust.py
        description: "Zero trust IAM boundary tests"
      - type: test
        path: tests/test_penetration.py
        description: "Auth boundary penetration tests"
    verification_method: code_review
    last_reviewed: "2026-06-06"
    reviewer: "Trancendos"
    notes: "JWT + Zero Trust layered authentication"

  - id: REQ-IA-002
    standard: "DEF STAN 00-700"
    title: "Secrets and Credential Management"
    description: "All platform secrets must be stored in a dedicated vault using encryption at rest. Secrets must never appear in source code, logs, or configuration files committed to version control."
    status: COMPLIANT
    evidence:
      - type: code
        path: cloudflare/infinity-void/
        description: "AES-GCM encrypted secrets vault (The Void) — PBKDF2 key derivation, 100k iterations, SHA-256"
