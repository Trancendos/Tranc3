# fly.toml — Tranc3 Bots service on Fly.io (free tier)
#
# Deploy:
#   fly auth login
#   fly launch --name tranc3-bots --region lhr
#   fly deploy
#
# After deploy, set secrets:
#   fly secrets set REDIS_URL=redis://... TRANC3_ENGINE_URL=https://tranc3-backend.fly.dev
#
# Then connect to main Tranc3:
#   fly secrets set TRANC3_BOTS_URL=https://tranc3-bots.fly.dev --app tranc3-backend

app = "tranc3-bots"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL   = "INFO"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "256mb"
