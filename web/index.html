    <style>
      /* Skip link — hidden until focused */
      .skip-link {
        position: absolute;
        top: -9999px;
        left: 0.5rem;
        z-index: 9999;
        padding: 0.5rem 1rem;
        background: #4f46e5;
        color: #fff;
        font-weight: 600;
        border-radius: 0 0 0.375rem 0.375rem;
        text-decoration: none;
        font-size: 0.875rem;
      }
      .skip-link:focus {
        top: 0;
        outline: 2px solid #818cf8;
        outline-offset: 2px;
      }
    </style>
