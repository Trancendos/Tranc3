# .github/workflows/publish-matrix-site.yml
# Publish a browsable copy of Trancendos_Master_Service_Matrix.xlsx to
# GitHub Pages.
#
# Why GitHub Actions (not Forgejo): GitHub Pages is a GitHub-native feature —
# same deliberate, narrow exception to the Forgejo-first CI convention as
# publish-wiki.yml. See CLAUDE.md's CI/CD section for the full list of real,
# active .github/workflows/ files and why this one's in scope.
#
# Zero-cost: GitHub Pages + Actions are both free for public repos. Runs only
# when the workbook or this workflow changes on main, plus manual dispatch.

name: Publish Matrix Site

on:
  push:
    branches: ["main"]
    paths:
      - "docs/architecture/ea-workbook/Trancendos_Master_Service_Matrix.xlsx"
      - "scripts/render_matrix_html.py"
      # render_matrix_html.py reads HEADER_FILL out of this file's source at
      # run time (see its _load_header_fill_rgb docstring) — a HEADER_FILL-only
      # edit here wouldn't touch the .xlsx or render_matrix_html.py paths
      # above, so without listing it explicitly the site would silently stay
      # stale.
      - "scripts/build_master_service_matrix.py"
      - ".github/workflows/publish-matrix-site.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Render matrix to static HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install openpyxl
        run: pip install --quiet openpyxl==3.1.5

      - name: Render site
        run: python3 scripts/render_matrix_html.py --out site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
