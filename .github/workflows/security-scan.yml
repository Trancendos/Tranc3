# TRANC3 — Automated Security Scanning Pipeline
# Runs pip-audit, Safety, Bandit, npm audit, and Trivy on every push/PR
# Updated: 2025-07 — CVE Remediation

name: "Security Scan"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6 AM UTC
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  python-vulnerability-scan:
    name: Python Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanning tools
        run: |
          pip install pip-audit safety bandit cyclonedx-bom

      - name: pip-audit (requirements.txt)
        run: |
          pip-audit -r requirements.txt --format json --output pip-audit-results.json || true
          pip-audit -r requirements.txt --format markdown --output pip-audit-results.md || true
          pip-audit -r requirements.txt || true

      - name: pip-audit (AI dependencies)
        run: |
          if [ -f requirements-ai.txt ]; then
            pip-audit -r requirements-ai.txt || true
          fi

      - name: Safety check
        run: |
          safety check -r requirements.txt --json --output safety-results.json || true
          safety check -r requirements.txt || true

      - name: Bandit security lint
        run: |
          bandit -r src/ -f json -o bandit-results.json || true
          bandit -r src/ -f txt || true

      - name: Generate SBOM
        run: |
          cyclonedx-py requirements -i requirements.txt -o sbom.json --format json || true

      - name: Upload security scan results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: python-security-results
          path: |
            pip-audit-results.*
            safety-results.json
            bandit-results.json
            sbom.json

  npm-vulnerability-scan:
    name: NPM Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --ignore-scripts
        continue-on-error: true

      - name: npm audit
        run: |
          npm audit --audit-level=moderate --json > npm-audit-results.json || true
          npm audit --audit-level=moderate || true

      - name: npm outdated check
        run: npm outdated || true

      - name: Generate NPM SBOM
        run: npm sbom --sbom-type cyclonedx > npm-sbom.json || true

      - name: Upload npm scan results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: npm-security-results
          path: |
            npm-audit-results.json
            npm-sbom.json

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"  # Don't fail the build, just report

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
