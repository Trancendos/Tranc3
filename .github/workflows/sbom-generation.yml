# TRANC3 — Automated SBOM Generation
# Generates CycloneDX SBOMs for every release and on-demand
# Updated: 2026-05 — Proactive Remediation & Automation

name: "SBOM Generation"

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:
  generate-sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install SBOM tools
        run: |
          pip install cyclonedx-bom
          npm install -g @cyclonedx/cyclonedx-npm

      - name: Generate Python SBOM
        run: |
          cyclonedx-py requirements \
            -i requirements.txt \
            -o sbom-python.json \
            --format json \
            --author "Trancendos" \
            --author-url "https://trancendos.ai"

      - name: Generate NPM SBOM
        run: |
          npm sbom --sbom-type cyclonedx > sbom-npm.json 2>/dev/null || true

      - name: Generate combined SBOM
        run: |
          python3 -c "
          import json, sys
          py_sbom = json.load(open('sbom-python.json'))
          try:
              npm_sbom = json.load(open('sbom-npm.json'))
              # Merge components
              py_sbom['components'].extend(npm_sbom.get('components', []))
          except:
              pass
          py_sbom['metadata']['timestamp'] = '$(date -u +%Y-%m-%dT%H:%M:%SZ)'
          json.dump(py_sbom, open('sbom-combined.json', 'w'), indent=2)
          "

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            sbom-python.json
            sbom-npm.json
            sbom-combined.json

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom-python.json
            sbom-npm.json
            sbom-combined.json
