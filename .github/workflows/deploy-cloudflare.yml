name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "cloudflare/**"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:         # run manually from GitHub UI or phone

jobs:
  deploy-tranc3-ai:
    name: Deploy tranc3-ai worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare/tranc3-ai
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudflare/tranc3-ai/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: e0214028cb64d31232f5662548a55e4e
          workingDirectory: cloudflare/tranc3-ai

  deploy-infinity-void:
    name: Deploy infinity-void (The Void)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare/infinity-void
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudflare/infinity-void/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: e0214028cb64d31232f5662548a55e4e
          workingDirectory: cloudflare/infinity-void
