name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "Dockerfile"
      - "fly.toml"
      - "requirements.txt"
      - "tranc3-bots/**"
      - ".github/workflows/deploy-fly.yml"
  workflow_dispatch:         # run manually from GitHub UI or phone

jobs:
  deploy-tranc3-backend:
    name: Deploy Tranc3 backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-tranc3-bots:
    name: Deploy tranc3-bots
    runs-on: ubuntu-latest
    needs: deploy-tranc3-backend   # bots need the backend URL first
    defaults:
      run:
        working-directory: tranc3-bots
    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
