name: Codecov Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true
          pip install -r requirements-test.txt || pip install pytest pytest-cov || true

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov=workers --cov-report=xml --cov-report=term-missing \
            --ignore=tests/test_chaos.py \
            --ignore=tests/test_penetration.py \
            -q || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: tranc3-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
