name: Codecov Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true
          pip install -r requirements-test.txt || pip install pytest pytest-cov || true

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov=workers --cov-report=xml --cov-report=term-missing \
            --ignore=tests/test_chaos.py \
            --ignore=tests/test_penetration.py \
            -q || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: tranc3-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
