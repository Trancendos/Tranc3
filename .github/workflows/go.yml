name: Go CI

on:
  push:
    paths:
      - 'aeonmind/go/**'
      - 'aeonmind/proto/**'
    branches: [ main, 'phase-*' ]
  pull_request:
    paths:
      - 'aeonmind/go/**'
      - 'aeonmind/proto/**'
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aeonmind/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24'
          cache-dependency-path: aeonmind/go/go.sum
      - name: Go fmt
        run: test -z "$(gofmt -l .)"
      - name: Go vet
        run: go vet ./...
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@d6238b002a20823d52840fda27e2d4891c5952dc # v4
        with:
          working-directory: aeonmind/go

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aeonmind/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24'
          cache-dependency-path: aeonmind/go/go.sum
      - name: Download dependencies
        run: go mod download
      - name: Build orchestrator
        run: go build -v -o /dev/null ./orchestrator/...
      - name: Build cmd
        run: go build -v -o /dev/null ./cmd/...

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aeonmind/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24'
          cache-dependency-path: aeonmind/go/go.sum
      - name: Run tests
        run: go test -v -race ./...
