name: Go CI

on:
  push:
    paths:
      - 'aeonmind/go/**'
      - 'aeonmind/proto/**'
    branches: [ main, 'phase-*' ]
  pull_request:
    paths:
      - 'aeonmind/go/**'
      - 'aeonmind/proto/**'
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aeonmind/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: aeonmind/go/go.mod
          cache-dependency-path: aeonmind/go/go.sum
      - name: Go fmt
        run: test -z "$(gofmt -l .)"
      - name: Go vet
        run: go vet ./...
      - name: Install golangci-lint
        # v8 installs golangci-lint v2.x — required because the v1 line's final
        # release (v1.64.8) was built with go1.24 and refuses modules that
        # declare go >= 1.25, which aeonmind/go/go.mod does.
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: aeonmind/go

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aeonmind/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: aeonmind/go/go.mod
          cache-dependency-path: aeonmind/go/go.sum
      - name: Download dependencies
        run: go mod download
      - name: Build orchestrator
        run: go build -v -o /dev/null ./orchestrator/...
      - name: Build cmd
        run: go build -v -o /dev/null ./cmd/...

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aeonmind/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: aeonmind/go/go.mod
          cache-dependency-path: aeonmind/go/go.sum
      - name: Run tests
        run: go test -v -race ./...
