# .github/workflows/test.yml
# Full test suite on push to main
# Zero-cost: GitHub Actions free tier (2,000 min/month for public repos)

name: Test Suite

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Full Pytest Suite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt || true
          pip install -r requirements.txt || true
          pip install pytest pytest-asyncio pytest-cov || true

      - name: Run full test suite
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            -m "not integration and not chaos" \
            --ignore=tests/test_full_suite.py \
            --cov=Dimensional \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            || true  # Don't block main on test failures during stabilization

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  lint:
    name: Ruff Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: |
          ruff check --select E,F,W,B --ignore E501,B008,B904 \
            --exclude "docs/reference" \
            .

      - name: Ruff format check
        run: |
          ruff format --check --diff \
            --exclude "docs/reference" \
            .
