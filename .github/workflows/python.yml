name: Python CI

on:
  push:
    paths:
      - 'aeonmind/python/**'
    branches: [ main, 'phase-*' ]
  pull_request:
    paths:
      - 'aeonmind/python/**'
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aeonmind/python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "ruff==0.15.8" mypy
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: MyPy
        run: mypy aeonmind/ --ignore-missing-imports || true

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: aeonmind/python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Run tests with coverage
        run: pytest tests/ --cov=aeonmind --cov-report=xml --cov-report=term-missing

  install-check:
    name: Install Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aeonmind/python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'
      - name: Install package
        run: pip install -e .
      - name: Import check
        run: |
          python -c "import aeonmind; print(f'AeonMind v{aeonmind.__version__}')"
          python -c "from aeonmind.core.definitions import Tier, SentinelChannel; print(f'Tiers: {len(Tier)}, Channels: {len(SentinelChannel)}')"
          python -c "from aeonmind.core.quantum import QuantumDecisionCircuit; print('Quantum module OK')"
          python -c "from aeonmind.core.frontier_agent import FrontierAgent; print('Frontier agent OK')"
          python -c "from aeonmind.systems.orchestrator import LogicalOrchestrator; print('Orchestrator OK')"
          python -c "from aeonmind.services.bot_services import BotServiceWorker; print('Bot services OK')"
