# TRANC3 — Security Dashboard
# Centralized security reporting: aggregates all scan results into a single workflow
# Runs weekly and on-demand
# Updated: 2026-05 — Proactive Remediation & Automation

name: "Security Dashboard"

on:
  schedule:
    - cron: "0 8 * * 1"  # Weekly Monday 8 AM UTC
  workflow_dispatch:
    inputs:
      full_scan:
        description: "Run full deep scan (including semgrep)"
        type: boolean
        default: false

permissions:
  security-events: write
  contents: read
  issues: write

jobs:
  security-summary:
    name: Security Summary Report
    runs-on: ubuntu-latest
    outputs:
      bandit_count: ${{ steps.bandit.outputs.count }}
      pip_audit_count: ${{ steps.pip-audit.outputs.count }}
      npm_audit_count: ${{ steps.npm.outputs.count }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install security tools
        run: |
          pip install bandit pip-audit safety cyclonedx-bom semgrep
          npm install -g npm-audit-resolver

      - name: Bandit scan
        id: bandit
        run: |
          bandit -r src/ -f json -o bandit-results.json || true
          COUNT=$(python3 -c "import json; print(len(json.load(open('bandit-results.json')).get('results', [])))")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          bandit -r src/ -f txt || true

      - name: pip-audit scan
        id: pip-audit
        run: |
          pip-audit -r requirements.txt --desc --format json -o pip-audit-results.json || true
          COUNT=$(python3 -c "import json; d=json.load(open('pip-audit-results.json')); print(len(d.get('dependencies',[])))" 2>/dev/null || echo "0")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          pip-audit -r requirements.txt --desc || true

      - name: Safety scan
        run: |
          safety scan -r requirements.txt --json -o safety-results.json || true
          safety scan -r requirements.txt || true

      - name: npm audit
        id: npm
        run: |
          npm audit --audit-level=moderate --json > npm-audit-results.json || true
          COUNT=$(python3 -c "import json; d=json.load(open('npm-audit-results.json')); print(d.get('metadata',{}).get('vulnerabilities',{}).get('high',0) + d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))" 2>/dev/null || echo "0")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Semgrep scan (full scan only)
        if: ${{ github.event.inputs.full_scan == 'true' }}
        run: |
          semgrep --config auto --json -o semgrep-results.json src/ || true
          semgrep --config auto src/ || true

      - name: Generate SBOM
        run: |
          cyclonedx-py requirements -i requirements.txt -o sbom-python.json --format json || true
          npm sbom --sbom-type cyclonedx > sbom-npm.json 2>/dev/null || true

      - name: Generate summary
        run: |
          echo "## 🔒 Security Dashboard Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scanner | Issues Found |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bandit | ${{ steps.bandit.outputs.count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| pip-audit | ${{ steps.pip-audit.outputs.count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| npm audit | ${{ steps.npm.outputs.count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bandit results: \`bandit-results.json\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- pip-audit results: \`pip-audit-results.json\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Safety results: \`safety-results.json\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- SBOM: \`sbom-python.json\`, \`sbom-npm.json\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload all results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-dashboard-results
          path: |
            bandit-results.json
            pip-audit-results.json
            safety-results.json
            npm-audit-results.json
            semgrep-results.json
            sbom-*.json

      - name: Create issue if critical findings
        if: steps.bandit.outputs.count > 0 || steps.pip-audit.outputs.count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const bandit = '${{ steps.bandit.outputs.count }}';
            const pipAudit = '${{ steps.pip-audit.outputs.count }}';
            if (parseInt(bandit) > 0 || parseInt(pipAudit) > 0) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔒 Security Scan Findings — ${new Date().toISOString().split('T')[0]}`,
                body: `## Security Scan Results\n\n- **Bandit issues:** ${bandit}\n- **pip-audit vulnerabilities:** ${pipAudit}\n\nSee the [Security Dashboard workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\n/label security`,
                labels: ['security']
              });
            }
