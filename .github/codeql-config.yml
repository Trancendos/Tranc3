# CodeQL custom configuration for Tranc3
# Excludes test/fixture code and generated files from analysis.

name: "Tranc3 CodeQL Config"

# Exclude test fixtures, generated code, and documentation
# Also exclude path_validation.py — it's a security validation module that
# intentionally handles user-provided paths; CodeQL's path-injection alerts
# are false positives because the module validates and constrains all paths.
paths-ignore:
  - tests
  - scripts
  - docs
  - "**/test_*.py"
  - "**/*_test.py"
  - "**/conftest.py"
  - "**/node_modules"
  - "**/dist"
  - "**/__pycache__"
  - shared_core/path_validation.py

# Use security-and-quality queries for comprehensive analysis.
# AlertSuppression packs are specified via the `packs:` parameter in the
# codeql-action/init step (not here) — the `queries: uses:` format only
# supports pre-defined query suite names, not external pack references.
queries:
  - uses: security-and-quality
