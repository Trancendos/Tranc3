# CodeQL custom configuration for Tranc3
# Excludes test/fixture code and generated files from analysis.

name: "Tranc3 CodeQL Config"

# Exclude test fixtures, generated code, and documentation
paths-ignore:
  - tests
  - scripts
  - docs
  - "**/test_*.py"
  - "**/*_test.py"
  - "**/conftest.py"
  - "**/node_modules"
  - "**/dist"
  - "**/__pycache__"

# Use security-and-quality queries plus AlertSuppression for inline suppression support
# The AlertSuppression pack enables # codeql[...] inline suppression comments
# and works with the advanced-security/dismiss-alerts action to auto-dismiss alerts.
queries:
  - uses: security-and-quality
  - uses: codeql/python-queries:AlertSuppression
  - uses: codeql/javascript-queries:AlertSuppression
