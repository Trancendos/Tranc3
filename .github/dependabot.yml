# TRANC3 — Automated Dependency Updates (Dependabot)
# Scans Python (pip) and Node.js (npm) for outdated/vulnerable deps
# Updated: 2025-07 — CVE Remediation

version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "Trancendos/security"
    labels:
      - "dependencies"
      - "security"
      - "python"
    commit-message:
      prefix: "security(pip)"
      include: "scope"
    # Auto-merge patch updates for security
    allow:
      - dependency-type: "all"
    # Group updates by type
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      patch-updates:
        applies-to: version-updates
        patterns:
          - "*"

  # Node.js dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "Trancendos/security"
    labels:
      - "dependencies"
      - "security"
      - "javascript"
    commit-message:
      prefix: "security(npm)"
      include: "scope"
    allow:
      - dependency-type: "all"
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      patch-updates:
        applies-to: version-updates
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
    commit-message:
      prefix: "ci(actions)"
