# TRANC3 — Automated Dependency Updates (Dependabot)
# Scans Python (pip), Node.js (npm), and GitHub Actions for outdated/vulnerable deps
# Updated: 2026-05 — Proactive Remediation & Automation

version: 2

updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "Trancendos/security"
    labels:
      - "dependencies"
      - "security"
      - "python"
    commit-message:
      prefix: "deps(pip):"
      include: "scope"
    allow:
      - dependency-type: "all"
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      patch-updates:
        applies-to: version-updates
        patterns:
          - "*"
    # Do not auto-update major versions of ML packages — require manual review
    ignore:
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]
      - dependency-name: "numpy"
        update-types: ["version-update:semver-major"]

  # Node.js dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "Trancendos/security"
    labels:
      - "dependencies"
      - "security"
      - "javascript"
    commit-message:
      prefix: "deps(npm):"
      include: "scope"
    allow:
      - dependency-type: "all"
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      patch-updates:
        applies-to: version-updates
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
    commit-message:
      prefix: "ci(actions):"
    groups:
      github-actions:
        patterns:
          - "*"
