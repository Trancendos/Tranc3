# docker-compose.self-hosted.yml
# Tranc3 Self-Hosted Workers — replaces ALL Cloudflare Worker dependencies
#
# Usage:
#   docker compose -f docker-compose.self-hosted.yml up -d
#
# This replaces:
#   - cloudflare/tranc3-ai (Cloudflare Worker → self-hosted FastAPI)
#   - cloudflare/infinity-void (Cloudflare Worker → self-hosted FastAPI + SQLite)
#   - cloudflare/trancendos-api-gateway (Cloudflare Worker → self-hosted FastAPI)
#
# Zero external provider dependencies. Zero cost.

version: "3.8"

services:
  # ── Tranc3 AI Worker ──────────────────────────────────────────
  # Replaces: cloudflare/tranc3-ai (Cloudflare Worker)
  # Self-owned inference. Zero external AI service dependencies.
  tranc3-ai:
    build:
      context: ./workers/tranc3-ai
      dockerfile: Dockerfile
    container_name: tranc3-ai-worker
    ports:
      - "8001:8001"
    environment:
      - TRANC3_BACKEND_URL=${TRANC3_BACKEND_URL:-}
      - TRANC3_NANO_URL=${TRANC3_NANO_URL:-}
      - TRANC3_AUTH_URL=${TRANC3_AUTH_URL:-}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── The Void — Encrypted Secrets Vault ────────────────────────
  # Replaces: cloudflare/infinity-void (Cloudflare Worker)
  # AES-256-GCM encryption. SQLite replaces D1. File storage replaces R2.
  infinity-void:
    build:
      context: ./workers/infinity-void
      dockerfile: Dockerfile
    container_name: infinity-void-worker
    ports:
      - "8002:8002"
    environment:
      - MASTER_KEY_SEED=${MASTER_KEY_SEED}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - INFINITY_ONE_URL=${INFINITY_ONE_URL:-}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - void-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── API Gateway ───────────────────────────────────────────────
  # Replaces: cloudflare/trancendos-api-gateway (Cloudflare Worker)
  # JWT auth, circuit breakers, rate limiting, request proxying.
  api-gateway:
    build:
      context: ./workers/api-gateway
      dockerfile: Dockerfile
    container_name: trancendos-api-gateway-worker
    ports:
      - "8003:8003"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-}
      - USERS_SERVICE_URL=${USERS_SERVICE_URL:-}
      - PRODUCTS_SERVICE_URL=${PRODUCTS_SERVICE_URL:-}
      - ORDERS_SERVICE_URL=${ORDERS_SERVICE_URL:-}
      - PAYMENTS_SERVICE_URL=${PAYMENTS_SERVICE_URL:-}
      - TRANC3_AI_SERVICE_URL=http://tranc3-ai:8001
    depends_on:
      - tranc3-ai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  void-data:
    driver: local
