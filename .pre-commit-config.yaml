# .pre-commit-config.yaml
# Local security enforcement before every commit.
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# Updated: 2026-05 — Proactive Remediation & Automation

repos:
  # ── Ruff (lint + format) ──────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── General file checks ───────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: no-commit-to-branch
        args: [--branch, main]
      - id: check-ast
      - id: debug-statements

  # ── Bandit (Python SAST) ──────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, src]
        additional_dependencies: ["bandit[toml]"]

  # ── Python formatting ─────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3.11

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort

  # ── Semgrep (semantic code analysis) ──────────────────────────────
  - repo: https://github.com/returntocorp/semgrep-pre-commit
    rev: v1.63.0
    hooks:
      - id: semgrep
        args: ["--config", "auto", "--error"]

  # ── Secrets detection ─────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # ── Dependency safety ─────────────────────────────────────────────
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.3
    hooks:
      - id: python-safety-dependencies-check
        files: requirements.*\.txt$

  # ── Typo detection (security-sensitive) ───────────────────────────
  - repo: https://github.com/crate-ci/typos
    rev: v1.31.1
    hooks:
      - id: typos
        args: [--config, .typos.toml]

  # ── Proactive Security Scanner (AST-based CodeQL pattern prevention) ────
  # Blocks the exact patterns that caused ~297 CodeQL alerts from ever
  # landing in the codebase again. Maps to CWE-022, CWE-117, CWE-209,
  # CWE-327, PY-001–PY-009.
  - repo: local
    hooks:
      - id: security-scanner
        name: Proactive Security Scanner
        entry: python -m Dimensional.security_automation gate
        language: system
        types: [python]
        pass_filenames: false
        args: [--max-critical, "0", --max-high, "0", --max-medium, "20", src/ Dimensional/ workers/]
        verbose: true
      - id: security-autofix
        name: Security Auto-Fix (dry-run check)
        entry: python -m Dimensional.security_automation fix
        language: system
        types: [python]
        pass_filenames: false
        args: [--dry-run, src/ Dimensional/ workers/]
        verbose: true
