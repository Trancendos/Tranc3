# Nanoservice pod security — hostIPC required for /dev/shm (see docs/HOSTIPC_RISK_ACCEPTANCE.md)
podSecurity: &podSecurity
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurity: &containerSecurity
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop: ["ALL"]

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nsa-broker
  namespace: tranc3-nanoservices
  labels:
    app: nsa-broker
    component: nanoservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nsa-broker
  template:
    metadata:
      labels:
        app: nsa-broker
        component: nanoservice
    spec:
      hostIPC: true
      securityContext:
        <<: *podSecurity
      containers:
        - name: nsa-broker
          image: tranc3/nsa-broker:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            <<: *containerSecurity
          ports:
            - containerPort: 9100
              name: http
          env:
            - name: NSA_BROKER_PORT
              value: "9100"
            - name: NSA_BROKER_HOST
              value: "0.0.0.0"
            - name: NSA_BROKER_SHM_NAME
              value: "nsa_broker_shm"
            - name: NSA_BROKER_SHM_SIZE
              value: "67108864"
            - name: NSA_BROKER_MAX_CLIENTS
              value: "32"
            - name: NSA_BROKER_LOG_LEVEL
              value: "INFO"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9100
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: shm
          hostPath:
            path: /dev/shm
            type: Directory
        - name: tmp
          emptyDir: {}
---
