# fly.toml — Tranc3 Backend on Fly.io (free tier)
#
# Free tier: 3 shared-cpu-1x VMs, 256MB RAM each — enough for Tranc3
#
# Deploy:
#   fly auth login
#   fly launch --name tranc3-backend --region lhr  (London, free)
#   fly deploy
#
# Then connect to Cloudflare:
#   echo "https://tranc3-backend.fly.dev" | wrangler secret put TRANC3_BACKEND_URL --name tranc3-ai
#   echo "https://tranc3-backend.fly.dev" | wrangler secret put TRANC3_NANO_URL     --name tranc3-ai

app = "tranc3-backend"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT        = "production"
  LOG_LEVEL          = "INFO"
  TRANC3_WORKERS     = "1"
  TRANC3_CONCURRENCY = "2"
  FRONTEND_URL       = "https://trancendos.com"
  CORS_ORIGINS       = "https://trancendos.com,https://www.trancendos.com,https://trancendos-backend.fly.dev"

[http_service]
  internal_port      = 8000
  force_https        = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period  = "10s"
    interval      = "30s"
    method        = "GET"
    timeout       = "5s"
    path          = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"

[mounts]
  source      = "tranc3_models"
  destination = "/app/models"
