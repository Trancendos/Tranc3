<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VRAR3D Viewer</title>
<style>
  html, body { margin: 0; height: 100%; background: #12141a; color: #e6e6e6; font-family: system-ui, sans-serif; }
  #canvas-host { position: absolute; inset: 0; }
  #hud { position: absolute; top: 12px; left: 12px; z-index: 1; max-width: 420px;
         background: rgba(15, 17, 21, 0.85); padding: 10px 14px; border-radius: 8px;
         font-size: 13px; line-height: 1.5; }
  #hud h1 { font-size: 14px; margin: 0 0 6px; }
  #hud code { color: #7dd3fc; }
  #status { color: #93a4bd; }
  #status.error { color: #ff6b6b; }
</style>
</head>
<body>
<div id="canvas-host"></div>
<div id="hud">
  <h1>VRAR3D Viewer</h1>
  <div id="status">Loading Three.js…</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.1.5/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module">
// VRAR3D avatar viewer — loads a scene from this worker's own
// GET /vrar3d/scenes/{scene_id} API and renders its first VRM/GLB object.
//
// Query param + URL fragment:
//   ?scene=<scene_id>#secret=<x-internal-secret>   render a real scene
//   (no params)                                    idle demo scene, no
//                                                   backend call — confirms
//                                                   the renderer itself works
//
// The secret goes after # (a fragment), not in the query string — fragments
// are never sent to the server or logged, unlike query params.
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { VRMLoaderPlugin, VRMUtils } from "@pixiv/three-vrm";

const statusEl = document.getElementById("status");
function setStatus(text, isError = false) {
  statusEl.textContent = text;
  statusEl.classList.toggle("error", isError);
}

// The internal secret is read from the URL *fragment* (after #), not the
// query string — fragments are never sent to the server or included in
// Referer headers, so it doesn't end up in server/proxy access logs,
// browser history entries that get shared, or the query string of a
// copy-pasted link. Scene id is not sensitive, so it stays a normal param.
const params = new URLSearchParams(window.location.search);
const sceneId = params.get("scene");
const secret = new URLSearchParams(window.location.hash.replace(/^#/, "")).get("secret") || "";

const host = document.getElementById("canvas-host");
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
host.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x12141a);

const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.4, 3.2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.update();

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(1, 2, 1);
scene.add(dirLight);

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let currentVrm = null;
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if (currentVrm) {
    currentVrm.update(delta);
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();

function placeholderIdleMesh() {
  // Rendered whenever there's no real scene/asset to show yet — confirms the
  // renderer/lighting/controls pipeline itself works without depending on a
  // network asset.
  const geo = new THREE.CapsuleGeometry(0.35, 1.1, 8, 16);
  const mat = new THREE.MeshStandardMaterial({ color: 0x7dd3fc, roughness: 0.5 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = 1.0;
  scene.add(mesh);
  return mesh;
}

function applyObjectTransform(root, obj) {
  if (Array.isArray(obj.position) && obj.position.length === 3) {
    root.position.set(...obj.position);
  }
  if (Array.isArray(obj.rotation) && obj.rotation.length === 3) {
    root.rotation.set(...obj.rotation);
  }
  if (Array.isArray(obj.scale) && obj.scale.length === 3) {
    root.scale.set(...obj.scale);
  }
}

async function loadGltfOrVrm(url, sceneObject) {
  const loader = new GLTFLoader();
  loader.register((parser) => new VRMLoaderPlugin(parser));
  // /vrar3d/assets/{id}/download is internal-auth-gated like every other
  // VRAR3D route — without this, GLTFLoader's fetch has no way to send the
  // header and the request always 403s. Only ever sent to this same-origin
  // download route, never to an external asset_url (Sketchfab, CDN, etc.).
  if (secret && url.startsWith("/vrar3d/assets/")) {
    loader.setRequestHeader({ "X-Internal-Secret": secret });
  }

  const gltf = await loader.loadAsync(url);
  const vrm = gltf.userData.vrm;
  if (vrm) {
    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.combineSkeletons(gltf.scene);
    applyObjectTransform(vrm.scene, sceneObject);
    scene.add(vrm.scene);
    currentVrm = vrm;
    return "vrm";
  }
  applyObjectTransform(gltf.scene, sceneObject);
  scene.add(gltf.scene);
  return "gltf";
}

async function fetchScene(id) {
  const res = await fetch(`/vrar3d/scenes/${encodeURIComponent(id)}`, {
    headers: secret ? { "X-Internal-Secret": secret } : {},
  });
  if (!res.ok) {
    throw new Error(`GET /vrar3d/scenes/${id} -> ${res.status}`);
  }
  return res.json();
}

function resolveObjectAssetUrl(obj) {
  // A scene object's asset_id is expected to reference a completed
  // /vrar3d/assets/process job — try this worker's own download route
  // first (works for locally-converted files); metadata.asset_url covers
  // objects that already point at an externally-hosted file (e.g. a
  // Sketchfab-backend result).
  if (obj.metadata && obj.metadata.asset_url) {
    return obj.metadata.asset_url;
  }
  if (obj.asset_id) {
    return `/vrar3d/assets/${encodeURIComponent(obj.asset_id)}/download`;
  }
  return null;
}

async function main() {
  if (!sceneId) {
    setStatus("No ?scene= given — showing idle placeholder. Pass ?scene=<id>#secret=<x-internal-secret> to render a real VRAR3D scene.");
    placeholderIdleMesh();
    return;
  }

  setStatus(`Loading scene ${sceneId}…`);
  let sceneData;
  try {
    sceneData = await fetchScene(sceneId);
  } catch (err) {
    setStatus(`Failed to load scene: ${err.message}`, true);
    placeholderIdleMesh();
    return;
  }

  const withAsset = (sceneData.objects || []).find((o) => resolveObjectAssetUrl(o));
  if (!withAsset) {
    setStatus(`Scene "${sceneData.name}" has no renderable object (no asset_id / metadata.asset_url). Showing placeholder.`);
    placeholderIdleMesh();
    return;
  }

  const url = resolveObjectAssetUrl(withAsset);
  setStatus(`Loading asset ${withAsset.asset_id || withAsset.object_id}…`);
  try {
    const kind = await loadGltfOrVrm(url, withAsset);
    setStatus(`Rendering "${sceneData.name}" — object ${withAsset.object_id} (${kind}).`);
  } catch (err) {
    setStatus(`Failed to load asset from ${url}: ${err.message}`, true);
    placeholderIdleMesh();
  }
}

main();
</script>
</body>
</html>
