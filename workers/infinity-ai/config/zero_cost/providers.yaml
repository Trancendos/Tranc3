# Zero-cost provider registry — 6–8 providers per capability with rotation chains.
# Paid providers are listed for documentation only; runtime must reject them unless explicitly enabled.
version: "2026-06"
model: zero_cost_first
policy:
  max_paid_providers: 0
  require_self_hosted_first: true
  rotation_min_providers: 6
  rotation_max_providers: 8
  quota_hard_stop: true
  daily_request_limit_per_provider: 5000
  cooldown_seconds_on_exhaust: 3600

capabilities:
  embeddings:
    description: "Embedding vectors — local sentence-transformers first"
    providers:
      - id: local_embeddings
        cost: zero
        self_hosted: true
        priority: 1
      - id: ollama
        cost: zero
        self_hosted: true
        priority: 2
      - id: huggingface
        cost: zero
        self_hosted: false
        priority: 3
      - id: openrouter_free
        cost: zero
        self_hosted: false
        priority: 4
      - id: cohere_free
        cost: zero
        self_hosted: false
        priority: 5
      - id: voyage_free
        cost: zero
        self_hosted: false
        priority: 6
      - id: offline_embeddings
        cost: zero
        self_hosted: true
        priority: 99
    rotation_chains:
      - name: embeddings_default
        providers: [local_embeddings, ollama, huggingface, openrouter_free, cohere_free, voyage_free, offline_embeddings]

  speech_to_text:
    description: "STT — Whisper local, then free API tiers"
    providers:
      - id: whisper_local
        cost: zero
        self_hosted: true
        priority: 1
      - id: faster_whisper
        cost: zero
        self_hosted: true
        priority: 2
      - id: groq_whisper
        cost: zero
        self_hosted: false
        priority: 3
      - id: assemblyai_free
        cost: zero
        self_hosted: false
        priority: 4
      - id: deepgram_free
        cost: zero
        self_hosted: false
        priority: 5
      - id: openai_whisper_free
        cost: zero
        self_hosted: false
        priority: 6
      - id: offline_stt
        cost: zero
        self_hosted: true
        priority: 99
    rotation_chains:
      - name: stt_default
        providers: [whisper_local, faster_whisper, groq_whisper, assemblyai_free, deepgram_free, openai_whisper_free, offline_stt]

  image_generation:
    description: "Image gen — local SD/ComfyUI stubs, then free tiers"
    providers:
      - id: comfyui_local
        cost: zero
        self_hosted: true
        priority: 1
      - id: stable_diffusion_local
        cost: zero
        self_hosted: true
        priority: 2
      - id: huggingface_inference
        cost: zero
        self_hosted: false
        priority: 3
      - id: replicate_free
        cost: zero
        self_hosted: false
        priority: 4
      - id: pollinations
        cost: zero
        self_hosted: false
        priority: 5
      - id: leonardo_free
        cost: zero
        self_hosted: false
        priority: 6
      - id: offline_image
        cost: zero
        self_hosted: true
        priority: 99
    rotation_chains:
      - name: image_default
        providers: [comfyui_local, stable_diffusion_local, huggingface_inference, replicate_free, pollinations, leonardo_free, offline_image]

  ai_inference:
    description: "LLM inference — local Ollama first, then 8 free cloud tiers"
    providers:
      - id: ollama
        cost: zero
        self_hosted: true
        priority: 1
      - id: huggingface
        cost: zero
        self_hosted: false
        priority: 2
      - id: openrouter_free
        cost: zero
        self_hosted: false
        priority: 3
      - id: groq_free
        cost: zero
        self_hosted: false
        priority: 4
      - id: cerebras_free
        cost: zero
        self_hosted: false
        priority: 5
      - id: sambanova_free
        cost: zero
        self_hosted: false
        priority: 6
      - id: mistral_free
        cost: zero
        self_hosted: false
        priority: 7
      - id: github_models_free
        cost: zero
        self_hosted: false
        priority: 8
      - id: offline
        cost: zero
        self_hosted: true
        priority: 99
    rotation_chains:
      - name: zero_cost_cloud
        providers: [huggingface, openrouter_free, groq_free, cerebras_free, sambanova_free, mistral_free, github_models_free, offline]
      - name: zero_cost_local
        providers: [ollama, offline]
      - name: zero_cost_full
        providers: [ollama, huggingface, openrouter_free, groq_free, cerebras_free, sambanova_free, mistral_free, github_models_free, offline]

