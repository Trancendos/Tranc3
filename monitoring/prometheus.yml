# Tranc3 Prometheus Configuration
# Scrape all self-hosted workers + infrastructure services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'tranc3-production'
    environment: 'production'

rule_files:
  - /etc/prometheus/alerts/tranc3-core.yml

scrape_configs:
  # ── Traefik Metrics ──────────────────────────────────────────────────
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:9090']
        labels:
          service: 'traefik'
          category: 'infrastructure'

  # ── Prometheus Self-Monitoring ────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          category: 'infrastructure'

  # ── VictoriaMetrics Self-Monitoring ───────────────────────────────────
  - job_name: 'victoriametrics'
    static_configs:
      - targets: ['victoriametrics:8428']
        labels:
          service: 'victoriametrics'
          category: 'infrastructure'

  # ── Grafana Tempo Metrics ─────────────────────────────────────────────
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
        labels:
          service: 'tempo'
          category: 'infrastructure'

  # ── Valkey Metrics (via built-in INFO endpoint) ───────────────────────
  # Note: Use redis_exporter sidecar for full Prometheus metrics if needed.
  # Valkey exposes basic metrics at INFO; this entry reserves the job name.
  - job_name: 'valkey'
    static_configs:
      - targets: ['valkey:6379']
        labels:
          service: 'valkey'
          category: 'infrastructure'

  # ── NATS JetStream Metrics ────────────────────────────────────────────
  - job_name: 'nats'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['nats:8222']
        labels:
          service: 'nats'
          category: 'infrastructure'

  # ── Zot Registry Metrics ──────────────────────────────────────────────
  - job_name: 'zot'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['zot:5000']
        labels:
          service: 'zot'
          category: 'infrastructure'

  # ── P0 Workers ───────────────────────────────────────────────────────
  - job_name: 'tranc3-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['tranc3-backend:8000']
        labels:
          service: 'tranc3-backend'
          priority: 'P0'
          named: 'Luminous'
    # Readiness probe (separate from metrics)
  - job_name: 'tranc3-backend-health'
    metrics_path: '/health'
    scrape_interval: 30s
    static_configs:
      - targets: ['tranc3-backend:8000']
        labels:
          service: 'tranc3-backend'
          probe: 'health'

  - job_name: 'tranc3-ai'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['tranc3-ai:8001']
        labels:
          service: 'tranc3-ai'
          priority: 'P0'
          named: 'The Spark'

  - job_name: 'infinity-void'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['infinity-void:8002']
        labels:
          service: 'infinity-void'
          priority: 'P0'
          named: 'The Void'

  - job_name: 'api-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-gateway:8003']
        labels:
          service: 'api-gateway'
          priority: 'P0'
          named: 'The Citadel'

  - job_name: 'infinity-ws'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['infinity-ws:8004']
        labels:
          service: 'infinity-ws'
          priority: 'P0'
          named: 'The Nexus'

  - job_name: 'infinity-auth'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['infinity-auth:8005']
        labels:
          service: 'infinity-auth'
          priority: 'P0'
          named: 'Infinity'

  # ── P1 Workers ───────────────────────────────────────────────────────
  - job_name: 'users-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['users-service:8006']
        labels:
          service: 'users-service'
          priority: 'P1'

  - job_name: 'monitoring'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['monitoring:8007']
        labels:
          service: 'monitoring'
          priority: 'P1'
          named: 'The Observatory'

  - job_name: 'notifications'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['notifications:8008']
        labels:
          service: 'notifications'
          priority: 'P1'

  - job_name: 'infinity-ai'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['infinity-ai:8009']
        labels:
          service: 'infinity-ai'
          priority: 'P1'
          named: 'AI Gateway'

  # ── P2 Workers ───────────────────────────────────────────────────────
  - job_name: 'the-grid'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['the-grid:8010']
        labels:
          service: 'the-grid'
          priority: 'P2'
          named: 'The Digital Grid'

  - job_name: 'p2-workers'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'products-service:8011'
          - 'orders-service:8012'
          - 'payments-service:8013'
          - 'files-service:8014'
          - 'identity-service:8015'
        labels:
          priority: 'P2'

  # ── Creative Workers ─────────────────────────────────────────────────
  - job_name: 'creative-workers'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'blender-worker:8050'
          - 'triposr-worker:8051'
          - 'ffmpeg-worker:8052'
        labels:
          category: 'creative'
          named: 'Imaginarium'

  # ── KrakenD API Gateway Metrics ───────────────────────────────────────
  - job_name: 'krakend'
    metrics_path: '/__stats'
    static_configs:
      - targets: ['krakend:8090']
        labels:
          service: 'krakend'
          category: 'gateway'

  # ── Qdrant Vector Store Metrics ───────────────────────────────────────
  - job_name: 'qdrant'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['qdrant:6333']
        labels:
          service: 'qdrant'
          category: 'vector-db'
          named: 'Vector Store'

  # ── OpenBao / Vault Metrics ───────────────────────────────────────────
  - job_name: 'openbao'
    metrics_path: '/v1/sys/metrics'
    params:
      format: ['prometheus']
    bearer_token_file: /etc/prometheus/vault-token
    static_configs:
      - targets: ['openbao:8200']
        labels:
          service: 'openbao'
          category: 'secrets'
          named: 'The Void'
    # Note: create /etc/prometheus/vault-token with a Vault token that has
    # sys/metrics capability. If not configured, this job will fail silently.

  # ── Woodpecker CI Metrics ─────────────────────────────────────────────
  - job_name: 'woodpecker'
    static_configs:
      - targets: ['woodpecker-server:9001']
        labels:
          service: 'woodpecker'
          category: 'ci'

  # ── Dependency-Track SBOM Monitoring ─────────────────────────────────
  - job_name: 'dependency-track'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['dependency-track-apiserver:8080']
        labels:
          service: 'dependency-track'
          category: 'sbom'

  # ── Falco Runtime Security ────────────────────────────────────────────
  - job_name: 'falco'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['falco:8765']
        labels:
          service: 'falco'
          category: 'security'

  # ── SigNoz OpenTelemetry Collector Metrics ───────────────────────────────
  - job_name: 'signoz-otel-collector'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['signoz-otel-collector:8888']
        labels:
          service: 'signoz-otel-collector'
          category: 'observability'

  # ── SigNoz Query Service Metrics ──────────────────────────────────────────
  - job_name: 'signoz-query-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['signoz-query-service:8080']
        labels:
          service: 'signoz-query-service'
          category: 'observability'

  # ── Cal.com Scheduling Metrics ────────────────────────────────────────────
  - job_name: 'calcom'
    metrics_path: '/api/health'
    static_configs:
      - targets: ['calcom:3000']
        labels:
          service: 'calcom'
          category: 'scheduling'
          named: 'ChronosSphere'

  # ── Infrastructure Health Probes ─────────────────────────────────────
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://tranc3-ai:8001/health
          - http://infinity-void:8002/health
          - http://api-gateway:8003/health
          - http://infinity-ws:8004/health
          - http://infinity-auth:8005/health
          - http://users-service:8006/health
          - http://monitoring:8007/health
          - http://notifications:8008/health
          - http://infinity-ai:8009/health
          - http://the-grid:8010/health
          - http://blender-worker:8050/health
          - http://triposr-worker:8051/health
          - http://ffmpeg-worker:8052/health
          - http://qdrant:6333/healthz
          - http://langfuse:3000/api/public/health
          - http://calcom:3000/api/health
          - http://outline:3000/api/health.json
          - http://signoz-frontend:3301
