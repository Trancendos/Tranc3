# Tranc3 Prometheus Configuration
# Scrape all self-hosted workers + infrastructure services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'tranc3-production'
    environment: 'production'

scrape_configs:
  # ── Traefik Metrics ──────────────────────────────────────────────────
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:9090']
        labels:
          service: 'traefik'
          category: 'infrastructure'

  # ── Prometheus Self-Monitoring ────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          category: 'infrastructure'

  # ── P0 Workers ───────────────────────────────────────────────────────
  - job_name: 'tranc3-ai'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['tranc3-ai:8001']
        labels:
          service: 'tranc3-ai'
          priority: 'P0'
          named: 'The Spark'

  - job_name: 'infinity-void'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['infinity-void:8002']
        labels:
          service: 'infinity-void'
          priority: 'P0'
          named: 'The Void'

  - job_name: 'api-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-gateway:8003']
        labels:
          service: 'api-gateway'
          priority: 'P0'
          named: 'The Citadel'

  - job_name: 'infinity-ws'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['infinity-ws:8004']
        labels:
          service: 'infinity-ws'
          priority: 'P0'
          named: 'The Nexus'

  - job_name: 'infinity-auth'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['infinity-auth:8005']
        labels:
          service: 'infinity-auth'
          priority: 'P0'
          named: 'Infinity'

  # ── P1 Workers ───────────────────────────────────────────────────────
  - job_name: 'users-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['users-service:8006']
        labels:
          service: 'users-service'
          priority: 'P1'

  - job_name: 'monitoring'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['monitoring:8007']
        labels:
          service: 'monitoring'
          priority: 'P1'
          named: 'The Observatory'

  - job_name: 'notifications'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['notifications:8008']
        labels:
          service: 'notifications'
          priority: 'P1'

  - job_name: 'infinity-ai'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['infinity-ai:8009']
        labels:
          service: 'infinity-ai'
          priority: 'P1'
          named: 'AI Gateway'

  # ── P2 Workers ───────────────────────────────────────────────────────
  - job_name: 'the-grid'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['the-grid:8010']
        labels:
          service: 'the-grid'
          priority: 'P2'
          named: 'The Digital Grid'

  - job_name: 'p2-workers'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'products-service:8011'
          - 'orders-service:8012'
          - 'payments-service:8013'
          - 'files-service:8014'
          - 'identity-service:8015'
        labels:
          priority: 'P2'

  - job_name: 'sentinel-station-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['sentinel-station-service:8041']
        labels:
          service: 'sentinel-station-service'
          priority: 'P2'
          named: 'Sentinel Station'

  # ── P3 Workers (8016–8029) ───────────────────────────────────────────
  - job_name: 'p3-workers'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'analytics-service:8016'
          - 'search-service:8017'
          - 'email-service:8018'
          - 'sms-service:8019'
          - 'storage-service:8020'
          - 'cron-service:8021'
          - 'queue-service:8022'
          - 'cache-service:8023'
          - 'config-service:8024'
          - 'audit-service:8025'
          - 'rate-limit-service:8026'
          - 'geo-service:8027'
          - 'cdn-service:8028'
          - 'health-aggregator:8029'
        labels:
          priority: 'P3'

  # ── P3 Intelligence / AI Layer (8030–8039) ───────────────────────────
  - job_name: 'p3-intelligence'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'gbrain-bridge:8030'
          - 'topology-service:8031'
          - 'ledger-service:8032'
          - 'model-router-service:8033'
          - 'workflow-engine-service:8034'
          - 'turings-hub-service:8035'
          - 'langchain-integration-service:8036'
          - 'deepagents-orchestrator-service:8037'
          - 'vault-service:8038'
          - 'mlflow-service:8039'
        labels:
          priority: 'P3'

  # ── Creative Workers ─────────────────────────────────────────────────
  - job_name: 'creative-workers'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'blender-worker:8050'
          - 'triposr-worker:8051'
          - 'ffmpeg-worker:8052'
        labels:
          category: 'creative'
          named: 'Imaginarium'

  # ── KrakenD API Gateway Metrics ───────────────────────────────────────
  - job_name: 'krakend'
    metrics_path: '/__stats'
    static_configs:
      - targets: ['krakend:8090']
        labels:
          service: 'krakend'
          category: 'gateway'

  # ── Qdrant Vector Store Metrics ───────────────────────────────────────
  - job_name: 'qdrant'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['qdrant:6333']
        labels:
          service: 'qdrant'
          category: 'vector-db'
          named: 'Vector Store'

  # ── OpenBao / Vault Metrics ───────────────────────────────────────────
  - job_name: 'openbao'
    metrics_path: '/v1/sys/metrics'
    params:
      format: ['prometheus']
    bearer_token_file: /etc/prometheus/vault-token
    static_configs:
      - targets: ['openbao:8200']
        labels:
          service: 'openbao'
          category: 'secrets'
          named: 'The Void'
    # Note: create /etc/prometheus/vault-token with a Vault token that has
    # sys/metrics capability. If not configured, this job will fail silently.

  # ── Woodpecker CI Metrics ─────────────────────────────────────────────
  - job_name: 'woodpecker'
    static_configs:
      - targets: ['woodpecker-server:9001']
        labels:
          service: 'woodpecker'
          category: 'ci'

  # ── Dependency-Track SBOM Monitoring ─────────────────────────────────
  - job_name: 'dependency-track'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['dependency-track-apiserver:8080']
        labels:
          service: 'dependency-track'
          category: 'sbom'

  # ── Falco Runtime Security ────────────────────────────────────────────
  - job_name: 'falco'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['falco:8765']
        labels:
          service: 'falco'
          category: 'security'

  # ── SigNoz OpenTelemetry Collector Metrics ───────────────────────────────
  - job_name: 'signoz-otel-collector'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['signoz-otel-collector:8888']
        labels:
          service: 'signoz-otel-collector'
          category: 'observability'

  # ── SigNoz Query Service Metrics ──────────────────────────────────────────
  - job_name: 'signoz-query-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['signoz-query-service:8080']
        labels:
          service: 'signoz-query-service'
          category: 'observability'

  # ── Cal.com Scheduling Metrics ────────────────────────────────────────────
  - job_name: 'calcom'
    metrics_path: '/api/health'
    static_configs:
      - targets: ['calcom:3000']
        labels:
          service: 'calcom'
          category: 'scheduling'
          named: 'ChronosSphere'

  # ── Infrastructure Health Probes ─────────────────────────────────────
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://tranc3-ai:8001/health
          - http://infinity-void:8002/health
          - http://api-gateway:8003/health
          - http://infinity-ws:8004/health
          - http://infinity-auth:8005/health
          - http://users-service:8006/health
          - http://monitoring:8007/health
          - http://notifications:8008/health
          - http://infinity-ai:8009/health
          - http://the-grid:8010/health
          - http://products-service:8011/health
          - http://orders-service:8012/health
          - http://payments-service:8013/health
          - http://files-service:8014/health
          - http://identity-service:8015/health
          - http://analytics-service:8016/health
          - http://search-service:8017/health
          - http://email-service:8018/health
          - http://sms-service:8019/health
          - http://storage-service:8020/health
          - http://cron-service:8021/health
          - http://queue-service:8022/health
          - http://cache-service:8023/health
          - http://config-service:8024/health
          - http://audit-service:8025/health
          - http://rate-limit-service:8026/health
          - http://geo-service:8027/health
          - http://cdn-service:8028/health
          - http://health-aggregator:8029/health
          - http://gbrain-bridge:8030/health
          - http://topology-service:8031/health
          - http://ledger-service:8032/health
          - http://model-router-service:8033/health
          - http://workflow-engine-service:8034/health
          - http://turings-hub-service:8035/health
          - http://langchain-integration-service:8036/health
          - http://deepagents-orchestrator-service:8037/health
          - http://vault-service:8038/health
          - http://mlflow-service:8039/health
          - http://sentinel-station-service:8041/health
          - http://blender-worker:8050/health
          - http://triposr-worker:8051/health
          - http://ffmpeg-worker:8052/health
          - http://qdrant:6333/healthz
          - http://langfuse:3000/api/public/health
          - http://calcom:3000/api/health
          - http://outline:3000/api/health.json
          - http://signoz-frontend:3301
