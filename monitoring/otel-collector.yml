receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Pull metrics from Prometheus-compatible endpoints
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-self'
          static_configs:
            - targets: ['localhost:8888']

processors:
  # Add cluster/environment attributes to all telemetry
  resource:
    attributes:
      - key: cluster
        value: tranc3-production
        action: upsert
      - key: environment
        value: production
        action: upsert

  # Batch for efficiency
  batch:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Drop high-cardinality noise
  filter/drop_health:
    traces:
      span:
        - 'attributes["http.route"] == "/health"'
        - 'attributes["http.route"] == "/metrics"'

  # Memory limiter — critical for zero-cost self-hosted
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

  # Tail sampling — keep 100% of errors, 10% of healthy traces
  tail_sampling:
    decision_wait: 10s
    num_traces: 10000
    expected_new_traces_per_sec: 100
    policies:
      - name: errors-policy
        type: status_code
        status_code: {status_codes: [ERROR]}
      - name: slow-traces-policy
        type: latency
        latency: {threshold_ms: 1000}
      - name: probabilistic-policy
        type: probabilistic
        probabilistic: {sampling_percentage: 10}

exporters:
  # Traces → Grafana Tempo (primary — Grafana Explore integration)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Traces → Jaeger (secondary — rich service dependency graph + search UI)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Metrics → VictoriaMetrics (Prometheus-compatible remote write, 10× lighter)
  prometheusremotewrite:
    endpoint: http://victoriametrics:8428/api/v1/write
    tls:
      insecure: true

  # Logs → Loki
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: false
      job: true

  # SigNoz — unified APM (traces + metrics + logs in one UI)
  otlp/signoz:
    endpoint: signoz-otel-collector:4317
    tls:
      insecure: true

  # Debug (low verbosity — safe for production)
  logging:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    # Fan-out: Tempo (Grafana) + Jaeger (dependency graph) + SigNoz (APM)
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, filter/drop_health, tail_sampling, batch]
      exporters: [otlp/tempo, otlp/jaeger, otlp/signoz, logging]

    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheusremotewrite, otlp/signoz, logging]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [loki, otlp/signoz, logging]

  telemetry:
    logs:
      level: warn
    metrics:
      address: 0.0.0.0:8888
