apiVersion: 1

datasources:
  # ── Prometheus — primary metrics scraper (kept as backup / federation) ──
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true
    jsonData:
      timeInterval: "15s"

  # ── VictoriaMetrics — Prometheus-compatible TSDB, 10× lighter ──────────
  # Default metrics source. PromQL-compatible; drop-in replacement for Prometheus.
  - name: VictoriaMetrics
    type: prometheus
    access: proxy
    url: http://victoriametrics:8428
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"

  # ── Grafana Tempo — distributed tracing backend (OTLP) ─────────────────
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: victoriametrics
      serviceMap:
        datasourceUid: victoriametrics
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki

  # ── Loki — log aggregation ──────────────────────────────────────────────
  - name: Loki
    type: loki
    access: proxy
    uid: loki
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"(\w+)"'
          url: "$${__value.raw}"
          datasourceUid: tempo

  - name: Vault
    type: marcusolsson-json-datasource
    access: proxy
    url: http://vault:8200
    editable: true
