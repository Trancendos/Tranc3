---
# ansible/playbooks/health-check.yml
# Ping all Tranc3 workers and report status.
# Usage: ansible-playbook ansible/playbooks/health-check.yml

- name: Tranc3 Platform Health Check
  hosts: workers
  gather_facts: false
  vars:
    tranc3_root: "{{ lookup('env', 'PWD') }}"
    worker_ports:
      - { name: infinity-ws,        port: 8004 }
      - { name: infinity-auth,      port: 8005 }
      - { name: users-service,      port: 8006 }
      - { name: monitoring,         port: 8007 }
      - { name: notifications,      port: 8008 }
      - { name: infinity-ai,        port: 8009 }
      - { name: the-grid,           port: 8010 }
      - { name: products-service,   port: 8011 }
      - { name: orders-service,     port: 8012 }
      - { name: payments-service,   port: 8013 }

  tasks:
    - name: Check worker health endpoints
      uri:
        url: "http://localhost:{{ item.port }}/health"
        method: GET
        timeout: 5
        status_code: [200, 204]
        return_content: true
      loop: "{{ worker_ports }}"
      loop_control:
        label: "{{ item.name }} (:{{ item.port }})"
      register: health_results
      failed_when: false
      ignore_errors: true

    - name: Report results
      debug:
        msg: >
          {{ item.item.name }}  port={{ item.item.port }}
          → {{ 'OK' if item.status == 200 else 'FAIL (' + (item.msg | default('no response')) + ')' }}
      loop: "{{ health_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Count healthy workers
      set_fact:
        healthy_count: "{{ health_results.results | selectattr('status', 'equalto', 200) | list | length }}"
        total_count: "{{ worker_ports | length }}"

    - name: Health summary
      debug:
        msg: "Health summary: {{ healthy_count }}/{{ total_count }} workers healthy."
