---
# ansible/playbooks/deploy-workers.yml
# Start / restart Tranc3 self-hosted workers via Docker Compose.
# Usage: ansible-playbook ansible/playbooks/deploy-workers.yml
#        ansible-playbook ansible/playbooks/deploy-workers.yml -e priority=p0

- name: Deploy Tranc3 Workers
  hosts: local
  gather_facts: false
  vars:
    tranc3_root: "{{ lookup('env', 'PWD') }}"
    priority: "all"   # override: p0, p1, p2, p3, all

  tasks:
    - name: Verify Docker is available
      command: docker info
      changed_when: false
      failed_when: false
      register: docker_info

    - name: Fail if Docker unavailable
      fail:
        msg: "Docker is not running — start Docker first."
      when: docker_info.rc != 0

    - name: Pull latest images
      command: docker compose pull
      args:
        chdir: "{{ tranc3_root }}"
      when: priority == "all"
      changed_when: true

    - name: Start all workers (docker compose up -d)
      command: docker compose up -d
      args:
        chdir: "{{ tranc3_root }}"
      when: priority == "all"
      changed_when: true

    - name: Start P0 workers only
      command: >
        docker compose up -d
        infinity-ws infinity-auth
      args:
        chdir: "{{ tranc3_root }}"
      when: priority == "p0"
      changed_when: true

    - name: Start P1 workers only
      command: >
        docker compose up -d
        users-service monitoring notifications infinity-ai
      args:
        chdir: "{{ tranc3_root }}"
      when: priority == "p1"
      changed_when: true

    - name: Wait for health endpoints to respond
      uri:
        url: "http://localhost:{{ item }}/health"
        method: GET
        timeout: 10
        status_code: [200, 204]
      loop: [8004, 8005, 8007]
      retries: 12
      delay: 5
      register: health
      until: health.status == 200 or health.status == 204
      ignore_errors: true
      when: priority in ["all", "p0", "p1"]

    - name: Deployment complete
      debug:
        msg: "Workers deployed successfully (priority={{ priority }})."
