# Tranc3 Platform — Ansible Inventory
# Self-hosted single-node production deployment on trancendos.com
# (Expand to multi-node by adding more hosts to each group.)

[local]
localhost ansible_connection=local

[workers]
trancendos.com ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/tranc3_deploy

[workers:vars]
python_path=/usr/bin/python3
tranc3_root=/opt/tranc3
workers_base_port=8004

[p0_workers]
trancendos.com ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/tranc3_deploy

[p1_workers]
trancendos.com ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/tranc3_deploy

[p2_workers]
trancendos.com ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/tranc3_deploy

[all:vars]
ansible_python_interpreter=/usr/bin/python3
tranc3_env=production
