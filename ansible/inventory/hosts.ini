# Tranc3 Platform — Ansible Inventory
# Self-hosted single-node (expand to multi-node by adding more hosts)

[local]
localhost ansible_connection=local

[workers]
localhost ansible_connection=local

[workers:vars]
python_path=/usr/bin/python3
tranc3_root=/home/user/Tranc3
workers_base_port=8004

[p0_workers]
localhost ansible_connection=local

[p1_workers]
localhost ansible_connection=local

[p2_workers]
localhost ansible_connection=local

[all:vars]
ansible_python_interpreter=/usr/bin/python3
tranc3_env=development
