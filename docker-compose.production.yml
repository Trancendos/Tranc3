      - "traefik.http.routers.sentinel-station-service.entrypoints=websecure"
      - "traefik.http.services.sentinel-station-service.loadbalancer.server.port=8041"

  # ── Swarm Coordinator — agent swarm management (Port 8053) ──────────────────────────────────────────────
  swarm-coordinator-service:
    build:
      context: ./workers/swarm-coordinator-service
      dockerfile: Dockerfile
    container_name: tranc3-swarm-coordinator-service
    <<: *worker-common
    environment:
      - PORT=8109
    expose:
