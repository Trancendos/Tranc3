    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hive-service.rule=PathPrefix(`/hive`)"
      - "traefik.http.routers.hive-service.entrypoints=websecure"
      - "traefik.http.services.hive-service.loadbalancer.server.port=8051"

  # ── The Ice Box — sandbox threat isolation (Port 8046) ──────────────────────────────────────────────
  ice-box-service:
    build:
      context: ./workers/ice-box-service
      dockerfile: Dockerfile
    container_name: tranc3-ice-box-service
    <<: *worker-common
    environment:
