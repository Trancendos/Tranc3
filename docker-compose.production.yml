    healthcheck:
      <<: *healthcheck-default
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8109/health')"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.swarm-coordinator-service.rule=PathPrefix(`/swarm-coordinator`)"
      - "traefik.http.routers.swarm-coordinator-service.entrypoints=websecure"
      - "traefik.http.services.swarm-coordinator-service.loadbalancer.server.port=8109"

  # ── The HIVE — task queue / agent coordination (Port 8051) ──────────────────────────────────────────────
  hive-service:
    build:
      context: ./workers/hive-service
      dockerfile: Dockerfile
    container_name: tranc3-hive-service
    <<: *worker-common
    environment:
      - HIVE_PORT=8051
    expose:
