      <<: *healthcheck-default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infinity-one.rule=PathPrefix(`/identity`)"
      - "traefik.http.routers.infinity-one.entrypoints=websecure"
      - "traefik.http.services.infinity-one.loadbalancer.server.port=8043"

  # ── Infinity Admin — Entity & Config Management (Port 8044) ──────────────
  infinity-admin:
    <<: *worker-common
    build:
      context: .
      dockerfile: workers/infinity-admin-service/Dockerfile
    container_name: infinity-admin-worker
    ports:
      - "8044:8044"
    volumes:
      - admin-data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8044/health', timeout=5).read()\""]
      <<: *healthcheck-default

  # ── Infinity Shards — Pluggable Entity Power-Ups (Port 8045) ─────────────
  infinity-shards:
    <<: *worker-common
    build:
      context: .
      dockerfile: workers/infinity-shards-service/Dockerfile
    container_name: infinity-shards-worker
    ports:
      - "8045:8045"
    environment:
      INFINITY_SHARDS_DB_PATH: /app/data/infinity_shards.db
      AUTH_SERVICE_URL: http://infinity-auth-worker:8005
    volumes:
      - shards-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8045/health"]
      <<: *healthcheck-default

  # ── Infinity Bridge — Human Traffic Transfer Hub (Port 8070) ──────────────
  infinity-bridge:
    <<: *worker-common
    build:
      context: .
      dockerfile: workers/infinity-bridge-service/Dockerfile
    container_name: infinity-bridge-worker
    ports:
      - "8070:8070"
    environment:
      INFINITY_BRIDGE_PORT: "8070"
      INTERNAL_SECRET: ${INTERNAL_SECRET:?required}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/health"]
      <<: *healthcheck-default

  # ── CranBania — The Town Hall (Kanban + ITSM + Agile, Port 8071) ─────────────
  # Entity: The Town Hall | Lead AI: Tristuran | Source: github.com/Trancendos/CranBania
  # Governance hub: PRINCE2, ITIL, Agile/Kanban, ITSM, visual boards, workshops
  # MCP server (40+ tools) auto-registered with The Spark on startup
  # Magna Carta alignment: change cards enforce governance gate (MC-RULE-007)
  cranbania:
    <<: *worker-common
    build:
      context: workers/cranbania
      dockerfile: Dockerfile
    container_name: cranbania-worker
    ports:
      - "8071:8071"
    environment:
      PORT: "8071"
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      CRANBANIA_DATA_DIR: /app/data
      CRANBANIA_API_KEY: ${CRANBANIA_API_KEY:-}
      CRANBANIA_CRON_SECRET: ${CRANBANIA_CRON_SECRET:-}
      CRANBANIA_FORGEJO_URL: ${CRANBANIA_FORGEJO_URL:-http://forgejo:3000}
      CRANBANIA_WEBHOOK_SECRET: ${CRANBANIA_WEBHOOK_SECRET:-}
      CRANBANIA_OBSERVATORY_URL: http://monitoring-worker:8007
      MAGNA_CARTA_ENABLED: ${MAGNA_CARTA_ENABLED:-false}
    volumes:
      - cranbania-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8071/api/board"]
      <<: *healthcheck-default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cranbania.rule=Host(`trancendos.com`) && PathPrefix(`/townhall`)"
      - "traefik.http.routers.cranbania.entrypoints=websecure"
      - "traefik.http.routers.cranbania.tls=true"
      - "traefik.http.routers.cranbania.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cranbania.middlewares=strip-townhall@docker,ratelimit-cranbania@docker"
      - "traefik.http.middlewares.strip-townhall.stripprefix.prefixes=/townhall"
      - "traefik.http.middlewares.ratelimit-cranbania.ratelimit.average=100"
      - "traefik.http.middlewares.ratelimit-cranbania.ratelimit.burst=50"
      - "traefik.http.services.cranbania.loadbalancer.server.port=8071"

  # ── Qdrant — High-performance vector database (Apache 2.0) ─────────────
  # Free: self-hosted with unlimited vectors
  # Replaces Pinecone/paid vector services for The Spark RAG-MCP + knowledge search
  qdrant:
    image: qdrant/qdrant:latest
    container_name: trancendos-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: "6333"
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: INFO
    networks:
      - tranc3-net
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Penpot — Open-source design platform (MPL 2.0), Figma alternative ──
  # Fabulousa: Baron Von Hilton — Styling, UX, UI & design center
  penpot-frontend:
    image: penpotapp/frontend:latest
    container_name: trancendos-penpot-frontend
    restart: unless-stopped
    ports:
      - "9002:80"
    environment:
      PENPOT_FLAGS: "enable-registration enable-login disable-demo-users"
    depends_on:
      - penpot-backend
      - penpot-exporter
    networks:
      - tranc3-net
    labels:
      traefik.enable: "true"
      traefik.http.routers.penpot.rule: "Host(`design.trancendos.com`)"
      traefik.http.routers.penpot.entrypoints: "websecure"
      traefik.http.routers.penpot.tls.certresolver: "letsencrypt"

  penpot-backend:
    image: penpotapp/backend:latest
    container_name: trancendos-penpot-backend
    restart: unless-stopped
    environment:
      PENPOT_FLAGS: "enable-registration enable-login disable-demo-users disable-secure-session-cookies"
      PENPOT_SECRET_KEY: "${PENPOT_SECRET_KEY:?required}"
      PENPOT_DATABASE_URI: "postgresql://penpot:penpot@penpot-db/penpot"
      PENPOT_REDIS_URI: "redis://valkey:6379/2"
      PENPOT_STORAGE_BACKEND: "fs"
      PENPOT_STORAGE_FS_DIRECTORY: "/opt/data/assets"
      PENPOT_ASSETS_STORAGE_BACKEND: "assets-fs"
      PENPOT_STORAGE_ASSETS_FS_DIRECTORY: "/opt/data/assets"
    volumes:
      - penpot-data:/opt/data
    depends_on:
      - penpot-db
    networks:
      - tranc3-net

  penpot-exporter:
    image: penpotapp/exporter:latest
    container_name: trancendos-penpot-exporter
    restart: unless-stopped
    environment:
      PENPOT_PUBLIC_URI: "http://penpot-frontend"
    networks:
      - tranc3-net

  penpot-db:
    image: postgres:15-alpine
    container_name: trancendos-penpot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: penpot
      POSTGRES_USER: penpot
      POSTGRES_PASSWORD: penpot
    volumes:
      - penpot-db-data:/var/lib/postgresql/data
    networks:
      - tranc3-net

  # ── OWASP Dependency-Track — SBOM vulnerability monitoring (Apache 2.0) ─
  # Consumes CycloneDX SBOMs generated by syft in CI, tracks CVEs continuously
  dependency-track-apiserver:
    image: dependencytrack/apiserver:latest
    container_name: trancendos-dtrack-api
    restart: unless-stopped
    environment:
      ALPINE_DATABASE_MODE: internal
      ALPINE_METRICS_ENABLED: "true"
    volumes:
      - dtrack-data:/data
    ports:
      - "8083:8080"
    networks:
      - tranc3-net
    deploy:
      resources:
        limits:
          memory: 768m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/version"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 60s

  dependency-track-frontend:
    image: dependencytrack/frontend:latest
    container_name: trancendos-dtrack-frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: "http://dependency-track-apiserver:8080"
    ports:
      - "8084:8080"
    depends_on:
      - dependency-track-apiserver
    networks:
      - tranc3-net
    labels:
      traefik.enable: "true"
      traefik.http.routers.dtrack.rule: "Host(`sbom.trancendos.com`)"
      traefik.http.routers.dtrack.entrypoints: "websecure"
      traefik.http.routers.dtrack.tls.certresolver: "letsencrypt"

  # Falco — Runtime security monitoring (Apache 2.0, eBPF-based)
  falco:
    image: falcosecurity/falco-no-driver:latest
    container_name: trancendos-falco
    restart: unless-stopped
    privileged: true
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /etc:/host/etc:ro
      - ./config/falco:/etc/falco:ro
    environment:
      HOST_ROOT: /host
      FALCO_HOSTNAME: trancendos-falco
    networks:
      - tranc3-net
    deploy:
      resources:
        limits:
          memory: 256m

  # ═══════════════════════════════════════════════════════════════════════
  # CI/CD LAYER — Woodpecker CI (alongside Forgejo / The Workshop)
  # ═══════════════════════════════════════════════════════════════════════

  # ── Woodpecker Server — CI orchestrator (Port 8100) ──────────────────
  # Apache 2.0 licensed self-hosted CI. Integrates with Forgejo (The Workshop).
  # Dashboard: https://ci.trancendos.com  (Traefik routes Host ci.trancendos.com)
  # Required env: WOODPECKER_FORGEJO_CLIENT, WOODPECKER_FORGEJO_SECRET,
  #               WOODPECKER_SECRET, WOODPECKER_AGENT_TOKEN
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:latest
    container_name: trancendos-woodpecker-server
    restart: unless-stopped
    ports:
      - "8100:8000"
    environment:
      WOODPECKER_OPEN: "true"
      WOODPECKER_FORGEJO: "true"
      WOODPECKER_FORGEJO_URL: "${FORGEJO_URL:-http://forgejo:3000}"
      WOODPECKER_FORGEJO_CLIENT: "${WOODPECKER_FORGEJO_CLIENT}"
      WOODPECKER_FORGEJO_SECRET: "${WOODPECKER_FORGEJO_SECRET}"
      WOODPECKER_SECRET: "${WOODPECKER_SECRET:?required}"
      WOODPECKER_DATABASE_DATASOURCE: "/var/lib/woodpecker/woodpecker.db"
      WOODPECKER_DATABASE_DRIVER: "sqlite3"
    volumes:
      - woodpecker-data:/var/lib/woodpecker
    networks:
      - tranc3-net
    labels:
      traefik.enable: "true"
      traefik.http.routers.woodpecker.rule: "Host(`ci.trancendos.com`)"
      traefik.http.routers.woodpecker.entrypoints: "websecure"
      traefik.http.routers.woodpecker.tls.certresolver: "letsencrypt"

  # ── Woodpecker Agent — CI runner ─────────────────────────────────────
  # Executes pipeline steps inside Docker containers (zero-cost, local).
  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:latest
    container_name: trancendos-woodpecker-agent
    restart: unless-stopped
    depends_on:
      - woodpecker-server
    environment:
      WOODPECKER_SERVER: "woodpecker-server:9000"
      WOODPECKER_TOKEN: "${WOODPECKER_AGENT_TOKEN:?required}"
      WOODPECKER_MAX_WORKFLOWS: "4"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - tranc3-net

  # ─────────────────────────────────────────────────────────────────────────
  # Cal.com — ChronosSphere / ArcStream (self-hosted scheduling, MIT)
  # UI: http://localhost:3010  Env-set: http://scheduling.trancendos.com
  # ─────────────────────────────────────────────────────────────────────────
  calcom-db:
    image: postgres:15-alpine
    container_name: trancendos-calcom-db
    environment:
      POSTGRES_USER: calcom
      POSTGRES_PASSWORD: "${CALCOM_DB_PASSWORD:?required}"
      POSTGRES_DB: calcom
    volumes:
      - calcom-db-data:/var/lib/postgresql/data
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calcom -d calcom"]
      interval: 30s
      timeout: 10s
      retries: 3

  calcom:
    image: calcom/cal.com:latest
    container_name: trancendos-calcom
    ports:
      - "3010:3000"
    environment:
      DATABASE_URL: "postgresql://calcom:${CALCOM_DB_PASSWORD:?required}@calcom-db:5432/calcom"
      NEXTAUTH_SECRET: "${CALCOM_NEXTAUTH_SECRET:?required}"
      CALENDSO_ENCRYPTION_KEY: "${CALCOM_ENCRYPTION_KEY:?required}"
      NEXT_PUBLIC_WEBAPP_URL: "${CALCOM_URL:-http://localhost:3010}"
      EMAIL_FROM: "${CALCOM_EMAIL_FROM:-noreply@trancendos.com}"
      NEXT_PUBLIC_LICENSE_CONSENT: "agree"
    depends_on:
      calcom-db:
        condition: service_healthy
    volumes:
      - calcom-data:/app/.next
    networks:
      - tranc3-net
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.calcom.rule: "Host(`scheduling.trancendos.com`)"
      traefik.http.routers.calcom.entrypoints: "websecure"
      traefik.http.routers.calcom.tls.certresolver: "letsencrypt"
      traefik.http.services.calcom.loadbalancer.server.port: "3000"

  # ─────────────────────────────────────────────────────────────────────────
  # Outline — The Library / Zimik (self-hosted wiki, BSL)
  # UI: http://localhost:3011  Env-set: http://wiki.trancendos.com
  # ─────────────────────────────────────────────────────────────────────────
  outline-db:
    image: postgres:15-alpine
    container_name: trancendos-outline-db
    environment:
      POSTGRES_USER: outline
      POSTGRES_PASSWORD: "${OUTLINE_DB_PASSWORD:?required}"
      POSTGRES_DB: outline
    volumes:
      - outline-db-data:/var/lib/postgresql/data
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outline -d outline"]
      interval: 30s
      timeout: 10s
      retries: 3

  outline-redis:
    image: valkey/valkey:8-alpine
    container_name: trancendos-outline-redis
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - outline-redis-data:/data
    networks:
      - tranc3-net
    restart: unless-stopped

  outline:
    image: outlinewiki/outline:latest
    container_name: trancendos-outline
    ports:
      - "3011:3000"
    environment:
      DATABASE_URL: "postgres://outline:${OUTLINE_DB_PASSWORD:?required}@outline-db:5432/outline"
      REDIS_URL: "redis://outline-redis:6379"
      SECRET_KEY: "${OUTLINE_SECRET_KEY:?required}"
      UTILS_SECRET: "${OUTLINE_UTILS_SECRET:?required}"
      URL: "${OUTLINE_URL:-http://localhost:3011}"
      PORT: "3000"
      FILE_STORAGE: "local"
      FILE_STORAGE_LOCAL_ROOT_DIR: "/var/lib/outline/data"
      PGSSLMODE: "disable"
    depends_on:
      outline-db:
        condition: service_healthy
      outline-redis:
        condition: service_started
    volumes:
      - outline-data:/var/lib/outline/data
    networks:
      - tranc3-net
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.outline.rule: "Host(`wiki.trancendos.com`)"
      traefik.http.routers.outline.entrypoints: "websecure"
      traefik.http.routers.outline.tls.certresolver: "letsencrypt"
      traefik.http.services.outline.loadbalancer.server.port: "3000"

  # ─────────────────────────────────────────────────────────────────────────
  # BookStack — The Library secondary wiki backend (MIT, self-hosted)
  # UI: http://localhost:6875
  # ─────────────────────────────────────────────────────────────────────────
  bookstack-db:
    image: mariadb:11
    container_name: trancendos-bookstack-db
    environment:
      MYSQL_ROOT_PASSWORD: "${BOOKSTACK_DB_ROOT_PASSWORD:?required}"
      MYSQL_DATABASE: bookstack
      MYSQL_USER: bookstack
      MYSQL_PASSWORD: "${BOOKSTACK_DB_PASSWORD:?required}"
    volumes:
      - bookstack-db-data:/var/lib/mysql
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: trancendos-bookstack
    environment:
      PUID: "1000"
      PGID: "1000"
      APP_URL: "${BOOKSTACK_APP_URL:-http://bookstack:80}"
      DB_HOST: bookstack-db
      DB_PORT: "3306"
      DB_USER: bookstack
      DB_PASS: "${BOOKSTACK_DB_PASSWORD:?required}"
      DB_DATABASE: bookstack
    volumes:
      - bookstack-data:/config
    depends_on:
      bookstack-db:
        condition: service_healthy
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────
  # library-service — The Library ACO router (Port 8067, Lead AI: Zimik)
  # Routes: Outline→BookStack→Wiki.js→Gollum→DokuWiki→MkDocs→Gitea→TiddlyWiki
  # ─────────────────────────────────────────────────────────────────────────
  library-service:
    build:
      context: ./workers/library-service
      dockerfile: Dockerfile
    container_name: trancendos-library-service
    environment:
      LIBRARY_PORT: "8067"
      LIBRARY_DB_PATH: "/data/library.db"
      OUTLINE_URL: "http://outline:3000"
      OUTLINE_API_KEY: "${OUTLINE_API_KEY:-}"
      BOOKSTACK_URL: "http://bookstack:80"
      BOOKSTACK_TOKEN_ID: "${BOOKSTACK_TOKEN_ID:-}"
      BOOKSTACK_TOKEN_SECRET: "${BOOKSTACK_TOKEN_SECRET:-}"
      WIKIJS_URL: "${WIKIJS_URL:-http://wikijs:3000}"
      WIKIJS_API_KEY: "${WIKIJS_API_KEY:-}"
      GOLLUM_URL: "${GOLLUM_URL:-http://gollum:4567}"
      DOKUWIKI_URL: "${DOKUWIKI_URL:-http://dokuwiki:80}"
      MKDOCS_URL: "${MKDOCS_URL:-http://mkdocs:8000}"
      GITEA_URL: "${GITEA_URL:-http://gitea:3000}"
      GITEA_TOKEN: "${GITEA_TOKEN:-}"
      TIDDLYWIKI_URL: "${TIDDLYWIKI_URL:-http://tiddlywiki:8080}"
      INTERNAL_SECRET: "${INTERNAL_SECRET:?required}"
      LIBRARY_TLS_VERIFY: "${LIBRARY_TLS_VERIFY:-0}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
    volumes:
      - library-data:/data
    depends_on:
      - outline
      - bookstack
    networks:
      - tranc3-net
    ports:
      - "8067:8067"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8067/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      traefik.enable: "true"
      traefik.http.routers.library-service.rule: "PathPrefix(`/library`)"
      traefik.http.routers.library-service.entrypoints: "websecure"
      traefik.http.routers.library-service.tls.certresolver: "letsencrypt"
      traefik.http.services.library-service.loadbalancer.server.port: "8067"

  # ─────────────────────────────────────────────────────────────────────────
  # SigNoz — The Observatory enhanced (OpenTelemetry-native APM, Apache 2.0)
  # UI: http://localhost:3301  Backend: ClickHouse + query-service
  # ─────────────────────────────────────────────────────────────────────────
  signoz-clickhouse:
    image: clickhouse/clickhouse-server:24.1.2-alpine
    container_name: trancendos-signoz-clickhouse
    environment:
      CLICKHOUSE_DB: signoz_traces
      CLICKHOUSE_USER: signoz
      CLICKHOUSE_PASSWORD: "${SIGNOZ_CLICKHOUSE_PASSWORD:?required}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - signoz-clickhouse-data:/var/lib/clickhouse
      - signoz-clickhouse-logs:/var/log/clickhouse-server
    networks:
      - tranc3-net
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  signoz-query-service:
    image: signoz/query-service:latest
    container_name: trancendos-signoz-query
    command: ["-config=/root/config/prometheus.yml"]
    environment:
      ClickHouseUrl: "tcp://signoz:${SIGNOZ_CLICKHOUSE_PASSWORD:?required}@signoz-clickhouse:9000/signoz_traces"
      STORAGE: clickhouse
      GODEBUG: netdns=go
      TELEMETRY_ENABLED: "false"
      DEPLOYMENT_TYPE: "docker-standalone"
    volumes:
      - signoz-query-data:/root/data
      - ./monitoring/prometheus.yml:/root/config/prometheus.yml:ro
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    networks:
      - tranc3-net
    restart: unless-stopped

  signoz-frontend:
    image: signoz/frontend:latest
    container_name: trancendos-signoz-frontend
    ports:
      - "3301:3301"
    environment:
      FRONTEND_API_ENDPOINT: "http://signoz-query-service:8080"
    depends_on:
      - signoz-query-service
    networks:
      - tranc3-net
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.signoz.rule: "Host(`apm.trancendos.com`)"
      traefik.http.routers.signoz.entrypoints: "websecure"
      traefik.http.routers.signoz.tls.certresolver: "letsencrypt"
      traefik.http.services.signoz.loadbalancer.server.port: "3301"

  # SigNoz OpenTelemetry Collector (receives OTLP from all workers)
  signoz-otel-collector:
    image: signoz/signoz-otel-collector:latest
    container_name: trancendos-signoz-otel
    command: ["--config=/etc/otel-collector-config.yaml"]
    environment:
      OTEL_RESOURCE_ATTRIBUTES: "host.name=trancendos-production,os.type=linux"
      LOW_CARDINAL_EXCEPTION_GROUPING: "false"
    volumes:
      - ./config/signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "24317:4317"   # OTLP gRPC (host 24317; avoids conflict with otel-collector on 4317)
      - "24318:4318"   # OTLP HTTP (host 24318; avoids conflict with otel-collector on 4318)
    depends_on:
      - signoz-clickhouse
    networks:
      - tranc3-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════════════════
  # ADAPTIVE AI LAYER — LiteLLM Proxy (Apache 2.0, zero-cost)
  # Unified OpenAI-compatible endpoint over x8 free provider backends.
  # Port 4000. Route: ai.trancendos.com/litellm
  # Providers: ollama → groq → cerebras → sambanova → gemini → openrouter
  #            → mistral → huggingface (x8 rotation with hard stops)
  # ══════════════════════════════════════════════════════════════════════════
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: trancendos-litellm
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "4"]
    volumes:
      - ./config/litellm/config.yaml:/app/config.yaml:ro
      - litellm-data:/app/data
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:?required}"
      LITELLM_SALT_KEY: "${LITELLM_SALT_KEY:?required}"
      DATABASE_URL: "sqlite:////app/data/litellm.db"
      STORE_MODEL_IN_DB: "True"
      # Provider API keys (all free tiers)
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      CEREBRAS_API_KEY: "${CEREBRAS_API_KEY:-}"
      SAMBANOVA_API_KEY: "${SAMBANOVA_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY:-}"
      HUGGINGFACE_API_KEY: "${HUGGINGFACE_API_KEY:-}"
      TOGETHER_API_KEY: "${TOGETHER_API_KEY:-}"
      CF_ACCOUNT_ID: "${CF_ACCOUNT_ID:-}"
      CF_AI_API_TOKEN: "${CF_AI_API_TOKEN:-}"
      OLLAMA_URL: "http://ollama:11434"
      VLLM_BASE_URL: "http://vllm:8090/v1"
      LLAMACPP_BASE_URL: "http://llama-cpp-server:8091"
      # Langfuse observability integration
      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY:-}"
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY:-}"
      LANGFUSE_HOST: "http://langfuse:3000"
    depends_on:
      - langfuse
    networks:
      - tranc3-net
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.litellm.rule: "Host(`ai.trancendos.com`)"
      traefik.http.routers.litellm.entrypoints: "websecure"
      traefik.http.routers.litellm.tls.certresolver: "letsencrypt"
      traefik.http.services.litellm.loadbalancer.server.port: "4000"

  # Ollama — local self-hosted LLM inference (zero-cost, tier 0)
  ollama:
    image: ollama/ollama:latest
    container_name: trancendos-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_ORIGINS: "*"
      OLLAMA_HOST: "0.0.0.0"
    networks:
      - tranc3-net
    restart: unless-stopped
    # GPU support: add 'deploy: resources: reservations: devices: [{driver: nvidia, ...}]'

  # vLLM — high-throughput GPU inference (Apache 2.0, zero-cost self-hosted, tier 0)
  # Requires NVIDIA GPU. Serves any HuggingFace model via OpenAI-compatible API.
  # Default model: meta-llama/Llama-3.2-3B-Instruct (set VLLM_DEFAULT_MODEL to change)
  # Port 8090 — OpenAI-compatible: /v1/chat/completions, /v1/models
  vllm:
    image: vllm/vllm-openai:latest
    container_name: trancendos-vllm
    command:
      - "--model"
      - "${VLLM_DEFAULT_MODEL:-meta-llama/Llama-3.2-3B-Instruct}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8090"
      - "--dtype"
      - "auto"
    volumes:
      - vllm-models:/root/.cache/huggingface
    ports:
      - "8090:8090"
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HF_API_TOKEN:-}"
    networks:
      - tranc3-net
    restart: unless-stopped
    profiles:
      - gpu
    # Uncomment below for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # llama.cpp server — CPU inference (MIT, zero-cost self-hosted, tier 0)
  # Runs any GGUF model file. Minimal RAM usage. OpenAI-compatible API.
  # Port 8091 — endpoints: /health, /v1/chat/completions, /v1/models
  llama-cpp-server:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: trancendos-llamacpp
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8091"
      - "--model"
      - "/models/${LLAMACPP_MODEL_FILE:-llama-3.2-3b-instruct.Q4_K_M.gguf}"
      - "--ctx-size"
      - "8192"
      - "--n-predict"
      - "2048"
    volumes:
      - llamacpp-models:/models
    ports:
      - "8091:8091"
    networks:
      - tranc3-net
    restart: unless-stopped
    profiles:
      - cpu-inference

  # ══════════════════════════════════════════════════════════════════════════
  # SEARCH — Meilisearch (MIT, zero-cost, self-hosted)
  # Full-text search for all platform content. Port 7700.
  # Route: search.trancendos.com
  # Used by: The Library, DocUtari, API Marketplace, The Lab
  # ══════════════════════════════════════════════════════════════════════════
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: trancendos-meilisearch
    volumes:
      - meilisearch-data:/meili_data
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:?required}"
      MEILI_ENV: "production"
      MEILI_DB_PATH: "/meili_data"
      MEILI_LOG_LEVEL: "INFO"
    networks:
      - tranc3-net
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.meilisearch.rule: "Host(`search.trancendos.com`)"
      traefik.http.routers.meilisearch.entrypoints: "websecure"
      traefik.http.routers.meilisearch.tls.certresolver: "letsencrypt"
      traefik.http.services.meilisearch.loadbalancer.server.port: "7700"

  # ══════════════════════════════════════════════════════════════════════════
  # VECTOR DATABASE — Weaviate (BSD-3-Clause, zero-cost, self-hosted)
  # GraphQL + REST interface. Port 8080 (HTTP), 50051 (gRPC).
  # Route: weaviate.trancendos.com
  # ══════════════════════════════════════════════════════════════════════════
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.25.4
    container_name: trancendos-weaviate
    restart: unless-stopped
    ports:
      - "8181:8080"
      - "50052:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate-data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.weaviate.rule: "Host(`weaviate.trancendos.com`)"
      traefik.http.routers.weaviate.entrypoints: "websecure"
      traefik.http.routers.weaviate.tls.certresolver: "letsencrypt"
      traefik.http.services.weaviate.loadbalancer.server.port: "8080"

  # ══════════════════════════════════════════════════════════════════════════
  # OBJECT STORAGE — MinIO (AGPL-3.0, zero-cost, S3-compatible)
  # Replaces Cloudflare R2 / IPFS for blob storage. Port 9000 (API), 9001 (console).
  # Route: s3.trancendos.com (API), s3-console.trancendos.com (console)
  # ══════════════════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: trancendos-minio
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-tranc3admin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?required}"
      MINIO_BROWSER_REDIRECT_URL: "https://s3-console.trancendos.com"
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      traefik.enable: "true"
      # S3 API
      traefik.http.routers.minio-api.rule: "Host(`s3.trancendos.com`)"
      traefik.http.routers.minio-api.entrypoints: "websecure"
      traefik.http.routers.minio-api.tls.certresolver: "letsencrypt"
      traefik.http.routers.minio-api.service: "minio-api-svc"
      traefik.http.services.minio-api-svc.loadbalancer.server.port: "9000"
      # Console
      traefik.http.routers.minio-console.rule: "Host(`s3-console.trancendos.com`)"
      traefik.http.routers.minio-console.entrypoints: "websecure"
      traefik.http.routers.minio-console.tls.certresolver: "letsencrypt"
      traefik.http.routers.minio-console.service: "minio-console-svc"
      traefik.http.services.minio-console-svc.loadbalancer.server.port: "9001"

  # ══════════════════════════════════════════════════════════════════════════
  # IDENTITY & SSO — Authentik (MIT, zero-cost)
  # Replaces Keycloak (heavier) — OAuth2/OIDC/SAML SSO for all services.
  # Complements workers/infinity-auth/ (which handles Trancendos-native auth).
  # Authentik = external SSO bridge (Google, GitHub, enterprise SAML).
  # Port 9300 (HTTP), 9443 (HTTPS). Route: sso.trancendos.com
  # ══════════════════════════════════════════════════════════════════════════
  authentik-server:
    image: ghcr.io/goauthentik/server:latest
    container_name: trancendos-authentik-server
    command: server
    volumes:
      - authentik-media:/media
      - authentik-templates:/templates
    ports:
      - "9300:9000"
      - "9443:9443"
    environment:
      AUTHENTIK_REDIS__HOST: "authentik-redis"
      AUTHENTIK_POSTGRESQL__HOST: "authentik-db"
      AUTHENTIK_POSTGRESQL__USER: "authentik"
      AUTHENTIK_POSTGRESQL__PASSWORD: "${AUTHENTIK_DB_PASSWORD:?required}"
      AUTHENTIK_POSTGRESQL__NAME: "authentik"
      AUTHENTIK_SECRET_KEY: "${AUTHENTIK_SECRET_KEY:?required}"
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_BOOTSTRAP_EMAIL: "${ADMIN_EMAIL:?required}"
      AUTHENTIK_BOOTSTRAP_PASSWORD: "${AUTHENTIK_ADMIN_PASSWORD:?required}"
      AUTHENTIK_BOOTSTRAP_TOKEN: "${AUTHENTIK_BOOTSTRAP_TOKEN:-}"
    depends_on:
      - authentik-db
      - authentik-redis
    networks:
      - tranc3-net
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.authentik.rule: "Host(`sso.trancendos.com`)"
      traefik.http.routers.authentik.entrypoints: "websecure"
      traefik.http.routers.authentik.tls.certresolver: "letsencrypt"
      traefik.http.services.authentik.loadbalancer.server.port: "9000"

  authentik-worker:
    image: ghcr.io/goauthentik/server:latest
    container_name: trancendos-authentik-worker
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: "authentik-redis"
      AUTHENTIK_POSTGRESQL__HOST: "authentik-db"
      AUTHENTIK_POSTGRESQL__USER: "authentik"
      AUTHENTIK_POSTGRESQL__PASSWORD: "${AUTHENTIK_DB_PASSWORD:?required}"
      AUTHENTIK_POSTGRESQL__NAME: "authentik"
      AUTHENTIK_SECRET_KEY: "${AUTHENTIK_SECRET_KEY:?required}"
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - authentik-media:/media
      - authentik-certs:/certs
    depends_on:
      - authentik-db
      - authentik-redis
    networks:
      - tranc3-net
    restart: unless-stopped

  authentik-db:
    image: postgres:15-alpine
    container_name: trancendos-authentik-db
    volumes:
      - authentik-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "authentik"
      POSTGRES_PASSWORD: "${AUTHENTIK_DB_PASSWORD:?required}"
      POSTGRES_DB: "authentik"
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 30s
      timeout: 5s
      retries: 5

  authentik-redis:
    image: redis:7-alpine
    container_name: trancendos-authentik-redis
    volumes:
      - authentik-redis-data:/data
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  # ══════════════════════════════════════════════════════════════════════════
  # CONTAINER LOGS UI — Dozzle (MIT, zero-cost)
  # Real-time Docker log viewer for all containers. Port 8888.
  # Route: logs.trancendos.com
  # ══════════════════════════════════════════════════════════════════════════
  dozzle:
    image: amir20/dozzle:latest
    container_name: trancendos-dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8108:8080"
    environment:
      DOZZLE_AUTH_PROVIDER: "simple"
      DOZZLE_ENABLE_ACTIONS: "true"
      DOZZLE_LEVEL: "info"
    networks:
      - tranc3-net
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.dozzle.rule: "Host(`logs.trancendos.com`)"
      traefik.http.routers.dozzle.entrypoints: "websecure"
      traefik.http.routers.dozzle.tls.certresolver: "letsencrypt"
      traefik.http.services.dozzle.loadbalancer.server.port: "8080"

  # ══════════════════════════════════════════════════════════════════════════
  # COLLABORATIVE WHITEBOARD — Excalidraw (MIT, zero-cost)
  # Infinite canvas for design brainstorming, architecture diagrams.
  # Complements Penpot (Fabulousa) for freeform collaboration.
  # Port 3800. Route: draw.trancendos.com
  # ══════════════════════════════════════════════════════════════════════════
  excalidraw:
    image: excalidraw/excalidraw:latest
    container_name: trancendos-excalidraw
    ports:
      - "3800:80"
    networks:
      - tranc3-net
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.excalidraw.rule: "Host(`draw.trancendos.com`)"
      traefik.http.routers.excalidraw.entrypoints: "websecure"
      traefik.http.routers.excalidraw.tls.certresolver: "letsencrypt"
      traefik.http.services.excalidraw.loadbalancer.server.port: "80"

# ═══════════════════════════════════════════════════════════════════════════
# Item 8 — n8n: Workflow node upgrade for The Digital Grid
# ═══════════════════════════════════════════════════════════════════════════
  n8n:
    image: n8nio/n8n:latest
    container_name: trancendos-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://n8n:5678/
      - GENERIC_TIMEZONE=UTC
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:?required}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?n8n password required}
      - DB_TYPE=sqlite
      - DB_SQLITE_DATABASE=/home/node/.n8n/database.sqlite
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?required}
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - tranc3-net
    healthcheck:
      <<: *healthcheck-default
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`trancendos.com`) && PathPrefix(`/n8n`)"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

# ═══════════════════════════════════════════════════════════════════════════
# The Digital Grid — Tier 3: Prefect (Python-native orchestration, free OSS)
# UI: /prefect  |  API: prefect-server:4200  |  SQLite backend
# ═══════════════════════════════════════════════════════════════════════════
  prefect-server:
    image: prefecthq/prefect:3-python3.12
    container_name: trancendos-prefect
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0 --port 4200
    environment:
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_SERVER_API_PORT=4200
      - PREFECT_API_DATABASE_CONNECTION_URL=sqlite+aiosqlite:////data/prefect.db
      - PREFECT_UI_ENABLED=true
    volumes:
      - prefect-data:/data
    ports:
      - "4200:4200"
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prefect.rule=Host(`trancendos.com`) && PathPrefix(`/prefect`)"
      - "traefik.http.middlewares.prefect-strip.stripprefix.prefixes=/prefect"
      - "traefik.http.routers.prefect.middlewares=prefect-strip"
      - "traefik.http.services.prefect.loadbalancer.server.port=4200"

# ═══════════════════════════════════════════════════════════════════════════
# The Digital Grid — Tier 4: Temporal (durable workflow execution)
# temporalite single-binary SQLite mode — zero external deps
# gRPC: 7233  |  Web UI: 8088  |  /temporal Traefik path
# ═══════════════════════════════════════════════════════════════════════════
  temporalite:
    image: temporalio/temporalite:latest
    container_name: trancendos-temporalite
    restart: unless-stopped
    command: start --namespace default --db-filename /data/temporal.db --ip 0.0.0.0
    volumes:
      - temporal-data:/data
    ports:
      - "7233:7233"
      - "8088:8088"
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.temporal-ui.rule=Host(`trancendos.com`) && PathPrefix(`/temporal`)"
      - "traefik.http.middlewares.temporal-strip.stripprefix.prefixes=/temporal"
      - "traefik.http.routers.temporal-ui.middlewares=temporal-strip"
      - "traefik.http.services.temporal-ui.loadbalancer.server.port=8088"

# ═══════════════════════════════════════════════════════════════════════════
# The Digital Grid — Tier 5: Apache Airflow (standalone SQLite, free OSS)
# UI: /airflow  |  REST API: airflow:8089
# Default creds: admin/admin — override via AIRFLOW_USER / AIRFLOW_PASS
# ═══════════════════════════════════════════════════════════════════════════
  airflow:
    image: apache/airflow:2.9.0
    container_name: trancendos-airflow
    restart: unless-stopped
    entrypoint: >
      bash -c "airflow db upgrade && airflow users create
        --username $${AIRFLOW_USER}
        --password $${AIRFLOW_PASS}
        --firstname Trancendos --lastname Grid
        --role Admin --email admin@trancendos.com 2>/dev/null || true
        && airflow webserver --port 8089"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/data/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__BASE_URL=http://trancendos.com/airflow
      - AIRFLOW__WEBSERVER__WEB_SERVER_PORT=8089
      - AIRFLOW_USER=${AIRFLOW_USER:?set AIRFLOW_USER in .env}
      - AIRFLOW_PASS=${AIRFLOW_PASS:?set AIRFLOW_PASS in .env}
    volumes:
      - airflow-data:/opt/airflow/data
      - airflow-dags:/opt/airflow/dags
    ports:
      - "8089:8089"
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.airflow.rule=Host(`trancendos.com`) && PathPrefix(`/airflow`)"
      - "traefik.http.services.airflow.loadbalancer.server.port=8089"

# ═══════════════════════════════════════════════════════════════════════════
# The Digital Grid — Tier 6: Dagster (asset-centric orchestration, free OSS)
# UI: /dagster  |  GraphQL: dagster-webserver:3003
# NOTE: port 3001 is Grafana; port 3000 is Gotenberg; Dagster uses 3003
# ═══════════════════════════════════════════════════════════════════════════
  dagster-webserver:
    image: ghcr.io/dagster-io/dagster:latest
    container_name: trancendos-dagster
    restart: unless-stopped
    command: dagster-webserver -h 0.0.0.0 -p 3003
    environment:
      - DAGSTER_HOME=/dagster_home
    volumes:
      - dagster-data:/dagster_home
    ports:
      - "3003:3003"
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dagster.rule=Host(`trancendos.com`) && PathPrefix(`/dagster`)"
      - "traefik.http.middlewares.dagster-strip.stripprefix.prefixes=/dagster"
      - "traefik.http.routers.dagster.middlewares=dagster-strip"
      - "traefik.http.services.dagster.loadbalancer.server.port=3003"

# ═══════════════════════════════════════════════════════════════════════════
# ChronosSphere / ArcStream — Kestra: Open-source workflow + cron scheduler
# Standalone mode with H2 embedded DB — zero external deps, Apache 2.0
# UI / API: 8060  |  Management API: 8061  |  Traefik: /kestra
# ═══════════════════════════════════════════════════════════════════════════
  kestra:
    image: kestra/kestra:latest-full
    container_name: trancendos-kestra
    restart: unless-stopped
    command: server standalone --flow-path /flows
    user: "root"
    environment:
      - KESTRA_CONFIGURATION=
      - DATASOURCES_POSTGRES_URL=
      - DATASOURCES_POSTGRES_USERNAME=
      - DATASOURCES_POSTGRES_PASSWORD=
    volumes:
      - kestra-data:/app/storage
      - kestra-flows:/flows
    ports:
      - "8102:8080"
      - "8103:8081"
    networks:
      - tranc3-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/flows/search?q= || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kestra.rule=Host(`trancendos.com`) && PathPrefix(`/kestra`)"
      - "traefik.http.middlewares.kestra-strip.stripprefix.prefixes=/kestra"
      - "traefik.http.routers.kestra.middlewares=kestra-strip"
      - "traefik.http.services.kestra.loadbalancer.server.port=8080"

# ═══════════════════════════════════════════════════════════════════════════
# Item 7 — Wazuh: SIEM/EDR for Cryptex (single-node, free OSS)
# Requires: vm.max_map_count=262144 on host (sysctl -w vm.max_map_count=262144)
# ═══════════════════════════════════════════════════════════════════════════
  wazuh-manager:
    image: wazuh/wazuh-manager:4.8.0
    container_name: trancendos-wazuh-manager
    restart: unless-stopped
    environment:
      - WAZUH_API_USER=${WAZUH_API_USER:-wazuh}
      - WAZUH_API_PASSWORD=${WAZUH_API_PASSWORD:?required}
      - WAZUH_MANAGER_IP=0.0.0.0
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - wazuh-manager-logs:/var/ossec/logs
      - wazuh-manager-etc:/var/ossec/etc
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    networks:
      - tranc3-net

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.8.0
    container_name: trancendos-wazuh-dashboard
    restart: unless-stopped
    depends_on:
      - wazuh-manager
    environment:
      - WAZUH_API_URL=https://wazuh-manager
      - WAZUH_API_PORT=55000
      - WAZUH_API_USER=${WAZUH_API_USER:-wazuh}
      - WAZUH_API_PASSWORD=${WAZUH_API_PASSWORD}
      - OPENSEARCH_HOSTS=https://wazuh-indexer:9200
      - OPENSEARCH_USERNAME=kibanaserver
      - OPENSEARCH_PASSWORD=${WAZUH_KIBANA_PASSWORD:?required}
    ports:
      - "5601:5601"
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wazuh.rule=Host(`trancendos.com`) && PathPrefix(`/wazuh`)"
      - "traefik.http.services.wazuh.loadbalancer.server.port=5601"

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.8.0
    container_name: trancendos-wazuh-indexer
    restart: unless-stopped
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - network.host=0.0.0.0
      - node.name=wazuh-indexer
      - cluster.initial_cluster_manager_nodes=wazuh-indexer
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${WAZUH_INDEXER_PASSWORD:?required}
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
    networks:
      - tranc3-net

# ═══════════════════════════════════════════════════════════════════════════
# Item 5 — Paperless-ngx: Document management for DocUtari
# ═══════════════════════════════════════════════════════════════════════════
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: trancendos-paperless
    restart: unless-stopped
    depends_on:
      - paperless-db
      - paperless-redis
    environment:
      - PAPERLESS_REDIS=redis://paperless-redis:6379
      - PAPERLESS_DBHOST=paperless-db
      - PAPERLESS_DBNAME=${PAPERLESS_DB_NAME:-paperless}
      - PAPERLESS_DBUSER=${PAPERLESS_DB_USER:-paperless}
      - PAPERLESS_DBPASS=${PAPERLESS_DB_PASSWORD:?required}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY:?required}
      - PAPERLESS_URL=http://trancendos.com/docutari
      - PAPERLESS_ADMIN_USER=${PAPERLESS_ADMIN_USER:?required}
      - PAPERLESS_ADMIN_PASSWORD=${PAPERLESS_ADMIN_PASSWORD:?required}
      - PAPERLESS_OCR_LANGUAGE=eng
      - PAPERLESS_TIME_ZONE=UTC
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
      - paperless-export:/usr/src/paperless/export
      - paperless-consume:/usr/src/paperless/consume
    ports:
      - "8104:8000"
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paperless.rule=Host(`trancendos.com`) && PathPrefix(`/docutari`)"
      - "traefik.http.services.paperless.loadbalancer.server.port=8000"

  paperless-db:
    image: postgres:15-alpine
    container_name: trancendos-paperless-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${PAPERLESS_DB_NAME:-paperless}
      - POSTGRES_USER=${PAPERLESS_DB_USER:-paperless}
      - POSTGRES_PASSWORD=${PAPERLESS_DB_PASSWORD}
    volumes:
      - paperless-db-data:/var/lib/postgresql/data
    networks:
      - tranc3-net

  paperless-redis:
    image: redis:7-alpine
    container_name: trancendos-paperless-redis
    restart: unless-stopped
    networks:
      - tranc3-net

# ═══════════════════════════════════════════════════════════════════════════
# DocUtari — Stirling PDF (self-hosted PDF manipulation, zero-cost OSS)
# UI:  trancendos.com/docutari/pdf
# API: trancendos.com/docutari/pdf/api
# ═══════════════════════════════════════════════════════════════════════════
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: trancendos-stirling-pdf
    restart: unless-stopped
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - INSTALL_BOOK_AND_OFFICE_DEPS=false
      - LANGS=en_GB
      - SYSTEM_ROOTURIPATH=/docutari/pdf
    volumes:
      - stirling-pdf-trainingdata:/usr/share/tessdata
      - stirling-pdf-extraconfigs:/configs
      - stirling-pdf-logs:/logs
      - stirling-pdf-pipeline:/pipeline
    ports:
      - "8086:8080"
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stirling-pdf.rule=Host(`trancendos.com`) && PathPrefix(`/docutari/pdf`)"
      - "traefik.http.services.stirling-pdf.loadbalancer.server.port=8080"

# ═══════════════════════════════════════════════════════════════════════════
# DocUtari — Gotenberg (HTML/Office→PDF generation, zero-cost OSS)
# API: internal only, consumed by DocUtari bridge worker
# ═══════════════════════════════════════════════════════════════════════════
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: trancendos-gotenberg
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    ports:
      - "3000:3000"
    networks:
      - tranc3-net

# ═══════════════════════════════════════════════════════════════════════════
# DocUtari — Apache Tika (document parsing + metadata extraction, OSS)
# API: internal only, consumed by DocUtari bridge worker
# ═══════════════════════════════════════════════════════════════════════════
  tika:
    image: apache/tika:latest-full
    container_name: trancendos-tika
    restart: unless-stopped
    ports:
      - "9998:9998"
    networks:
      - tranc3-net

# ═══════════════════════════════════════════════════════════════════════════
# Item 7 — OpenBAS: Breach & attack simulation for The Ice Box
# ═══════════════════════════════════════════════════════════════════════════
  openbas:
    image: filigran/openbas-platform:latest
    container_name: trancendos-openbas
    restart: unless-stopped
    depends_on:
      - openbas-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://openbas-db:5432/openbas
      - SPRING_DATASOURCE_USERNAME=${OPENBAS_DB_USER:-openbas}
      - SPRING_DATASOURCE_PASSWORD=${OPENBAS_DB_PASSWORD:?required}
      - OPENBAS_ADMIN_EMAIL=${OPENBAS_ADMIN_EMAIL:?required}
      - OPENBAS_ADMIN_PASSWORD=${OPENBAS_ADMIN_PASSWORD:?required}
      - OPENBAS_ADMIN_TOKEN=${OPENBAS_ADMIN_TOKEN:?required}
      - OPENBAS_BASE_URL=http://trancendos.com/openbas
      - SERVER_PORT=8082
    volumes:
      - openbas-data:/opt/openbas/files
    ports:
      - "8082:8082"
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openbas.rule=Host(`trancendos.com`) && PathPrefix(`/openbas`)"
      - "traefik.http.services.openbas.loadbalancer.server.port=8082"

  openbas-db:
    image: postgres:15-alpine
    container_name: trancendos-openbas-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=openbas
      - POSTGRES_USER=${OPENBAS_DB_USER:-openbas}
      - POSTGRES_PASSWORD=${OPENBAS_DB_PASSWORD}
    volumes:
      - openbas-db-data:/var/lib/postgresql/data
    networks:
      - tranc3-net

# ═══════════════════════════════════════════════════════════════════════════
# Security — Cryptex (Renik) + The Ice Box (Neonach)
# 8-tier adaptive security: Wazuh + MISP + OpenVAS + ClamAV + YARA + Semgrep
# All zero-cost open-source tools. Free community editions only.
# ═══════════════════════════════════════════════════════════════════════════
  cryptex:
    build:
      context: ./workers/cryptex
      dockerfile: Dockerfile
    image: trancendos/cryptex:latest
    container_name: cryptex-worker
    restart: unless-stopped
    depends_on:
      - misp
    environment:
      - CRYPTEX_PORT=8053
      - CRYPTEX_DB_PATH=/data/cryptex.db
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - WAZUH_URL=https://wazuh-manager:55000
      - WAZUH_USER=${WAZUH_API_USER:-wazuh-wui}
      - WAZUH_PASS=${WAZUH_API_PASSWORD:?required}
      - MISP_URL=http://misp:80
      - MISP_API_KEY=${MISP_API_KEY}
      - OPENVAS_URL=http://openvas:9390
      - OPENVAS_USER=${OPENVAS_USER:-admin}
      - OPENVAS_PASS=${OPENVAS_PASS}
      - THRESHOLD_WAZUH=${THRESHOLD_WAZUH:-500}
      - THRESHOLD_MISP=${THRESHOLD_MISP:-500}
      - THRESHOLD_OPENVAS=${THRESHOLD_OPENVAS:-100}
      - THRESHOLD_CLAMAV=${THRESHOLD_CLAMAV:-1000}
      - THRESHOLD_YARA=${THRESHOLD_YARA:-1000}
      - THRESHOLD_SEMGREP=${THRESHOLD_SEMGREP:-200}
      - ACO_DECAY=${ACO_DECAY:-0.9}
    volumes:
      - cryptex-data:/data
    ports:
      - "8053:8053"
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cryptex.rule=Host(`trancendos.com`) && PathPrefix(`/cryptex`)"
      - "traefik.http.services.cryptex.loadbalancer.server.port=8053"

  # ── Observatory — The Observatory / Norman Hawkins (Port 8040)
  # 7-backend ACO pheromone routing: Tempo+Jaeger (traces), VictoriaMetrics+Prometheus
  # (metrics), Loki (logs), Netdata (node), SigNoz (unified APM). All free, self-hosted.
  observatory:
    build:
      context: ./workers/observatory
      dockerfile: Dockerfile
    container_name: tranc3-observatory
    restart: unless-stopped
    environment:
      - OBSERVATORY_PORT=8065
      - OBSERVATORY_DB_PATH=/data/observatory.db
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - SIGNOZ_URL=http://signoz-query-service:8080
      - JAEGER_URL=http://jaeger:16686
      - TEMPO_URL=http://tempo:3200
      - PROMETHEUS_URL=http://prometheus:9090
      - VICTORIAMETRICS_URL=http://victoriametrics:8428
      - LOKI_URL=http://loki:3100
      - NETDATA_URL=http://netdata:19999
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - ACO_DECAY=${ACO_DECAY:-0.95}
      - THRESHOLD_SIGNOZ=${THRESHOLD_SIGNOZ:-1000}
      - THRESHOLD_JAEGER=${THRESHOLD_JAEGER:-2000}
      - THRESHOLD_TEMPO=${THRESHOLD_TEMPO:-2000}
      - THRESHOLD_VICTORIA=${THRESHOLD_VICTORIA:-5000}
      - THRESHOLD_PROMETHEUS=${THRESHOLD_PROMETHEUS:-5000}
      - THRESHOLD_LOKI=${THRESHOLD_LOKI:-2000}
      - THRESHOLD_NETDATA=${THRESHOLD_NETDATA:-3000}
    volumes:
      - observatory-data:/data
    ports:
      - "8065:8065"
    depends_on:
      - otel-collector
      - victoriametrics
      - loki
      - tempo
      - jaeger
      - netdata
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.observatory.rule=Host(`trancendos.com`) && PathPrefix(`/observatory`)"
      - "traefik.http.services.observatory.loadbalancer.server.port=8065"

  # ── MISP — Malware Information Sharing Platform (Cryptex tier 2)
  # Free, self-hosted, open-source. No paid licence required.
  misp:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    container_name: trancendos-misp
    restart: unless-stopped
    depends_on:
      - misp-db
      - misp-redis
    environment:
      - MYSQL_HOST=misp-db
      - MYSQL_DATABASE=${MISP_DB_NAME:-misp}
      - MYSQL_USER=${MISP_DB_USER:-misp}
      - MYSQL_PASSWORD=${MISP_DB_PASSWORD:?required}
      - MISP_ADMIN_EMAIL=${MISP_ADMIN_EMAIL:?required}
      - MISP_ADMIN_PASSPHRASE=${MISP_ADMIN_PASSWORD:?required}
      - MISP_BASEURL=http://trancendos.com/misp
      - REDIS_FQDN=misp-redis
      - WORKERS=1
    volumes:
      - misp-data:/var/www/MISP/app/files
    ports:
      - "8106:80"
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.misp.rule=Host(`trancendos.com`) && PathPrefix(`/misp`)"
      - "traefik.http.services.misp.loadbalancer.server.port=80"

  misp-db:
    image: mysql:8.0
    container_name: trancendos-misp-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${MISP_DB_NAME:-misp}
      - MYSQL_USER=${MISP_DB_USER:-misp}
      - MYSQL_PASSWORD=${MISP_DB_PASSWORD:?required}
      - MYSQL_ROOT_PASSWORD=${MISP_DB_ROOT_PASSWORD:?required}
    volumes:
      - misp-db-data:/var/lib/mysql
    networks:
      - tranc3-net

  misp-redis:
    image: redis:7-alpine
    container_name: trancendos-misp-redis
    restart: unless-stopped
    volumes:
      - misp-redis-data:/data
    networks:
      - tranc3-net

  # ── OpenVAS/Greenbone Community Edition — Vulnerability scanner (Cryptex tier 3)
  # Free community edition. Greenbone publishes official community containers.
  openvas:
    image: greenbone/community-edition:latest
    container_name: trancendos-openvas
    restart: unless-stopped
    environment:
      - GVM_ADMIN_USER=${OPENVAS_USER:-admin}
      - GVM_ADMIN_PASSWORD=${OPENVAS_PASS:?required}
    volumes:
      - openvas-data:/var/lib/gvm
    ports:
      - "9392:9392"
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openvas.rule=Host(`trancendos.com`) && PathPrefix(`/openvas`)"
      - "traefik.http.services.openvas.loadbalancer.server.port=9392"

  # ── Cuckoo Sandbox — Malware analysis / The Ice Box (Neonach, tier sandbox)
  # Free open-source automated malware analysis system.
  cuckoo:
    image: cuckoosandbox/cuckoo:latest
    container_name: trancendos-cuckoo
    restart: unless-stopped
    environment:
      - CUCKOO_API_TOKEN=${CUCKOO_API_TOKEN}
    volumes:
      - cuckoo-data:/cuckoo
    ports:
      - "8107:8090"
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cuckoo.rule=Host(`trancendos.com`) && PathPrefix(`/icebox`)"
      - "traefik.http.services.cuckoo.loadbalancer.server.port=8090"

  # ══════════════════════════════════════════════════════════════════════════
  # OBSERVABILITY LAYER — The Observatory (Norman Hawkins)
  # ══════════════════════════════════════════════════════════════════════════

  # ── Jaeger All-in-One — Distributed Tracing UI + Collector ───────────────
  # Apache 2.0, self-hosted. Receives OTLP from otel-collector via fan-out.
  # UI: http://trancendos.com/jaeger  OTLP gRPC: 4317 (internal)
  # Badger local storage, 72h retention. Zero cost.
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: tranc3-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
      BADGER_SPAN_STORE_TTL: 72h0m0s
      QUERY_UI_CONFIG: /etc/jaeger/ui-config.json
    volumes:
      - jaeger-data:/badger
      - ./monitoring/jaeger/ui-config.json:/etc/jaeger/ui-config.json:ro
      - ./monitoring/jaeger/sampling_strategies.json:/etc/jaeger/sampling_strategies.json:ro
    ports:
      - "16686:16686"   # Jaeger UI
      - "34317:4317"    # OTLP gRPC (host 34317 avoids conflict)
      - "34318:4318"    # OTLP HTTP
      - "14268:14268"   # Jaeger HTTP collector (Thrift)
    networks:
      - tranc3-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      traefik.enable: "true"
      traefik.http.routers.jaeger.rule: "Host(`trancendos.com`) && PathPrefix(`/jaeger`)"
      traefik.http.routers.jaeger.entrypoints: "websecure"
      traefik.http.routers.jaeger.tls.certresolver: "letsencrypt"
      traefik.http.middlewares.jaeger-strip.stripprefix.prefixes: "/jaeger"
      traefik.http.routers.jaeger.middlewares: "jaeger-strip"
      traefik.http.services.jaeger.loadbalancer.server.port: "16686"

  # ── Netdata — Real-time Node Metrics (zero-config) ───────────────────────
  # MIT-licensed. Host-level CPU/RAM/disk/network/container metrics.
  # Exposes Prometheus endpoint at /api/v1/allmetrics for VictoriaMetrics scrape.
  # Dashboard: http://trancendos.com/netdata
  netdata:
    image: netdata/netdata:latest
    container_name: tranc3-netdata
    restart: unless-stopped
    pid: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      NETDATA_CLAIM_TOKEN: ""
      NETDATA_CLAIM_URL: ""
      NETDATA_DISABLE_CLOUD: "true"
      DO_NOT_TRACK: "1"
    volumes:
      - netdata-config:/etc/netdata
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - ./monitoring/netdata/netdata.conf:/etc/netdata/netdata.conf:ro
      - ./monitoring/netdata/stream.conf:/etc/netdata/stream.conf:ro
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "19999:19999"   # Netdata UI + Prometheus endpoint
    networks:
      - tranc3-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:19999/api/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      traefik.enable: "true"
      traefik.http.routers.netdata.rule: "Host(`trancendos.com`) && PathPrefix(`/netdata`)"
      traefik.http.routers.netdata.entrypoints: "websecure"
      traefik.http.routers.netdata.tls.certresolver: "letsencrypt"
      traefik.http.middlewares.netdata-strip.stripprefix.prefixes: "/netdata"
      traefik.http.routers.netdata.middlewares: "netdata-strip"
      traefik.http.services.netdata.loadbalancer.server.port: "19999"

  # ── Blackbox Exporter — HTTP/HTTPS/TCP endpoint probing ──────────────────
  # Prometheus community, Apache 2.0. Probes /health endpoints for all workers.
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: tranc3-blackbox
    restart: unless-stopped
    command:
      - "--config.file=/etc/blackbox/blackbox.yml"
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    ports:
      - "9115:9115"
    networks:
      - tranc3-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9115/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=false"

  # ── cAdvisor — Container resource usage metrics ───────────────────────────
  # Google, Apache 2.0. Per-container CPU/RAM/disk/network → Prometheus.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: tranc3-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "18088:8080"
    networks:
      - tranc3-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=false"

  # ── node-exporter — Host OS metrics → Prometheus ─────────────────────────
  # Prometheus community, Apache 2.0. CPU/RAM/disk/network at OS level.
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: tranc3-node-exporter
    restart: unless-stopped
    pid: host
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - tranc3-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=false"

