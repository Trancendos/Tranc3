  # ── OpenBao — Secrets Management (MPL 2.0, Vault-compatible) ───────────
  # Replaces: HashiCorp Vault (BSL), Cloudflare environment variables / CF Secrets
  # API-compatible with hvac Python client used by vault-service/openbao_client.py
  openbao:
    image: openbao/openbao:latest
    container_name: trancendos-openbao
    environment:
      BAO_DEV_ROOT_TOKEN_ID: "${OPENBAO_ROOT_TOKEN:?required}"
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8201"
    ports:
      - "8201:8201"
    volumes:
      - openbao-data:/openbao/data
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8201/v1/sys/health"]
      <<: *healthcheck-default

  # ── KrakenD — API Gateway (Apache 2.0, replaces CF trancendos-api-gateway) ──
  # Stateless, no DB; routes /api/v1/* to backend workers with JWT + rate limiting.
  # KrakenD API gateway — main API on :8080 (internal), :8099 (host), metrics on :8090
  krakend:
    image: devopsfaith/krakend:latest
    container_name: trancendos-krakend
    environment:
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8099:8080"
      - "8105:8090"
    volumes:
      - ./config/krakend/krakend.json:/etc/krakend/krakend.json:ro
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/__health"]
      <<: *healthcheck-default

  # ── Blender Worker — Headless 3D Rendering for TranceFlow (Port 8050) ───
  blender-worker:
    <<: *worker-common
    build:
      context: ./workers/blender-worker
      dockerfile: Dockerfile
    container_name: trancendos-blender-worker
    ports:
      - "8050:8050"
    volumes:
      - blender-renders:/app/renders
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8050/health')"]
      <<: *healthcheck-default

  # ── TripoSR Worker — Image-to-3D for Sashas Photo Studio (Port 8051) ──
  triposr-worker:
    <<: *worker-common
    build:
      context: ./workers/triposr-worker
      dockerfile: Dockerfile
    container_name: trancendos-triposr-worker
    ports:
      - "8111:8111"
    volumes:
      - triposr-models:/app/models
      - triposr-outputs:/app/outputs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8111/health')"]
      <<: *healthcheck-default

  # ── FFmpeg Worker — TateKing Video Processing (Port 8052) ──────────────
  # Zero-cost self-hosted video transcoding, thumbnail extraction, compression.
  # Provides non-blocking job queue via asyncio subprocesses.
  ffmpeg-worker:
    build:
      context: ./workers/ffmpeg-worker
    container_name: trancendos-ffmpeg-worker
    ports:
      - "8052:8052"
    volumes:
      - ffmpeg-workdir:/app/workdir
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8052/health"]
      <<: *healthcheck-default

  # ── Langfuse — AI Observability (Port 3002) ──────────────────────────
  # MIT-licensed self-hosted LLM observability: traces, generations, evals.
  # Unlimited spans self-hosted; integrates with The Observatory.
  # SDK env vars: LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST=http://langfuse:3000
  langfuse:
    image: langfuse/langfuse:latest
    container_name: trancendos-langfuse
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: "postgresql://langfuse:langfuse@langfuse-db:5432/langfuse"
      NEXTAUTH_URL: "http://localhost:3002"
      NEXTAUTH_SECRET: "${LANGFUSE_SECRET:?required}"
      SALT: "${LANGFUSE_SALT:?required}"
      TELEMETRY_ENABLED: "false"
    depends_on:
      - langfuse-db
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  langfuse-db:
    image: postgres:16-alpine
    container_name: trancendos-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Infinity Portal — Front Entrance + Infinity Gate (Port 8042) ────────────
  # Entity: Infinity | Lead AI: The Guardian | Source: workers/infinity-portal-service
  # Public-facing login portal; embeds the Infinity Gate auth handshake
  infinity-portal:
    <<: *worker-common
    build:
      context: .
      dockerfile: workers/infinity-portal-service/Dockerfile
    container_name: infinity-portal-worker
    ports:
      - "8042:8042"
    environment:
      INFINITY_PORTAL_PORT: "8042"
      JWT_SECRET: ${JWT_SECRET:?required}
      INTERNAL_SECRET: ${INTERNAL_SECRET:?required}
      AUTH_SERVICE_URL: http://infinity-auth-worker:8005
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8042/health', timeout=5).read()\""]
      <<: *healthcheck-default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infinity-portal.rule=PathPrefix(`/portal`)"
      - "traefik.http.routers.infinity-portal.entrypoints=websecure"
      - "traefik.http.services.infinity-portal.loadbalancer.server.port=8042"

