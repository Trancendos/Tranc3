      - "traefik.http.routers.litellm-service.entrypoints=websecure"
      - "traefik.http.services.litellm-service.loadbalancer.server.port=8049"

  # ── The Artifactory — Zot OCI registry bridge (Port 8047) ──────────────────────────────────────────────
  artifactory-service:
