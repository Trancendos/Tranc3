  # ── P3 — Intelligence / AI Layer (8030–8038) ─────────────────────────────

  gbrain-bridge:
    <<: *worker-common
    build: { context: ./workers/gbrain-bridge, dockerfile: Dockerfile }
    container_name: gbrain-bridge-worker
    ports: ["8030:8030"]
    healthcheck:
