    container_name: langchain-integration-service-worker
    ports: ["8036:8036"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8036/health"]
      <<: *healthcheck-default

  deepagents-orchestrator-service:
    <<: *worker-common
    build: { context: ./workers/deepagents-orchestrator-service, dockerfile: Dockerfile }
    container_name: deepagents-orchestrator-service-worker
    ports: ["8037:8037"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8037/health"]
      <<: *healthcheck-default

  vault-service:
    <<: *worker-common
    build: { context: ./workers/vault-service, dockerfile: Dockerfile }
    container_name: vault-service-worker
    ports: ["8038:8038"]
    environment:
      VAULT_DB_PATH: /data/vault.db
    volumes:
      - vault-service-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8038/health"]
      <<: *healthcheck-default

  # ── OpenBao — Secrets Management (MPL 2.0, Vault-compatible) ───────────
  # Replaces: HashiCorp Vault (BSL), Cloudflare environment variables / CF Secrets
  # API-compatible with hvac Python client used by vault-service/openbao_client.py
  openbao:
    image: openbao/openbao:latest
    container_name: trancendos-openbao
    environment:
      BAO_DEV_ROOT_TOKEN_ID: "${OPENBAO_ROOT_TOKEN:-dev-root-token}"
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    volumes:
      - openbao-data:/openbao/data
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8200/v1/sys/health"]
      <<: *healthcheck-default

  # ── KrakenD — API Gateway (Apache 2.0, replaces CF trancendos-api-gateway) ──
  # Stateless, no DB; routes /api/v1/* to backend workers with JWT + rate limiting.
  # KrakenD API gateway — main API on :8080 (internal), :8099 (host), metrics on :8090
  krakend:
    image: devopsfaith/krakend:latest
    container_name: trancendos-krakend
    environment:
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8099:8080"
      - "8090:8090"
    volumes:
      - ./config/krakend/krakend.json:/etc/krakend/krakend.json:ro
    networks:
      - tranc3-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/__health"]
      <<: *healthcheck-default

  # ── Blender Worker — Headless 3D Rendering for TranceFlow (Port 8050) ───
  blender-worker:
    <<: *worker-common
    build:
      context: ./workers/blender-worker
      dockerfile: Dockerfile
    container_name: trancendos-blender-worker
    ports:
      - "8050:8050"
    volumes:
      - blender-renders:/app/renders
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8050/health')"]
      <<: *healthcheck-default

  # ── TripoSR Worker — Image-to-3D for Sashas Photo Studio (Port 8051) ──
  triposr-worker:
    <<: *worker-common
    build:
      context: ./workers/triposr-worker
      dockerfile: Dockerfile
    container_name: trancendos-triposr-worker
    ports:
      - "8051:8051"
    volumes:
      - triposr-models:/app/models
      - triposr-outputs:/app/outputs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8051/health')"]
      <<: *healthcheck-default

  # ── Infinity Admin — Entity & Config Management (Port 8044) ──────────────
  infinity-admin:
    <<: *worker-common
    build:
      context: .
      dockerfile: workers/infinity-admin-service/Dockerfile
    container_name: infinity-admin-worker
    ports:
      - "8044:8044"
    volumes:
      - admin-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8044/health"]
      <<: *healthcheck-default

