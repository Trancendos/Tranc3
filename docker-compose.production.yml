# docker-compose.production.yml
# Tranc3 Full Production Stack — Self-Hosted, Zero-Cost Architecture
#
# Replaces ALL Cloudflare Worker dependencies with self-hosted Python/FastAPI workers.
# Includes observability stack (Prometheus, Grafana, Loki), reverse proxy (Traefik),
# secrets management (Vault), and IPFS for distributed storage.
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
#
# Architecture:
#   - Traefik: Reverse proxy + auto-discovery (replaces CF routing)
#   - 29 FastAPI workers: Self-hosted Python services (replaces CF Workers)
#   - Prometheus + Grafana + Loki: Observability stack (replaces CF analytics)
#   - Vault: Secrets management (replaces CF environment variables)
#   - IPFS: Distributed storage (replaces CF R2)
#
# Zero external provider dependencies. Zero cost.

version: "3.8"

# ---------------------------------------------------------------------------
# Shared configuration
# ---------------------------------------------------------------------------
x-common: &common
  restart: unless-stopped
  networks:
    - tranc3-net

x-worker-common: &worker-common
  <<: *common
  env_file:
    - .env.production
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  labels:
    - "tranc3.stack=production"

# Platform workers: shared read-only admin DB for entity name overrides in /health
x-worker-platform: &worker-platform
  <<: *worker-common
  environment:
    ENTITY_OVERRIDES_DB: /app/data/infinity_admin.db
    INFINITY_ADMIN_DB_PATH: /app/data/infinity_admin.db
  volumes:
    - admin-data:/app/data:ro

x-healthcheck-default: &healthcheck-default
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 10s

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ═══════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE LAYER
  # ═══════════════════════════════════════════════════════════════════════

  # ── Traefik — Reverse Proxy & Load Balancer ──────────────────────────
  # Replaces: Cloudflare routing, CF Load Balancing
  traefik:
    image: traefik:v3.0
    container_name: tranc3-traefik
    <<: *common
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=tranc3-net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.metrics.address=:9090"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entrypoint=metrics"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.format=json"
    ports:
      - "80:80"
      - "443:443"
      - "8888:8080"   # Traefik dashboard (moved from 8080 to avoid KrakenD conflict)
      - "9090:9090"   # Metrics
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-config:/etc/traefik
      - traefik-certs:/letsencrypt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.trancendos.local`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      <<: *healthcheck-default

  # ── Vault — Secrets Management ───────────────────────────────────────
  # Replaces: Cloudflare environment variables, CF Secrets
  vault:
    image: hashicorp/vault:1.15
    container_name: tranc3-vault
    <<: *common
    command: server -config=/vault/config/vault.hcl
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_ADDR=http://127.0.0.1:8200
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/data
      - ./deploy/vault/vault.hcl:/vault/config/vault.hcl:ro
    healthcheck:
      test: ["CMD-SHELL", "vault status >/dev/null 2>&1 || [ $$? -eq 2 ]"]
      <<: *healthcheck-default

  # ── Prometheus — Metrics Collection ──────────────────────────────────
  # Replaces: Cloudflare Analytics, CF Worker Analytics
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: tranc3-prometheus
    <<: *common
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      <<: *healthcheck-default

  # ── Grafana — Observability Dashboard ────────────────────────────────
  # Replaces: Cloudflare Dashboard, CF Analytics
  grafana:
    image: grafana/grafana:10.3.0
    container_name: tranc3-grafana
    <<: *common
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-tranc3-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      <<: *healthcheck-default

  # ── Loki — Log Aggregation ───────────────────────────────────────────
  # Replaces: Cloudflare Logs, CF Logpush
  loki:
    image: grafana/loki:2.9.0
    container_name: tranc3-loki
    <<: *common
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      <<: *healthcheck-default

  # ── Promtail — Log Shipper ───────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: tranc3-promtail
    <<: *common
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      <<: *healthcheck-default

  # ── VictoriaMetrics — Prometheus-Compatible TSDB ─────────────────────
  # Apache 2.0. Drop-in Prometheus replacement with 10× less RAM and disk.
  # Scrapes same targets as Prometheus; Grafana talks to both.
  # Query API: http://victoriametrics:8428  (Prometheus-compatible PromQL)
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: tranc3-victoriametrics
    <<: *common
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=30d"
      - "--httpListenAddr=:8428"
      - "--promscrape.config=/etc/prometheus/prometheus.yml"
    ports:
      - "8428:8428"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - victoriametrics-data:/storage
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8428/health"]
      <<: *healthcheck-default

  # ── Valkey — BSD-3 Redis-Compatible Key-Value Store ───────────────────
  # Drop-in Redis replacement (same redis-py client, same port 6379).
  # BSD-3 licence; community fork of Redis 7.2 under Linux Foundation.
  valkey:
    image: valkey/valkey:8-alpine
    container_name: tranc3-valkey
    <<: *common
    command: ["valkey-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Ollama — local zero-cost LLM (Tier 1 inference) ───────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: tranc3-ollama
    <<: *common
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Zot — OCI Container Registry ─────────────────────────────────────
  # Apache 2.0. Prevents Docker Hub rate-limiting for the platform.
  # All workers can pull images from http://zot:5000 inside the network.
  zot:
    image: ghcr.io/project-zot/zot-linux-amd64:latest
    container_name: tranc3-zot
    <<: *common
    ports:
      - "5000:5000"
    volumes:
      - ./config/zot/config.json:/etc/zot/config.json:ro
      - zot-data:/var/lib/registry
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/v2/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── IPFS — Distributed Storage ───────────────────────────────────────
  # Replaces: Cloudflare R2, CF IPFS Gateway
  ipfs:
    image: ipfs/kubo:v0.28.0
    container_name: tranc3-ipfs
    <<: *common
    ports:
      - "4001:4001"   # Swarm
      - "5001:5001"   # API
      - "8081:8080"   # Gateway
    volumes:
      - ipfs-data:/data/ipfs
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      <<: *healthcheck-default

  # ── Watchtower — Zero-Cost Auto-Update (Apache 2.0) ─────────────────
  # Polls Docker Hub every 5 minutes; only updates containers labelled
  # com.centurylinklabs.watchtower.enable=true
  # Sends Slack/webhook notification on update if WATCHTOWER_NOTIFICATION_URL set.
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: tranc3-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: --interval 300 --cleanup --label-enable --rolling-restart
    environment:
      - WATCHTOWER_NOTIFICATIONS_LEVEL=info
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_NOTIFICATION_URL:-}
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=false"

  # ── NATS — High-Throughput Inter-Worker Messaging (Apache 2.0) ───────
  # Lightweight alternative to Redis pub/sub for high-volume event streams.
  # JetStream enabled for durable queues (replaces SQLite queue for >1k msg/s).
  # 15MB binary, 1M+ msg/s throughput.
  nats:
    image: nats:2.10-alpine
    container_name: tranc3-nats
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "--http_port", "8222"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
      - "6222:6222"   # Cluster routing (future)
    volumes:
      - nats-data:/data
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Grafana Tempo — Distributed Tracing Backend ───────────────────────
  # Receives OTLP spans from workers via OpenTelemetry exporter.
  # Integrates with existing Grafana (auto-datasource provisioned).
  tempo:
    image: grafana/tempo:2.3.0
    container_name: tranc3-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - tempo-data:/tmp/tempo
      - ./monitoring/tempo.yml:/etc/tempo/config.yml:ro
    ports:
      - "3200:3200"   # HTTP query API
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    networks:
      - tranc3-net
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════
  # P0 WORKERS — Critical Path
  # ═══════════════════════════════════════════════════════════════════════

  # ── Tranc3 Backend — Core FastAPI App (Port 8000) ────────────────────
  tranc3-backend:
    <<: *worker-platform
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tranc3-backend
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://valkey:6379/0}
      - ENVIRONMENT=production
      - CORS_ORIGINS=${CORS_ORIGINS}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - AUDIT_SIGNING_KEY=${AUDIT_SIGNING_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - HF_API_KEY=${HF_API_KEY:-}
      - ENTITY_OVERRIDES_DB=/app/data/infinity_admin.db
      - PROACTIVE_ORCHESTRATOR_ENABLED=${PROACTIVE_ORCHESTRATOR_ENABLED:-true}
      - ADAPTIVE_ROTATION_ENABLED=${ADAPTIVE_ROTATION_ENABLED:-true}
    ports:
      - "8000:8000"
    volumes:
      - admin-data:/app/data
      - backend-models:/app/models
      - backend-cache:/app/cache
      - backend-logs:/app/logs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tranc3-backend.rule=PathPrefix(`/api/backend`) || PathPrefix(`/mcp`) || PathPrefix(`/adaptive`) || PathPrefix(`/dashboard`)"
      - "traefik.http.routers.tranc3-backend.entrypoints=web"
      - "traefik.http.services.tranc3-backend.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      <<: *healthcheck-default
    depends_on:
      valkey:
        condition: service_healthy
      ollama:
        condition: service_started

  # ── Tranc3 AI — The Spark (Port 8001) ────────────────────────────────
  tranc3-ai:
    <<: *worker-platform
    build:
      context: ./workers/tranc3-ai
      dockerfile: Dockerfile
    container_name: tranc3-ai-worker
    environment:
      - TRANC3_BACKEND_URL=http://tranc3-backend:8000
      - TRANC3_NANO_URL=http://tranc3-backend:8001
      - TRANC3_AUTH_URL=${INFINITY_AUTH_URL:-http://infinity-auth:8005}
      - ENVIRONMENT=production
    ports:
      - "8001:8001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tranc3-ai.rule=PathPrefix(`/api/ai`)"
      - "traefik.http.routers.tranc3-ai.entrypoints=web"
      - "traefik.http.services.tranc3-ai.loadbalancer.server.port=8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      <<: *healthcheck-default
    depends_on:
      - tranc3-backend

  # ── The Void — Secrets Vault (Port 8002) ────────────────────────────
  infinity-void:
    <<: *worker-platform
    build:
      context: ./workers/infinity-void
      dockerfile: Dockerfile
    container_name: infinity-void-worker
    environment:
      - MASTER_KEY_SEED=${MASTER_KEY_SEED}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - ENVIRONMENT=production
    ports:
      - "8002:8002"
    volumes:
      - void-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infinity-void.rule=PathPrefix(`/api/void`)"
      - "traefik.http.routers.infinity-void.entrypoints=web"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      <<: *healthcheck-default

  # ── API Gateway (Port 8003) ─────────────────────────────────────────
  api-gateway:
    <<: *worker-platform
    build:
      context: ./workers/api-gateway
      dockerfile: Dockerfile
    container_name: trancendos-api-gateway-worker
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - AUTH_SERVICE_URL=http://infinity-auth:8005
      - USERS_SERVICE_URL=http://users-service:8006
      - PRODUCTS_SERVICE_URL=http://products-service:8011
      - ORDERS_SERVICE_URL=http://orders-service:8012
      - PAYMENTS_SERVICE_URL=http://payments-service:8013
      - TRANC3_AI_SERVICE_URL=http://tranc3-ai:8001
      - ENVIRONMENT=production
    ports:
      - "8003:8003"
    depends_on:
      - tranc3-ai
      - infinity-auth
      - users-service
      - products-service
      - orders-service
      - payments-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-gateway.rule=PathPrefix(`/api/`)"
      - "traefik.http.routers.api-gateway.entrypoints=web"
      - "traefik.http.routers.api-gateway.priority=1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      <<: *healthcheck-default

  # ── The Nexus — WebSocket API (Port 8004) ──────────────────────────
  infinity-ws:
    <<: *worker-platform
    build:
      context: ./workers/infinity-ws
      dockerfile: Dockerfile
    container_name: infinity-ws-worker
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ENVIRONMENT=production
    ports:
      - "8004:8004"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infinity-ws.rule=PathPrefix(`/ws/`)"
      - "traefik.http.routers.infinity-ws.entrypoints=web"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      <<: *healthcheck-default

  # ── Infinity Auth — OAuth2/SSO (Port 8005) ──────────────────────────
  infinity-auth:
    <<: *worker-platform
    build:
      context: ./workers/infinity-auth
      dockerfile: Dockerfile
    container_name: infinity-auth-worker
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - MASTER_KEY_SEED=${MASTER_KEY_SEED}
      - ENVIRONMENT=production
    ports:
      - "8005:8005"
    volumes:
      - auth-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infinity-auth.rule=PathPrefix(`/auth/`)"
      - "traefik.http.routers.infinity-auth.entrypoints=web"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      <<: *healthcheck-default

  # ═══════════════════════════════════════════════════════════════════════
  # P1 WORKERS — Core Services
  # ═══════════════════════════════════════════════════════════════════════

  # ── Users Service (Port 8006) ────────────────────────────────────────
  users-service:
    <<: *worker-platform
    build:
      context: ./workers/users-service
      dockerfile: Dockerfile
    container_name: users-service-worker
    ports:
      - "8006:8006"
    volumes:
      - users-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      <<: *healthcheck-default

  # ── The Observatory — Monitoring Dashboard (Port 8007) ──────────────
  monitoring:
    <<: *worker-platform
    build:
      context: ./workers/monitoring
      dockerfile: Dockerfile
    container_name: monitoring-worker
    ports:
      - "8007:8007"
    volumes:
      - monitoring-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      <<: *healthcheck-default

  # ── Notifications Service (Port 8008) ───────────────────────────────
  notifications:
    <<: *worker-platform
    build:
      context: ./workers/notifications
      dockerfile: Dockerfile
    container_name: notifications-worker
    ports:
      - "8008:8008"
    volumes:
      - notifications-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      <<: *healthcheck-default

  # ── Infinity AI — AI API Gateway (Port 8009) ────────────────────────
  infinity-ai:
    <<: *worker-platform
    build:
      context: ./workers/infinity-ai
      dockerfile: Dockerfile
    container_name: infinity-ai-worker
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - ENVIRONMENT=production
    ports:
      - "8009:8009"
    volumes:
      - ai-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      <<: *healthcheck-default

  # ═══════════════════════════════════════════════════════════════════════
  # P2 WORKERS — Domain Services
  # ═══════════════════════════════════════════════════════════════════════

  # ── The Digital Grid — Workflow Orchestration (Port 8010) ────────────
  the-grid:
    <<: *worker-platform
    build:
      context: ./workers/the-grid
      dockerfile: Dockerfile
    container_name: the-grid-worker
    ports:
      - "8010:8010"
    volumes:
      - grid-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      <<: *healthcheck-default

  # ── Products Service (Port 8011) ─────────────────────────────────────
  products-service:
    <<: *worker-platform
    build:
      context: ./workers/products-service
      dockerfile: Dockerfile
    container_name: products-service-worker
    ports:
      - "8011:8011"
    volumes:
      - products-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      <<: *healthcheck-default

  # ── Orders Service (Port 8012) ───────────────────────────────────────
  orders-service:
    <<: *worker-platform
    build:
      context: ./workers/orders-service
      dockerfile: Dockerfile
    container_name: orders-service-worker
    ports:
      - "8012:8012"
    volumes:
      - orders-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      <<: *healthcheck-default

  # ── Payments Service (Port 8013) ─────────────────────────────────────
  payments-service:
    <<: *worker-platform
    build:
      context: ./workers/payments-service
      dockerfile: Dockerfile
    container_name: payments-service-worker
    ports:
      - "8013:8013"
    volumes:
      - payments-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      <<: *healthcheck-default

  # ── Files Service (Port 8014) ────────────────────────────────────────
  files-service:
    <<: *worker-platform
    build:
      context: ./workers/files-service
      dockerfile: Dockerfile
    container_name: files-service-worker
    ports:
      - "8014:8014"
    volumes:
      - files-data:/data
    healthcheck:
