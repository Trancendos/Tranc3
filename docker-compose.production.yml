    healthcheck:
      <<: *healthcheck-default
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8046/health')"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ice-box-service.rule=PathPrefix(`/ice-box`)"
      - "traefik.http.routers.ice-box-service.entrypoints=websecure"
      - "traefik.http.services.ice-box-service.loadbalancer.server.port=8046"

  # ── Fabulousa — UX/UI/design hub (Port 8048) ──────────────────────────────────────────────
  fabulousa-service:
    build:
      context: ./workers/fabulousa-service
      dockerfile: Dockerfile
    container_name: tranc3-fabulousa-service
    <<: *worker-common
    environment:
      - PORT=8048
    expose:
      - "8048"
    ports:
      - "8048:8048"
    healthcheck:
      <<: *healthcheck-default
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8048/health')"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fabulousa-service.rule=PathPrefix(`/fabulousa`)"
      - "traefik.http.routers.fabulousa-service.entrypoints=websecure"
      - "traefik.http.services.fabulousa-service.loadbalancer.server.port=8048"

  # ── LlamaIndex Service — RAG framework (Port 8096) ───────────────────
  llamaindex-service:
    build:
      context: ./workers/llamaindex-service
      dockerfile: Dockerfile
    container_name: tranc3-llamaindex-service
    <<: *worker-common
    environment:
      - PORT=8096
      - OLLAMA_URL=http://ollama:11434
    expose:
      - "8096"
    ports:
      - "8096:8096"
    healthcheck:
      <<: *healthcheck-default
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8096/health')"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.llamaindex.rule=PathPrefix(`/llamaindex`)"
      - "traefik.http.routers.llamaindex.entrypoints=websecure"
      - "traefik.http.services.llamaindex.loadbalancer.server.port=8096"

  # ── Haystack Service — production RAG pipelines (Port 8097) ──────────
  haystack-service:
    build:
      context: ./workers/haystack-service
      dockerfile: Dockerfile
    container_name: tranc3-haystack-service
    <<: *worker-common
    environment:
      - PORT=8097
      - OLLAMA_URL=http://ollama:11434
    expose:
      - "8097"
    ports:
      - "8097:8097"
    healthcheck:
      <<: *healthcheck-default
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8097/health')"]
    labels:
