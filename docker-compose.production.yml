  rate-limit-service:
    <<: *worker-common
    build: { context: ./workers/rate-limit-service, dockerfile: Dockerfile }
    container_name: rate-limit-service-worker
    ports: ["8026:8026"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8026/health"]
      <<: *healthcheck-default

  geo-service:
    <<: *worker-common
    build: { context: ./workers/geo-service, dockerfile: Dockerfile }
    container_name: geo-service-worker
    ports: ["8027:8027"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8027/health"]
      <<: *healthcheck-default

  cdn-service:
