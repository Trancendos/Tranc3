name = "infinity-void"
main = "src/index.ts"
compatibility_date = "2024-09-23"
account_id = "e0214028cb64d31232f5662548a55e4e"

# The Void — encrypted secrets vault for all Trancendos services.
# AES-GCM encryption, D1 metadata, R2 payload storage, KV rate limiting.
# Already deployed. This config wires up the correct bindings.

[vars]
ENVIRONMENT = "production"
SERVICE_NAME = "the-void"

# ── D1 database (infinity-void-db — created 2026-05-08) ───────────────────────
[[d1_databases]]
binding = "DB"
database_name = "infinity-void-db"
database_id = "48e89d58-abd8-456b-a6ad-58ededaba597"

# ── KV rate limiting (VOID-RATE-LIMIT — created 2026-05-08) ──────────────────
[[kv_namespaces]]
binding = "KV_RATE_LIMIT"
id = "b98da7d356ff4ad2b2d09a50ad57c5cb"

# ── R2 encrypted payload storage ─────────────────────────────────────────────
# Enable R2 in your Cloudflare dashboard, then create the bucket and uncomment:
# [[r2_buckets]]
# binding = "R2_SECRETS"
# bucket_name = "void-secrets"

# ── Secrets (set via: wrangler secret put <NAME> --name infinity-void) ────────
# MASTER_KEY_SEED   → strong random string used for AES-GCM key derivation
# INTERNAL_SECRET   → shared secret for service-to-service auth
# INFINITY_ONE_URL  → https://infinity-one.trancendos.workers.dev (JWT verify)

# ── Deploy steps ──────────────────────────────────────────────────────────────
# 1. Enable R2 in Cloudflare dashboard (one-time)
# 2. wrangler r2 bucket create void-secrets
# 3. Uncomment the r2_buckets block above
# 4. wrangler secret put MASTER_KEY_SEED
# 5. wrangler secret put INTERNAL_SECRET
# 6. wrangler secret put INFINITY_ONE_URL
# 7. wrangler deploy
