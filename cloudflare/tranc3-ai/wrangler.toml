name = "tranc3-ai"
main = "src/index.js"
compatibility_date = "2024-09-23"

# NOTE: [ai] binding (CF Workers AI) intentionally removed.
# Tranc3 uses its own self-hosted inference — no external AI APIs.
# Set TRANC3_BACKEND_URL or TRANC3_NANO_URL to connect your own backend.

[vars]
ENVIRONMENT = "production"

# ── Self-owned backend (set via: wrangler secret put <NAME>) ──────────────────
# TRANC3_BACKEND_URL  = "https://your-tranc3-server.example.com"   # FastAPI + WorkerPool
# TRANC3_NANO_URL     = "https://your-nano-server.example.com"     # nano_server.py
# TRANC3_AUTH_URL     = "https://infinity-auth-api.trancendos.workers.dev"
# ALLOWED_ORIGINS     = "https://your-custom-domain.com"

# ── Fly.io free deployment (3 VMs free) ───────────────────────────────────────
# 1. cd to project root
# 2. fly launch --name tranc3-backend --region lhr
# 3. fly deploy
# 4. wrangler secret put TRANC3_BACKEND_URL --name tranc3-ai
#    (paste: https://tranc3-backend.fly.dev)

# ── Optional KV cache ──────────────────────────────────────────────────────────
# [[kv_namespaces]]
# binding = "CACHE"
# id = ""  # fill in KV namespace ID
